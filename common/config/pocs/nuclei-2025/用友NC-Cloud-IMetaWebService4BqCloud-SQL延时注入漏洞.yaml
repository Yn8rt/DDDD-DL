id: yongyouNC-Cloud-IMetaWebService4BqCloud-sql-time
info:
    author: Superhero
    description: |-
        fofa: (body="UFIDA" && body="logo/images/") || (body="logo/images/ufida_nc.png") || title="Yonyou NC" || body="<div id=\"nc_text\">" || body="<div id=\"nc_img\" onmouseover=\"overImage('nc');" || (title="产品登录界面" && body="UFIDA NC") || (body="/Client/Uclient/UClient.exe" && title="Yonyou UAP")
        用友NC Cloud IMetaWebService4BqCloud接口存在SQL注入漏洞，攻击者通过利用SQL注入漏洞配合数据库xp_cmdshell可以执行任意命令，从而控制服务器。经过分析与研判，该漏洞利用难度低，建议尽快修复。
    name: 用友NC Cloud IMetaWebService4BqCloud SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/kqXz-fPLHCO-nHlEeEWmPg
    severity: high
    tags:
        - 用友NC
