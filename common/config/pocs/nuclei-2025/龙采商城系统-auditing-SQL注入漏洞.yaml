id: longcaishangcheng-auditing-sql
info:
    author: Superhero
    description: |-
        fofa: body="'url':'/pc2.0/index/index'"
        龙采商城系统 auditing 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 龙采商城系统 auditing SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/DCxBaiuqCXUsnLoDCYNqhA
    severity: high
    tags: []
