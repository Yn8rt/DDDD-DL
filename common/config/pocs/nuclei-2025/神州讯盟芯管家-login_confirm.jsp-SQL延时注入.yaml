id: shenzhouxunmengxin-login_confirm_jsp-sql-time
info:
    author: Superhero
    description: |-
        fofa: title="神州讯盟芯管家"
        神州讯盟芯管家 login_confirm.jsp 接口存在SQL注入漏洞，未经身份验证的攻击者通过漏洞执行任意SQL语句，调用xpcmdshell写入后门文件，执行任意代码，从而获取到服务器权限。
    name: 神州讯盟芯管家 login_confirm.jsp SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/VIhoszpA8NSlSK_Cs5Hf6Q
    severity: high
    tags: []
