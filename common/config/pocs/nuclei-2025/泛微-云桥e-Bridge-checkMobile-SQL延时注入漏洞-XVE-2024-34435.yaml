id: Weaver-E-Bridge-checkMobile-sql-XVE-2024-34435
info:
    author: Superhero
    description: |-
        fofa: app="泛微云桥e-Bridge"
        泛微-云桥e-Bridge checkMobile 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 泛微-云桥e-Bridge checkMobile SQL注入漏洞(XVE-2024-34435)
    reference:
        - https://mp.weixin.qq.com/s/07gFpYZ6NZQXNgjpp20VBQ?token=1386604809&lang=zh_CN
    severity: high
    tags:
        - 泛微云桥e-bridge
        - 泛微-云桥e-Bridge
