id: saizhuge-login-sql
info:
    author: Superhero
    description: |-
        fofa: body="static/index/image/login_left.png" || icon_hash="1056416905"
        赛诸葛数字化智能中台系统 login 登录接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 赛诸葛数字化智能中台系统 login SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/KamkSBBpMvCoyw5NuEgivw?token=564303397&lang=zh_CN
    severity: high
    tags: []
