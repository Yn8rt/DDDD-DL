id: zhilianyuncai-SRM2-quickReceiptDetail-sql
info:
    author: Superhero
    description: |-
        fofa: title=="SRM 2.0"
        智联云采 SRM2.0 quickReceiptDetail 接口处存在SQL注入漏洞，未经身份认证的攻击者可以通过此漏洞获取数据库敏感信息，用户名密码等凭据，进一步利用可获取服务器权限。
    name: 智联云采 SRM2.0 quickReceiptDetail SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/MoQnALSQXRCbBBdTwSEIow?token=827319261&lang=zh_CN
    severity: high
    tags:
        - 智联云采 SRM2.0
