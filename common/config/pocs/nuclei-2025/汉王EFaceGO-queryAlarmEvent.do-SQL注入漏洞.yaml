id: hanwang-EFaceGO-queryAlarmEvent_do-sql
info:
    author: Superhero
    description: |-
        fofa: icon_hash="1380907357"
        汉王EFaceGO queryAlarmEvent.do 接口存在SQL注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码,站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 汉王EFaceGO queryAlarmEvent.do SQL注入漏洞
