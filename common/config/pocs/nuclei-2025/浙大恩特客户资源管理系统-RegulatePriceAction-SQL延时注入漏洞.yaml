id: zhedaente-RegulatePriceAction-sql
info:
    author: Superhero
    description: |-
        fofa: body="script/Ent.base.js"
        浙大恩特客户资源管理系统 RegulatePriceAction 接口处存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 浙大恩特客户资源管理系统 RegulatePriceAction SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247488344&idx=1&sn=09ec1fee8a52c85ed47ea353a19e40ff&chksm=c267a66bf5102f7da9e132ce41a6cfc9a2554f2c71e3d5a94bf16f4ef7511d673f1f1b919b70&token=377357801&lang=zh_CN#rd
    severity: high
    tags:
        - 浙大恩特客户资源管理系统
