id: meiteCRM-upload3_jsp-File-upload
info:
    author: Superhero
    description: |-
        fofa: body="/common/scripts/basic.js"
        美特CRM /common/jsp/upload3.jsp 接口存在任意文件上传漏洞，未经身份攻击者可通过该漏洞在服务器端任意执行代码，写入后门，获取服务器权限，进而控制整个 web 服务器。
    name: 美特CRM /common/jsp/upload3.jsp 任意文件上传漏洞
    reference:
        - https://mp.weixin.qq.com/s/aAZaFY1NQ_3wKQbEDNG1iQ
    severity: high
    tags:
        - 美特CRM
        - Servlet
variables:
