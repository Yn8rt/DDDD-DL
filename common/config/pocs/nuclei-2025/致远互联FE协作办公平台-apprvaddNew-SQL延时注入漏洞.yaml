id: zhiyuanhulianFE-apprvaddNew-sql
info:
    author: Superhero
    description: |-
        fofa: body="li_plugins_download"
        致远互联FE协作办公平台 apprvaddNew.jsp 接口处存在sql注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 致远互联FE协作办公平台 apprvaddNew.jsp SQL延时注入漏洞
    reference:
        - https://blog.csdn.net/m0_60571842/article/details/141129832
    severity: high
    tags: []
