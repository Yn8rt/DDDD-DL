id: yongyouU8-Cloud-ReleaseRepMngAction-sql-CNVD-2024-33023
info:
    author: Superhero
    description: |-
        fofa: title=="U8C"
        用友U8 Cloud ReleaseRepMngAction 接口处存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 用友U8 Cloud ReleaseRepMngAction SQL注入漏洞(CNVD-2024-33023)
    reference:
        - https://mp.weixin.qq.com/s/aiD49I6IbMMZGMnsnpM83g?token=1192656222&lang=zh_CN
    severity: high
    tags:
        - 用友u8
        - Servlet
        - 用友U8
