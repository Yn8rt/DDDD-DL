info:
    author: Superhero
    description: |-
        fofa: body="var _FactoryData"
        海信智能公交企业管理系统 OrgInfoMng.aspx 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 海信智能公交企业管理系统 OrgInfoMng.aspx SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247489358&idx=1&sn=7231e758676223aad81806ee8dcf9166&chksm=c267a27df5102b6b9987a24d5930e23fa2b9ca7037c9ff793118589dce36c28efb241b53274d&token=279945389&lang=zh_CN#rd
    severity: high
    tags:
        - 海信智能公交企业管理系统
