id: SMG-changelogo_php-RCE
info:
    author: Superhero
    description: |-
        fofa: body="text ml10 mr20" && (title="网关管理软件" || title="Gateway Management")
        杭州新威数字信息 SMG网关管理软件 changelogo.php 接口存在远程命令执行漏洞。攻击者可以通过漏洞执行任意命令从而获取服务器权限，可能导致内网进一步被攻击。
    name: 杭州新威数字信息 SMG网关管理软件 changelogo.php 命令执行漏洞
    reference:
        - https://mp.weixin.qq.com/s/48pDe8DLDJIqFgQztcczSw
    severity: high
    tags: []
