id: PbootCMS-entrance_php-sql
info:
    author: Superhero
    description: |-
        fofa: header="PbootCMS" || body="zbeol.com"
        由于PbootCMS entrance.php 文件代码逻辑缺陷存在SQL注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: PbootCMS entrance.php SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/yg-a13V3Rl4yTH191kQcHw?token=1015546094&lang=zh_CN
    severity: high
    tags:
        - TCMS
        - PbootCMS
        - pbootcms
        - OTcms
        - PBOOTCMS
