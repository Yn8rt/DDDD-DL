id: Panalog-sprog_upstatus-sql
info:
    author: Superhero
    description: |-
        fofa: body="Maintain/cloud_index.php"
        Panabit /Maintain/sprog_upstatus.php 接口处的 id 参数存在 SQL 注入漏洞，可导致数据库信息泄露从而获取敏感信息，甚至可能被攻击者进一步利用造成更大危害。
    name: Panalog 日志审计系统 sprog_upstatus.php SQL 注入漏洞(XVE-2024-5232)
    reference:
        - https://blog.csdn.net/m0_60571842/article/details/141159901
    severity: high
    tags: []
