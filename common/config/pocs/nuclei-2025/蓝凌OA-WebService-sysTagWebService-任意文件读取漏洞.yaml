id: Landray-WebService-sysTagWebService-File-reading
info:
    author: Superhero
    description: |-
        fofa: body="Com_Parameter"
        蓝凌OA webservice服务 sysTagWebService 接口存在任意文件读取漏洞，未经身份验证攻击者可通过该漏洞读取系统重要文件（如数据库配置文件、系统配置文件）、数据库配置文件等等，导致网站处于极度不安全状态。
    name: 蓝凌OA WebService sysTagWebService 任意文件读取漏洞
    reference:
        - https://mp.weixin.qq.com/s/lVSOtFdUvCmbZqycAxpKOQ?token=968846615&lang=zh_CN
    severity: high
    tags:
        - File reading
        - 蓝凌oa
        - Mars
