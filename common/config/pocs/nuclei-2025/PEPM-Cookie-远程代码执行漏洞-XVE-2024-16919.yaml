id: PEPM-Cookie-rce
info:
    author: Superhero
    description: |-
        fofa: header="pepm"
        PEPM系统存在远程代码执行漏洞，Cookie的auth字段存在反序列化漏洞，攻击者可构造反序列化链生成恶意数据，执行任意PHP代码。
    name: PEPM Cookie 远程代码执行漏洞(XVE-2024-16919)
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247485950&idx=1&sn=8b99541361fcbed82f175cfd781ab645&chksm=c267bccdf51035db117e17a3ee779aee9ad94fa32abd3b9d4241257b32da9528d102bb357978&token=2024266625&lang=zh_CN#rd
    severity: high
    tags:
        - SSH
        - PePm
