id: yibaoOA-ExecuteQueryForDataSetBinary-sql
info:
    author: Superhero
    description: |-
        fofa: product="顶讯科技-易宝OA系统"
        易宝OA ExecuteQueryForDataSetBinary接口处存在SQL注入漏洞，未经身份认证的攻击者可以通过此漏洞获取数据库敏感信息，用户名密码等凭据，进一步利用可获取服务器权限。
    name: 易宝OA ExecuteQueryForDataSetBinary SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247488507&idx=1&sn=845d497240abaa6b5112b03f3ca0c258&chksm=c267a6c8f5102fde6e13062cdb51a8482ad9d96de9e19cd282a1261272a747363a525e6d0970&token=2115358587&lang=zh_CN#rd
    severity: high
    tags:
        - 易宝OA
