id: yongyouNC-FormulaViewAction-sql
info:
    author: Superhero
    description: |-
        fofa: app="用友-UFIDA-NC"
        用友NC /service/~iufo/com.ufida.web.action.ActionServlet 接口处存在SQL注入漏洞，攻击者通过利用SQL注入漏洞配合数据库xp_cmdshell可以执行任意命令，从而控制服务器。经过分析与研判，该漏洞利用难度低，建议尽快修复。
    name: 用友NC FormulaViewAction SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/rBZqaPymRHTZpFhRu2l6Cw
    severity: high
    tags:
        - 用友-ufida
        - Servlet
