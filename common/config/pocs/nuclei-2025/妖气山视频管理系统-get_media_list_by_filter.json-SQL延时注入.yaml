id: yaoqishan-get_media_list_by_filter_json-sql-time
info:
    author: Superhero
    description: |-
        fofa: body="yaoqishan-header"
        妖气山视频管理系统  get_media_list_by_filter.json存在SQL注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码,站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 妖气山视频管理系统  get_media_list_by_filter.json SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/XWUpnyRwM4OEYz5Isz0LJQ
    severity: high
    tags: []
