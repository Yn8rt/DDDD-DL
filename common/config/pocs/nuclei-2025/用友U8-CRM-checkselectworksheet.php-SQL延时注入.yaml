id: yongyouU8-CRM-checkselectworksheet_php-sql-time
info:
    author: Superhero
    description: |-
        fofa: app="用友U8CRM"
        用友U8 CRM checkselectworksheet.php 接口存在SQL注入漏洞，未经身份验证的攻击者通过漏洞执行任意SQL语句，调用xpcmdshell写入后门文件，执行任意代码，从而获取到服务器权限。
    name: 用友U8 CRM checkselectworksheet.php SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/VNHQokszm6jrXTJCWG_Rsw
    severity: high
    tags:
        - 用友u8
        - 用友U8CRM
        - 用友U8
