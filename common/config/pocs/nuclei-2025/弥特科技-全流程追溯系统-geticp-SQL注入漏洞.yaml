info:
    author: Superhero
    description: |-
        fofa: (body="chunk-libs.45edf705.css" && title="产品追溯系统") || title="4.1.0追溯系统"
        弥特科技 全流程追溯系统 geticp 接口存在SQL注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码,站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 弥特科技 全流程追溯系统 geticp SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/sEnjQtf22POr1jSAR4EbfQ
    severity: high
    tags: []
