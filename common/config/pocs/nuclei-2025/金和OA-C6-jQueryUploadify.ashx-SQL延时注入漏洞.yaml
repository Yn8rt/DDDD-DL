id: jinheOA-C6-jQueryUploadify_ashx-sql
info:
    author: Superhero
    description: |-
        fofa: app="金和网络-金和OA"
        金和OA C6 jQueryUploadify.ashx接口处存在SQL注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 金和OA C6 jQueryUploadify.ashx SQL延时注入漏洞
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247487120&idx=1&sn=c372077148e423ac9168b500718453c7&chksm=c267bba3f51032b59c082fa29ebcdf299431fdc3fbdec6f9fd00e6cc08d237e59b862fef0752&token=101124693&lang=zh_CN#rd
    severity: high
    tags:
        - jQuery
        - 金和oa
        - 金和网络-金和OA
