id: yongyouU8-CRM-ajaxgetborrowdata_php-sql

info:
  name: 用友U8 CRM /borrowout/ajaxgetborrowdata.php SQL注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: title="用友U8CRM"
    用友 U8 CRM客户关系管理系统  /borrowout/ajaxgetborrowdata.php 文件多个方法存在SQL注入漏洞，未经身份验证的攻击者通过漏洞执行任意SQL语句，调用xp_cmdshell写入后门文件，执行任意代码，从而获取到服务器权限。
  reference:
    - https://mp.weixin.qq.com/s/ITXL8rw9puAbnFQgErXY1g?token=974751616&lang=zh_CN
  tags: sql injection


