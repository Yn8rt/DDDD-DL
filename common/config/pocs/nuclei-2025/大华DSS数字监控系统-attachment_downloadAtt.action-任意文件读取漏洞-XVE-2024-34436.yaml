id: dahuaDSS-attachment_downloadAtt_action-File-reading-XVE-2024-34436
info:
    author: Superhero
    description: |-
        fofa: app="dahua-DSS"
        大华DSS数字监控系统 attachment_downloadByUrlAtt.action接口存在任意文件读取漏洞，未经身份验证攻击者可通过该漏洞读取系统重要文件（如数据库配置文件、系统配置文件）、数据库配置文件等等，导致网站处于极度不安全状态。
    name: 大华DSS数字监控系统 attachment_downloadAtt.action 任意文件读取漏洞(XVE-2024-34436)
    reference:
        - https://mp.weixin.qq.com/s/InlSDzXtGsx90OLULJP9GA?token=523748735&lang=zh_CN
    severity: high
    tags:
