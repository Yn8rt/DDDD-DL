id: yongyouU8-CRM-relobjreportlist_php-sql
info:
    author: Superhero
    description: |-
        fofa: body="用友U8CRM"
        用友 U8 CRM客户关系管理系统 config/relobjreportlist.php 文件存在SQL注入漏洞，未经身份验证的攻击者通过漏洞执行任意SQL语句，调用xpcmdshell写入后门文件，执行任意代码，从而获取到服务器权限。
    name: 用友U8 CRM config/relobjreportlist.php SQL延时注入漏洞
