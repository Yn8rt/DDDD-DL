id: haixin-apply_aspx-sql
info:
    author: Superhero
    description: |-
        fofa: body="var _FactoryData"
        海信智能公交企业管理系统 apply.aspx 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 海信智能公交企业管理系统 apply.aspx SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/koTP0A1mBUsx5PqEIguVeQ?token=827319261&lang=zh_CN
    severity: high
    tags:
        - 海信智能公交企业管理系统
