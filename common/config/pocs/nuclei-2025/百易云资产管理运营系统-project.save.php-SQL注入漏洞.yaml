id: baiyiyun-project_save_php-sql
info:
    author: Superhero
    description: |-
        fofa: body="media/css/uniform.default.css" && body="资管云" || body="不要着急，点此" || title="资管云"
        百易云资产管理运营系统 project.save.php 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 百易云资产管理运营系统 project.save.php SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/ubbHWBTT1qBWO9mlrVWG3A
    severity: high
    tags:
        - 百易云资产管理运营系统
