info:
    author: Superhero
    description: |-
        fofa: body="/api/SingleLogin"
        易思智能物流无人值守系统 SingleLogin SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 易思智能物流无人值守系统 SingleLogin SQL注入漏洞
    reference:
