    description: |-
        fofa: title="用友U8CRM"
        用友 U8 CRM客户关系管理系统 ajax/getufvouchdata.php 文件存在SQL注入漏洞，未经身份验证的攻击者通过漏洞执行任意SQL语句，调用xpcmdshell写入后门文件，执行任意代码，从而获取到服务器权限。
