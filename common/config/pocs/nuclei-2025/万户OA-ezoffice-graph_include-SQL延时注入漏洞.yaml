id: wanhuOA-ezOFFICE-graph_include-sql
info:
    author: Superhero
    description: |-
        fofa: app="万户ezOFFICE协同管理平台"
        万户 ezOFFICE /defaultroot/platform/report/graphreport/graph_include.jsp接口处存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 万户 ezOFFICE graph_include.jsp SQL延时注入漏洞
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247486291&idx=1&sn=a747638a55572874c18a6bad950694ab&chksm=c267be60f5103776cf53c2c1a66ae086270736be13847bf69336f4fcd064fe2c7cb21b9074bc&token=661111678&lang=zh_CN#rd
    severity: high
    tags: []
