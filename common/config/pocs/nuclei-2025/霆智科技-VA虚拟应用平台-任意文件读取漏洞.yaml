id: tingzhikeji-VA-File-reading
info:
    author: Superhero
    description: |-
        fofa: body="EAA益和应用接入系统"
        霆智科技-VA虚拟应用平台存在任意文件读取漏洞，未经身份验证攻击者可通过该漏洞读取系统重要文件（如数据库配置文件、系统配置文件）、数据库配置文件等等，导致网站处于极度不安全状态。
    name: 霆智科技-VA虚拟应用平台 任意文件读取
    reference:
        - https://mp.weixin.qq.com/s/JhSxXAk1YFQglTwd8pdNrA
    severity: high
    tags:
        - File reading
        - EAA益和应用接入系统
