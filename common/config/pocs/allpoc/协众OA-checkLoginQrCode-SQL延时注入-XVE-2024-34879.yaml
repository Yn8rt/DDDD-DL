id: xiezhongOA-checkLoginQrCode-sql-XVE-2024-34879
info:
    author: Superhero
    description: |-
        fofa: app="协众软件-协众OA"
        协众OA checkLoginQrCode 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限
    name: 协众OA checkLoginQrCode SQL注入漏洞(XVE-2024-34879)
    reference:
        - https://mp.weixin.qq.com/s/lvbR19WHLKMdiq7hOUYtng?token=968846615&lang=zh_CN
    severity: high
    tags: []
