id: NetMizer-dologin_php-sql-time-XVE-2024-37672
info:
    author: Superhero
    description: |-
        fofa: app="NetMizer-日志管理系统"
        NetMizer 在/dologin.php接口存在SQL注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: NetMizer dologin.php sql注入漏洞(XVE-2024-37672)
    reference:
        - https://mp.weixin.qq.com/s/BuMyDDxwfAiZCGQfPuGayQ
    severity: high
    tags: []
