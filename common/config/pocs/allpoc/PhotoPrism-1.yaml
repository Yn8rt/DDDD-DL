http:
    - matchers:
        - status:
            - 200
          type: status
        - condition: and
          part: body
          type: word
          words:
            - version
            - apiUri
            - passwordResetUri
      matchers-condition: and
      method: GET
      path:
        - '{{BaseURL}}/api/v1/config'
id: photoprism-unauthorized-access
info:
    author: onewin
    description: |
        PhotoPrism私有相册系统的/api/v1/config接口存在未授权访问漏洞，可泄露系统敏感配置信息
        [漏洞发现时间：2025年7月]
    metadata:
        fofa-query: title="PhotoPrism"
    name: PhotoPrism未授权访问漏洞
    severity: medium
    tags:
        - PhotoPrism-开源照片管理系统
        - PhotoPrism
