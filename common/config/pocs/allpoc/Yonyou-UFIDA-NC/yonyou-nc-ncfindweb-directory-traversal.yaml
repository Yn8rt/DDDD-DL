        - condition: and
          part: body
          type: word
          words:
            - Client
            - ncwslogin.jsp
            - admin.jsp
        - status:
            - 200
          type: status
      matchers-condition: and
      method: GET
      path:
        - '{{BaseURL}}/NCFindWeb?service=IPreAlertConfigService&filename='
