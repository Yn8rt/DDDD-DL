id: haoka-index_php-sql
info:
    author: Superhero
    description: |-
        fofa: icon_hash="-795291075"
        号卡极团分销管理系统 /order/index.php 接口存在SQL注入漏洞，未经身份验证攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 号卡极团分销管理系统 index.php SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247488439&idx=1&sn=dc594d32088d00f69d51b137d775322a&chksm=c267a684f5102f92a5d2948358f9bed59a8b6bf14598b7e22a37f1cfc3302b9c3c9adeeb302a&token=2115358587&lang=zh_CN#rd
    severity: high
    tags: []
