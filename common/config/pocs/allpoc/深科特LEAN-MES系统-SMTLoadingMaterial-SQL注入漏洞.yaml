id: shenkete-LEAN-MES-SMTLoadingMaterial-sql
info:
    author: Superhero
    description: |-
        fofa: (title="LEAN MES - 用户登录" || body="Content/js/skt.utility.checkmobile.js" || body="../MobileApp/VerifyError.aspx" || body="Content/login/login2/multiplant_top.png")
        深科特LEAN MES SMTLoadingMaterial 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 深科特LEAN MES系统SMTLoadingMaterial SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/Suh9xcz8yo9250Dr4aPocg
    severity: high
    tags: []
