id: hjsoft-hcm-DisplayOleContent-file-read
info:
    author: onewin
    description: |
        宏景eHR系统存在DisplayOleContent接口任意文件读取漏洞，攻击者可利用此漏洞读取服务器上的敏感文件
        [漏洞发现时间：2025年7月]
    name: 宏景eHR DisplayOleContent任意文件读取漏洞
    reference:
        - https://www.hjsoft.com.cn
    severity: high
    tags:
        - HJSoft-HCM
        - LEAP
        - 宏景ehr
        - Servlet
