http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - '{"name":"'
            - '"model":"'
            - '"digest":"'
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /api/tags HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36
id: OLLAMA-unauthorized-CNVD-2025-04094
info:
    author: Superhero
    description: |-
        fofa: app="Ollama"
        Ollama存在未授权访问漏洞。由于Ollama默认未设置身份验证和访问控制功能，未经授权的攻击者可在远程条件下调用Ollama服务接口，执行包括但不限于敏感模型资产窃取、虚假信息投喂、模型计算资源滥用和拒绝服务、系统配置篡改和扩大利用等恶意操作。未设置身份验证和访问控制功能且暴露在公共互联网上的Ollama易受此漏洞攻击影响。
    name: OLLAMA 未授权访问(CNVD-2025-04094)
    reference:
        - https://mp.weixin.qq.com/s/BxihhPEaR_lhQ44rb32_YA
    severity: high
    tags:
        - unauthorized
