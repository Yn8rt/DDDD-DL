id: YourPHPCMS-checkEmail-sql
info:
    author: Superhero
    description: |-
        fofa: header="YP_onlineid"
        YourPHPCMS /index.php?g=Admin&m=Login&a=checkEmail 存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: YourPHPCMS checkEmail SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/uegecenDDM1nMPhKVix3tQ?token=1543860814&lang=zh_CN
    severity: high
    tags: []
