id: hongan-Heimdall-DLP-pushSetup_do-sql-time
info:
    author: Superhero
    description: |-
        fofa: body="userReg/initUserReg.do"
        虹安Heimdall DLP数据泄漏防护系统 pushSetup.do 接口存在SQL注入漏洞，未经身份验证的恶意攻击者利用SQL 注入漏洞获取数据库中的信息（例如管理员后台密码、站点用户个人信息）之外，攻击者甚至可以在高权限下向服务器写入命令，进一步获取服务器系统权限
    name: 虹安Heimdall DLP数据泄漏防护系统 pushSetup.do SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/yTSgFgQYh_BH2OiMkpaCVA?token=1451506197&lang=zh_CN
    severity: high
    tags: []
