id: puhua-PowerPMS-APPGetUser-sql
info:
    author: Superhero
    description: |-
        fofa: app="普华科技-PowerPMS"
        普华-PowerPMS APPGetUser 接口处存在SQL注入漏洞,未经身份验证的远程攻击者通过利用SQL注入漏洞配合数据库xp_cmdshell可以执行任意命令，从而控制服务器。经过分析与研判，该漏洞利用难度低，建议尽快修复。
    name: 普华-PowerPMS APPGetUser SQL延时注入
    reference:
        - https://mp.weixin.qq.com/s?__biz=MzkzMTcwMTg1Mg==&mid=2247486023&idx=1&sn=3bd1ffde9c30393b099ac8f7e86f6792&chksm=c267bf74f5103662ada86eec583a96273e6d358845a0f31a23ed3d98553dda5cabf78c837f01&token=2024266625&lang=zh_CN#rd
    severity: high
