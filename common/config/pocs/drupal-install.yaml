http:
    - host-redirects: true
      matchers:
        - type: word
          words:
            - <title>Choose language | Drupal</title>
      max-redirects: 1
      method: GET
      path:
        - '{{BaseURL}}/install.php?profile=default'
        - '{{BaseURL}}/core/install.php'
      stop-at-first-match: true
id: drupal-install
info:
    author: NkxxkN
    metadata:
        max-request: 2
        shodan-query: http.component:"drupal"
    name: Drupal Install
    severity: low
    tags:
        - exposure
        - drupal
        - Drupal
