http:
    - attack: pitchfork
      matchers:
        - status:
            - 200
          type: status
        - regex:
            - ^success$
          type: regex
      matchers-condition: and
      payloads:
        password:
            - admin
        username:
            - admin
      raw:
        - |
          POST /druid/submitLogin HTTP/1.1
          Host: {{Hostname}}

          loginUsername={{username}}&loginPassword={{password}}
        - |
          POST /submitLogin HTTP/1.1
          Host: {{Hostname}}

          loginUsername={{username}}&loginPassword={{password}}
id: druid-default-login
info:
    author: pikpikcu
    classification:
        cwe-id: CWE-798
    description: Apache Druid default login information (admin/admin) was discovered.
    metadata:
        max-request: 2
    name: Apache Druid Default Login
    severity: high
    tags:
        - druid
        - default-login
