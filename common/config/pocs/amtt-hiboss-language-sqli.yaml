http:
    - matchers:
        - condition: or
          dsl:
            - status_code_1==200 && contains(body_1,"SQL syntax")
            - status_code_2==200 && contains(body_2,"SQL syntax")
          type: dsl
      raw:
        - |
          GET /language.php?Lately=&EditStatus=&Type=&Flag=edit&id='&Search= HTTP/1.1
          Host: {{Hostname}}
        - |
          GET /language.php?Lately=&EditStatus=&Type='&Flag=edit&id=&Search= HTTP/1.1
          Host: {{Hostname}}
      req-condition: true
      stop-at-first-match: true
