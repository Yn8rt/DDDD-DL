http:
    - matchers:
        - condition: and
          type: word
          words:
            - Dashboard [Jenkins]
        - status:
            - 200
          type: status
      matchers-condition: and
      method: GET
      path:
        - '{{BaseURL}}'
id: unauthenticated-jenkins
info:
    author: dhiyaneshDK
    metadata:
        max-request: 1
    name: Unauthenticated Jenkins Dashboard
    severity: high
    tags:
        - jenkins
        - authenticate
        - Jenkins
