http:
    - host-redirects: true
      matchers:
        - condition: and
          type: word
          words:
            - GitLab
            - https://about.gitlab.com
        - status:
            - 200
          type: status
      matchers-condition: and
      max-redirects: 2
      method: GET
      path:
        - '{{BaseURL}}/users/sign_in'
id: gitlab-detect
info:
    author: ehsahil
    classification:
        cvss-metrics: CVSS:3.0/AV:N/AC:L/PR:N/UI:N/S:U/C:N/I:N/A:N
        cvss-score: 0
        cwe-id: CWE-200
    description: Gitlab login panel was detected.
    metadata:
        max-request: 1
        shodan-query: http.title:"GitLab"
    name: Gitlab Login Panel - Detect
    severity: info
    tags:
        - panel
        - gitlab
        - GitLab
